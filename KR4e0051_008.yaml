body:
  text: 雲間管時敏撰西域丁鶴年評七言絶句修竹芙蓉水仙小隊自成雙裊裊霓旌引翠幢一夜湘君頭盡白西風離思滿秋江題玄真詩意圖千峰雲氣涌如泉逺樹微茫斷復連秪有大夫橋下路青山都屬釣魚船畫扇南州六月暍欲死一見新圖眼遽眀何處長林雙樹下矮牀茅屋聽秋聲題秋江漁釣蒹葭霜落水無埃野艇維堤晚未開為愛青山不歸去橋頭遮莫大夫來題倪元鎮先生小景泖上相逢記昔年風姿曄曄似神仙如今看盡渾疑夢春樹雲林一惘然先生自號雲林生墨桃花武陵仙子絳綃裳愛向春風試艷粧一自别來顔色改可堪憔悴見劉郎墨竹喚取官奴秉燭人襪材休惜為傳神不知誰鼓湘靈瑟千里秋風别恨新題僧翠竹蘭若斗室秋隂不受塵箇中只許著間人欲知一體俱無象莫認青青是法身評曰語有悟入贈别草色青青漢水新異鄉聽雨怕逢春客懷不是今年惡頻向東風送故人題中書舍人朱孟辨墨竹楚楚郎官玉雪溫朝回緩步出金門揮毫寫得縣崖竹都是中天雨露痕侍從如亰道經廬州見桂花山路秋花若箇栽天香逺迓馬頭來中官折入君王手不負西風一度開贈洪山霖藏主上人典藏東巖閣閲盡西來貝葉書秋水蓮花千百億一蓮花上一真如送聞侍者逰方習得僧儀巳絶群龍門宗旨更多聞飄然一錫諸方去踏遍青山萬里雲侍者龍門髙弟參侍征南道中一溪水清石可數千峰雨來雲亂行馬蹄踏踏秋風裏無數好詩吟未成竹寨驛前山水清官船夜泊近行營客程一月秋隂裏誤聽湍聲作雨聲秋行一月多逢雨路入南荒總是山煙火人家何處覔鷓鴣啼在石林間書松雪翁墨迹後吳興翰墨人間少白壁黃金價盡低今日鷗波亭下路王孫何處草萋萋詠菊八首花神百斛釀秋香滿注流霞九醖觴令節無如天上好願稱千夀慶重陽右𬗋霞觴黃金地上有名花開向千秋冨貴家不比夀安紅與𬗋紛紛只解競春華右黃牡丹越娘初試素羅裳愛向秋風學靚粧一夜不勝瓊珮冷晚香亭館有新霜右白西施盈盈宫額半塗黃不減花前舊樣粧笑殺阿嬌金屋貯香衾寒怯夜來霜右黃西施不逐春紅淺復深千枝小朵爛於金若教開作翻階艷辜負風霜百煉心右金芍藥秋水池頭看鬪鵝霜毛零落粉香多不知滿地誰收拾剪作寒花照碧波右剪鵝毛一簇竒花上苑栽綵雲堆滿辟寒臺應將重價論千餅買斷秋光二色開右𬗋金團花比宫袍一色黃上林開處占中央臨軒長荷君王賞帶得天家雨露香右御袍黃紀夢小宴初闌罷玉笙東風庭院好春情流鶯啼過樓東去一樹梨花正晚晴過應山縣百里郵亭路更遙馬頭黃葉亂飄蕭兵餘何處尋遺迹千古清風渡蟻橋題米南宫畫碧樹𪷟𪷟雨氣含亂山重疊大江南短橋何處人家近多是當年海嶽庵題墨梅送弟同生廽淞兼憶兄勉翁汝初髫齓我離鄉今日驚看過我長老去可堪為汝别楚雲吳樹鴈行行歸去看花似見兄碧雲紅葉暮山橫東流黃鶴磯頭水不盡秋風送弟情大兄一别經三載昏眼裁書兩淚含為説白頭千里外時時心在𬗋芝庵先隴也京中懷季翔百壷佳醖透鄰香出水新魚滿尺長阿母微醺孫在抱芙蓉湖上好秋光官柳烏啼曙色催滿衣風露早朝廽歸期想在重陽後為報黃花緩緩開夢成大溪溪上清風屋小草幽花分外香白鶴一羣飛不定萬株松下讀書牀題鄉友胡士文所藏小景十年不見故園春盡裏題詩半古人老去風流渾減盡東風花鳥易傷神鄉友顧謹中以山水圗題詩見寄依韻答之九點吳山夢裏青逺煙踈樹晚冥冥何時買得螭頭舫秋水菱歌泖上聽牧牛圖四海熙熙大有年青山牛牧夕陽前誰知六國黃金印不及秋風二頃田江夏奚翁自號竹隱既殁其子瑄寫竹隱圖以寓孝思因題二十八字以慰其意孝感坊中孟氏鄰為親寫竹倍思親百年霜露凄其意不獨當時泣笋人瑄居孟于恭孝感坊側評曰用事親切措辭淳雅諸絶句中此為第一詩江行人家近水磨茶香江影船頭古塔長縱有琵琶舊時月肯將清淚落尋陽千里江行快雪晴白銀為海玉為城舵樓髙處看山興又比常時分外清催舟三日鼓鼕鼕千里江程百丈中兩岸青山看不盡此行未厭石尤風三江風起白鷗飛逺水征帆一片歸怪底黃塵涴吾足白頭未得上漁磯枕上卧病兼旬不下牀小庭花落燕飛忙禁中文墨如山積不道間時日許長一簾飛絮晚悠悠春去光隂肯暫留可怪飛來雙燕子替人間説許多愁飬鴨一羣花鴨東湖上朝放春波晚自來添得癡兒書懶讀持竿一日看千廽季翔小疾在告聞編所作因寄一絶花竹林窗筆硯清初秋一雨便涼生錦囊平淡詩千首近日新編幾卷成季翔有詩名平淡集題唐馬圖立仗才廽脫錦韀奚官騎出飲清泉眀朝若從長楊獵應試君王七寶鞭題寧波樂節婦卷其夫觀儺船溺死歲俗儺船渡未休孤燈白髮幾多愁至今九浹江頭水不盡當年妾淚流出郭二月東風雨腳頻杏花消息未全真今朝出郭看晴景野色江光總是春和鶴年先生訪輔衲和尚詩半霄峰頂擁丹霞兩䇿登登豈憚賖老衲倒穿迎户外山禽啼上石楠花丁丑七月參侍舟中水邊踈草度螢光天際微雲過鴈行坐待海風吹月上舵樓髙處不勝涼夜雨前山曉未開午潮孤渚晚初回東風不住吹三日無數江帆出夾來蘋末涼風起白波一生情事負漁蓑老來偶得看山便日日江行不厭多寄陸伴讀闓朝廽不放寸隂間十日工夫畫一山我有越箋光若練待渠清暇寫荆關南軒瀟灑紙窗明曲几方牀事事清暇日相過不騎馬幅巾野服杖藜行題畫我家住在澱湖東風景依稀似畫中白首曵裾歸未得鷗波千頃屬漁翁黃州畫史王炳文自號臨臯漁隱短棹煙波學釣徒秋風舉網得鮮鱸幾時説與吾鄉味為寫坡仙赤壁圖題寧波胡公鼎雪巢虛白巢中徹夜眀寥寥孤鶴夢難成竹爐火暖茶香裏人比梅花更自清江夏奚瑛以進士出宰武城其兄瑄作鵠山秋思圖寄之索題為賦絶句一首每懷難弟有難兄貌得家莊寄武城千里鵠山秋色裏異鄉多少故鄉情答僧南洲寫梅見寄草年不見老花光寫得繁枝逺寄將一自斷橋相别後暗香幾度月昏黃龍門寺裏梅千樹開遍山南水北莊今日老禪頭巳白寫來無色更無香題吳教授所藏郭奉祠子虛墨梅郎官逺寄一枝春寫得冰花箇箇真黃鶴山房眀月夜暗香踈影屬詩人羅浮道士是前身愛寫江南雪裏春今日香魂招不得看花一度一傷神子虛巳殁𥘉為黃冠題陸二闓墨梅青禽枝上月如霜夢覺羅浮欲斷腸却憶故園池館裏看花一月不燒香題銷寒梅圗日影才將一線加綵毫呵凍染冰葩直教消盡南枝雪却向春風看杏華題奚瑛鵠山書屋黃鵠山家城裏居一城金帛赱商車老夫獨數賢兄弟閉户韲鹽讀父書書山谷道人詩帖後詩因得法能追杜書自名時巳配蘇今日尚餘真迹在月眀滄海見珊瑚雲林先生小景為李至剛參議題故家池館錫山阿門徑寧容俗士過清閟閣空詩社𣪚蛛絲窗户落花多清閟閣先生藏書盡之所落花蛛網先生詩會中題也吳農四時歌家有田廬泖水東門前九朵翠芙蓉鄰翁報我田官至眀日花朝候勸農濱北濱南雨一犁隂隂桑柘鵓鳩啼木龍間挂茅簷下百畝新秧已插齊種得紅芒與白秈五風十雨似堯年髙田無旱低無潦多辦今年賽社錢東鄰社鼓接西鄰酒滿槽頭稻滿囷官稅巳輸私債辦白頭甘作太平民題葛稚川移家圖逺從勾漏覔丹砂服食長年鬢不華從此上升當拔宅何勞跋涉又移家彈琴小景自曵長𥚑兩鬢斑久忘流水與高山而今重理絃中操天賜殘年半日間題鄞江蔡胄松窗讀書圖門外黃塵隘客車林中白日靜吾廬一窗松影清風裏讀盡家傳萬卷書嘗榴錦苞擘破萬星攢顆顆紅堆碼瑙盤若得美人纎手送尊前一洗腐儒酸嘗柑牙盤滿貯洞庭霜入爪霏霏細霧黃老去風流渾忘却擘來三日手猶香題奚瑄雲山佳處羣峰競秀繞儂家流水當門石徑斜閉户不知春已去白雲滿地落松花所撰陸仲益斷事墓銘其子闓求書于後平生忠義氣如雲諸子鵷鸞又出群喬木故家今絶少清風千載玉堂文森玉軒為醫士徐璉賦武昌髙士能醫俗萬箇琅玕繞舍栽一徑清風容直造掃門聽我珮聲來過池陽青山𩔶𩔶過池陽秋水蒹葭露巳霜文選臺荒千載後西風吹雨墨猶香錢家灣夜泊千里江程百丈中磯頭日日浪掀空客杯易醒愁難寐半夜推蓬數問風夜泊鸌港去去歸程泝急流打頭風起又維舟不因采石千罌酒那解青山萬古愁晚宿盤塘旅行今夜宿盤塘江路無如此驛長詩句到家吟未了載將山色上歸航次韻青山夜泊滄江木落水多灣一月舟中飽看山明日到家牽世務間情猶在白雲間辛巳中秋客邊歲月去如流夫婦他鄉共白頭今夕一杯須盡飲人生能得幾中秋棄瓢圖瓢棄後耳才清寵辱人間總不驚今日箕山吊陳迹千岩風水自秋聲題畫柴門春盡動鷗波樹色山光雨後多老去無官能自在醉眠江閣聽漁歌三泖東頭浴鵠灣我家政住水雲間一從失腳黃塵裏不及蕭然此老間畫雞蚤歲書窗共寂寥幾聽風雨夜蕭蕭曵裾今向王門老猶賴司晨朔望朝評曰五七言律至晚唐氣漸衰靡不可為法人所共知惟絶句詩至晚唐所作尤為精緻而知者極少宋人不得其門而入元人惟龍麟洲范清江虞青城得其三尺餘者或日一至或月一至間得之而不純今觀集中諸絶句詩俱有法度豈非嘗私淑于三公者乎
