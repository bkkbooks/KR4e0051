  text: 蚓竅集卷六
  hash: sha256:b8c533191636134dfd063a2240c5bf01b2851fb58941f65c3ebc155bf26fe785
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0051_SBCK_006-1a}
body:
  text: 雲間管時敏撰西域丁鶴年評七言律詩姚氏野春堂野外茅堂不掩扉堂前風日散晴霏梨花門巷清明近春水池塘燕子飛每約鄰翁同社飲更從田畯勸農歸眀朝我亦尋春去小試東風白苧衣宴徐氏樓高宴徐家池上樓座中賔客總風流東城美酒休辭醉南國佳人自解愁晴日逰絲當户落暖風香篆近簾浮歸時不用山公馬短棹春波正滿洲答吳髙士見寄青鞋布襪木綿裘合是山中隱者流舉世可無劉越石薦賢誰是吕婆樓秋風泖蟹年年上春水沙鷗日日浮好為携琴並載酒三高祠下放扁舟和內兄金士廉清明日答張應辰見過雨晴江路少塵沙有客尋春到水涯風細遊絲低著草日斜歸鳥亂穿花青山幾處無新塜喬木何人是故家倩得盤逰春髻子東風日日好將車小雨輕風寒食後一春惟酒是生涯過江不用歌桃葉出郭先宜看杏花亂後此身猶是客醉中隨處即為家白鷗信我忘機事擬買滄洲一釣車清眀感懷二首十年宦學楚江濵老景垂垂上此身插柳忽逢三月節看花又過二分春青山風雨多新鬼白髮江湖少故人東憶墓田千阜下可堪回首一霑巾客裏逢春百感生况聽風雨過清眀楊花總是離人恨桃葉都非舊妾情小引酒杯還易醉苦吟詩句却難成不知誰是窮途者哭似當時阮步兵評曰使去國懷鄉者見之豈不蕭然有感于衷山水圖青山何處躡崚嶒我擬幽棲久未能深谷雨來雲正合大江風作水如崩林中短屐行相引渡口孤航喚欲譍今日未醒塵土夢披圖長嘯愧孫登山水便面宣和便面何從得畫史當時屬有才𬗋翠峰巒天上落青紅樓閣樹頭開羣賢似向蘭亭會一老疑從栗里來評曰畫外之畫安得從容隨杖屨輕舟日繫水雲隈人日偶興宦逰江漢十經春白髮東風鏡裏新千里此身長在客一年今日又逢人雨中柳色黃猶嫩氷後湖光緑更勻藩府官間如化國不知誰是葛天民評曰以人日為化日府僚屬為葛天民可謂善變者矣禮部頒王府文官誥敕次審理王敬德韻𬗋誥恭迎被寵光驛亭初日正蒼涼官坊錦織雲霞爛御榻文成雨露香九五飛龍當盛世太平鳴鳳在朝陽羣公拜舞天威近舉首紅雲是建章元日和季翔韻嘉節金門慶履端無風無雨萬人歡通班新例行中使導駕常儀忝從官列仗才廽燈影曙嚴兵未解甲光寒宴闌歸去恩榮甚醉插宫花上錦鞍御賜西馬金門蹴踏五雲開七尺權竒信是騋近自天間頒賜下逺從西域貢將來雄姿共擬千金價駿足爭誇萬里材昨日錦鞍新鞴出殿前立仗總駑駘參侍平靖州諸蠻次季翔韻親王承詔討南蠻三月星霜𩔶險艱萬斛樓船上秋水千羣鐡騎蹴寒山孔明謾説安夷俗馬援應慙入漢關十二妖酋今盡縛皇華又報捷書還軍屯十萬坪玉帳秋臨十萬坪石家銅鼓夜無聲千團毒霧開山寨萬竈炊煙起野營自信丹心能報國誰知白首厭談兵中官催草征南捷龍燭生花剪更眀丙寅元日軍中次季翔韻羽仗森嚴午夜陳千官行殿慶新春四時佳節逢元日甲子豐年見上旬鵠立久叨居侍史鹿鳴今喜宴嘉賔凱音歸及燒燈候一路東風火樹新評曰徂征有苗古所為難王師一出諸酋授首非長于廟略能若是乎侍從朝亰還國舟中簡府僚諸王入覲試功初恩及吾君慶有餘聖語自天稱國穩臣心何地愧才踈四夷率服英風逺九域同仁化日舒幸遇太平全盛際不妨白首曳長裾欽賦大將征回聖念蒼生重拓邊王師奏捷凱歌琁千營列柵天籠野萬竈連山地湧泉軍渴遇泉魚海于今歸版籍狼荒從此靖風煙華夷一統文眀日共祝吾皇億萬年觀射柳贈陳僉衛琰將種傳家屬妙齡端陽射柳在王庭馬看飛鞚如追電箭訝離弦若迸星度內等間知中白眼中端的肯撩青含風細葛君恩賜自笑吾儕字識丁評曰丁字甚有風刺軍中寄潭府紀善楊應庚奉使君初過武昌從征我已上渠陽雞聲風雨同為客馬首雲山各異鄉千里還家驚臘盡百年依世幸身強相思恐有平安字好寄南來鴈一行寄淞上友人憶昔都門把臂時殷勤索我送行詩客邊賴爾能相慰別後令人有所思芳草暮雲愁忽忽落花春雨鬢絲絲東歸艇子如堪買㝎擬尋君泗水湄送兄勉翁自鳯陽廽淞把酒燈前醉復傾别離無限異鄉情一身千里久為客百歲幾時長見兄春雨園廬青草遍暮雲丘隴紫芝生白頭遂我東轅日數畝圭田淂耦耕題胡長史所藏風晴雨嫩墨竹四首記淂東林臘月栽虛懷今對畫圗開碧雲何處忽飛到蒼雪無聲欲墮來尚覺暮寒生翠袖不驚午蘿斷瑶臺故園茅屋蕭蕭裏若箇家童掃石苔萬個琅玕繞舍栽拂簷金翠曙光開尋常每蘿鸞笙下倣佛遙驂鶴駕來千尺洋州休製襪一竿嚴瀨獨登臺白頭天與歸歟便短策行吟石徑苔移得篔簹谷裡栽柴門蕭爽曉慵開林慙我向當年國醮禮畢送張真人還山真人黃籙修三日聖主丹衷息萬機白玉印封天表進𬗋霞衣惹御香歸雙龍直向雲中見群鶴遙臨日下飛大禮已成還舊隱耆山草木亦光輝于時龍見鶴來評曰全篇雄麗真是唐律贈僧白庵白庵道人修白業一毫曽不染緇塵淨如片月真空性間似孤雲幼寄身馬為馱經行較逺鵝因聽法飬偏馴東林縱有蓮花釀肯作攢眉入社人靈鷲僧勤無逸奉使日本回授官聞欲見舉寄之天宇寥寥一錫飛忽聞承詔赴􅊮闈山中書札三年别海上梯航萬里歸賈島文章終釋褐曹溪弟子孰傳衣白雲出岫無心處老我滄江理釣磯題王秉正雲林清隱青林白谷水雲鄉隱者深居一草堂百道松泉當户落四時花雨入簾香門前車馬紅塵逺座上琴書白日長滿目故家風景在不須重畫輞川莊春暉堂江夏雷道夫典儀奉母之所綵衣五色絢晴光鶴髮康強在北堂結子蟠桃千歲熟宜男諼草百憂忘孝奉慈親知愛曰忠承嚴訓要傾陽晨昏定省無違飬誰得居官不離鄉竹鶴圖為醫士仵惠道題此君風致極蕭間合與胎仙共一班千歲影迷蒼雪裏九臯聲在緑雲間平安莫謾傳書去徑造休教報客還挂向芝房無點俗長年相對恱清顔贈别鄉友孫汝逹故人契闊幾經春千里停雲入夢頻下榻豈期今日會分金寧忘昔時貧乾坤白髮詩名在風雨青鐙酒量真别後音書煩見慰莫令目斷楚江濵附録汝逹見答交契驚踰四十春每蒙存恤意頻頻能將宦逹安醇厚不鄙迂踈處賤貧青眼總知鄉義重蒼顔尤見道心真從今相别希相遇秖自懷思谷水濵題陳士良棲霞軒泉山一室閟丹霞舊是希夷道者家曉曰綺窗生五色春風珠樹吐三花迎仙每服青綃帔引夀時餐赤水砂莫效昔人成痼疾從容好為誦南華訪洪山海禪師用季翔韻今朝立春風物熙東巖閣前尋逺師煙霞丘壑舊逰處金碧樓臺新􅌟時東風官馬去何疾落日家童行欲疲我亦清齋不飲酒與爾結社同幽期送倉使楊宗彝廽沔陽鴈鶩行中見孤鳯采采五色之羽翰平生自是抱竒氣老大何曽辭小官新詩千首不起草生紙百畨能寫蘭眀朝挂帆渡江去花落沔陽春雨寒送長史司吏吳永中役滿還廣東早春公館柳條黃清暇題詩送掾郎白髮簿書官事了青山風雨客程忙船從杜若芳洲發酒向桄榔小店嘗歸及墓田寒食後碧雲東望思茫茫送瀘州判官孫彥搏新除二守向瀘川西上長江萬里船行李莫辭為客逺判花政喜得君賢官鹽歲汲千家井火米時收五月田緩帶從容有佳興寄詩細寫薛濤箋送李雲仲之蓬萊丞蓬萊縣裏神仙宅今日之官獨爾清張鷟文章多中選李紳才業久知名沙門風雨龍腥過海市樓臺蜃氣成報政重來應有約上林三月共聽鶯送僧溥天淵東歸千里孤雲一錫飛西來問法候傳衣幾聽絶壑猿聲過又踏空山虎迹歸離垢已應無黑業隨緣只此是玄機半霄峰下棲禪處莫待巖花老石扉送寶曇應禪師逰峨嵋回金陵峨嵋峰頂絶崚嶒不離塵凡不易登太古雪消丹壑裏普光天在白雲層神鐘日報齋堂飯聖火宵眀佛殿燈六載下山非苦行怕人云是再來僧師是義斷崖再來送廬山福上人東林卓錫幾經春瀑布源頭自在身陶陸舊為方外友宗雷元是社中人過溪一笑千年事浮世重來幾劫塵江上相逢又相别野花何處問通津和鶴年丁先生宿東巖韻兼呈洪山海禪師借榻東巖第幾層山中主者佛圖澄浮榮過眼寧非夢清苦前身本是僧齋罷雲扃時聽講詩成雪屋夜懸燈虎溪有約仍三笑自愧為官老未能評曰于孤苦中翻出一假清致亦足少慰窮愁矣和季翔韻簡洪山海禪師還山八載歸來説苦空禪心只與舊時同賣將薪去誰家事種得松成幾許工雨露無私霑帝澤山林有道振宗風半霄巖下行吟處秋色還歸杖屨中用季翔韻題胡長史所藏東坡墨竹剩水殘山雪後時襪材貌得嵗寒枝歸來內署曽持燭忘却南溪有賦詩岷谷秋隂雲冉冉湘江春碧雨差差展圖如在千竿裏六月涼飊灑鬢絲謝賜虎肉饅頭彤弓親射東山虎細臠籠炊賜百官昨日雄威猶可畏今朝和氣已成團庖丁尚慮風生機倀鬼應驚雪在盤賸種官田千畝麥屯家犬豕夜平安題修江王玠西山舊隱圖君家舊隱知何處遙隔修江𬗋翠岑金碧畫圖聊慰藉煙霞丘壑待登臨水花凝露魚依渚山葉鳴風犬吠林布襪青鞋歸及早莫教猿鶴怨驚深觀音蓮不假淤泥一點栽五銖衣似藕絲裁碧雲幢下分眀見白月輪中自在開根向旃檀新植得種疑鸚鵡舊銜來當知五十三參外示現應須有善財雙竹立亭亭並出林不於千畝竸繁隂雲霄每引鳯凰下風雨或作蛟龍吟夷齊同隱髙節在皇英對泣遺恨深評曰形容逼真何當分箇漁竿去獨釣渭川煙水潯紙被萬杵霜藤練色勻卷舒一幅淨無塵梨花夜暖雲迷夢柳絮春寒雪滿身未怪青綾能見妬也勝臼㲲尚欺貧五更聽徹金門漏得似山林晏起人木芙蓉渚宫仙子耐清寒笑倚西風臉渥丹絳節三朝瓊作珮霓裳一曲翠為盤夜霜漁屋燈前見秋水人家畫裏看可惜繁華易惆悵錦官城上夕陽踐月中桂上界誰將此樹栽廣寒髙處古香來根從天地分時種花在山河影裏開白兔守株依貝闕青鸞銜子下瑤臺不知斫盡吳剛斧天上浮雲變幾廽燈花不假天工雨露栽銀缸火暖自然開兩莖朱草含煙秀一朵紅雲度水來春色半浮珠蓓蕾風情中結錦胚胎眀朝喜事殷勤報莫遣芳心一寸灰和左長史史秉賢詠炭大櫟山中斬不存青山白屋坐來溫晴生五色雲霞氣春活千年鐡石根積雪深時神獨王繁星迸處勢如奔吾生違道難依世三斗逢人亦易吞松窗聽雨為西安楊公圭賦草堂千箇種長松好雨時來𬗋閣峰聲到風枝驚睡鶴勢回雲壑起潛龍暮樵鄰父歸應濕晨汲家僮出更慵且喜官間清兩耳逢人莫説大夫封白雲􅌪富春胡清之隱居席帽山嘗名其室曰白雲􅌪既殁其子去華不忘其親乃繪為圖以寓羮牆之意故為賦詩以慰其孝思云席帽山人隱澗阿白雲深處有行􅌪忽驚仙化從龍去猶想神逰與鶴過門外海濤翻白石屋頭山雨落青蘿太行千載如今日目斷孤飛淚更多寒食三月東風大放顛今年為客倍凄然杏花時節偏聽雨寒食人家不禁煙千里故鄉愁共逺一春白日夢相牽天涯草色青青處秪憶千山墓下田次韻寄洪山海禪師二首杖錫西來住此山道場新構未曽間寶鐘鯨吼神功在金剎翬飛佛運還大法固應超物外勝緣初不離人間千年香火今重見只在圎機一轉關履迹經年不下山山中清事屬僧間日髙香積齋初𣪚雲滿松牀定未還佛法三乘天廣大禪心一月水中間幾時撥芋灰邊坐細話無生第一關季翔弟惟學自嘉禾來武昌省毋及其還也賦詩為别乃翁清江先生有文集行于世惟學壻于沈氏云煙波樓下上行艖小暑董風擬到家二陸弟兄尤俊偉三蘇父子總才華評曰用事的當得體親闈正舞衣多綵甥館應占燭有花愧我蓼莪詩久廢况堪頭白尚天涯對雪半年南國不雨落一夕北風吹雪來城中米價政爾貴江上梅花空自開騎驢朝士曉未出射虎將軍夜不廽寒齋獨坐更愁寂飢鳥下啄青莓苔吳善存侍父勤翁來府中教書復還鄉迎毋逺侍而翁入講帷又迎阿母向慈闈江亭駐馬梨花發春水行舟燕子飛三接恩光新禮幣一門經術舊儒衣重來具慶髙堂上夀酒頻頻送夕暉大别山南紀名山壯楚關虎蹲龍伏大江灣登臨興在風雲外疏鑿功存宇宙間二水合流通漢沔一峰特立控荆蠻澗毛清薦虛祠下惆悵何人繼克艱黃鶴樓黃鶴西飛去不廽青山髙棟自崔嵬當年賣酒人何在今日題詩客又來舟繫城邊官柳發笛吹江上野梅開白雲只在闌干外安得乘之遍九埃北榭舊家行樂小亭臺珠箔青山罨畫開花月當時人已𣪚柳風今日燕還來舞鈿猶委宫牆草步障曽過輦路苔一代繁華易銷歇白榆霜冷鴈聲衣吕仙亭道人高坐朗吟亭古迹因知此地靈劔氣飛來湘水白笛聲吹入楚山青階前丹棗何年熟枕上黃梁幾日醒快我登臨塵事隔摩挲蒼蘚讀碑銘石鏡亭武當祠下仙人鏡纎塵不染絶晶熒看來終夜似眀月知向何年曽隕星天上孤鸞還舞影山中百怪敢逃形偶因登覽坐良久清光照人如夢醒􅉝未初度和季翔見夀日華初上萬年枝官滿雄藩未許辭初度今朝猶是客老來多纍又添兒黃花醉我留連酒白雪驚人唱和詩珍重同袍交契在十年一日共襟期題史仲愚舍人終南山色圗長安壯觀是終南千里秦川盡蔚藍過雨丹青開絶壁浮空𬗋翠結層嵐八關地設東西險三谷天分混沌含待得錦衣歸去日看雲好鑿石為龕重賦胡清之白雲􅌪幽居逺在白雲隈絶徑縈紆長𬗋苔芝草齋房春雨閉松花窗户晚風開漫疑世外神仙侣誰識山中宰相材今日披圗重感慨海天何處鶴飛來江夏劉名才及子陟皆以醫鳴于時鶴年丁先生德其愈病索詩贈之大隱為醫在市㕓千金祕訣自家傳昔時曽起龍歸海今日還將鶴引年舊煉丹爐留宿火新開藥圃灌春泉一門父子神仙似何必壷中别有天題醫士張孟安懶􅌪青年與世似迂踈一室全勝水竹居雲到榻前應共宿草生階下不教除任從野老常爭席無奈鄰人數借書賣藥飬親甘旨備何曽頭過一旬梳哀鶴年先生女兄月娥死節月娥帥娣姒女婦共十人死于水葬蕪湖之黃池里父老題曰十女墓金華戴叔能先生為銘詩姊也從容賊陷城全家殉節萬人驚魚龍應護貞魂在犬豕難虧大義眀世上千年名不泯水中七日面如生至今合塜黃山麓霜月蕭蕭夜共清題審理正蔡原輔練林墓圗藩府同袍十二年練林那忍見新阡親闈夢逺風煙外旅櫬恩深雨露邊表石雖無翁仲貴居廬已有子孫賢哀余東望千將淚老去何時灑墓田哭鍾伯紀先生杖䇿來從浙水東飄飄意氣欲淩空曽經捫蝨談天下幾向聞雞起夜中魯酒也須佳客共商歌直與古人同所知已逝音誰賞絃絶秋鴻膝上桐和謝鶴年先生見夀秋色南山曉共妍今朝初度會羣賢清尊談笑同為客白髮風流半是仙目覩鳯麟當盛世齒隨犬馬待餘年過情佳句煩稱道自愧迂踈敢浪傳參侍赴京廽國聽漏曉辭丹鳯闕停舟晚傍白鷗沙雲歸林麓迷樵徑潮落江汀閣釣艖秋後青天無過鴈霜餘紅樹有啼鴉年年何幸叨陪從秪愧西風兩鬢華黃石磯阻風老我平生江海量此行不覺為銷魂黑風怒若千鼉吼白浪顛如萬馬奔行客帆檣廽浦溆居人煙火失朝昏千金亦有垂堂戒况是餘生荷主恩題陸伴讀闓所藏范寬山水華原真迹人間少不是故家無此圖百谷泉聲猶噴薄萬山雲氣欲模糊年深更覺精靈聚價重寧論性命俱退食從容頻借看此身何必到蓬壷陸氏滄浪漁隱子是天隨幾葉孫家藏釣具至今存秋風鱸美時供饌春水鷗間日到門泛宅豈殊居甫里放舟莫擬入桃源濯纓濯足都休論且對青山倒一尊定齋為張孟安賦知止應無俗事關焚香清坐對南山舊栽靈藥須頻採新注丹經不用刪芳草池塘春水滿落花簾幕午風間此中半席能分我老去逍遙杖屨間送監生馬駿赴亰黃鶴磯頭上驛船柁樓撾鼓下晴川客行二月梨花後人别東風燕子前𬗋極龍飛居九五滄𬈑鵬擊起三千只今登用俱才傑好著勳名及壯年題齊安董升松雲軒幽居長松一百箇滿室白雲終日飄影連遙漢集龍氣音合清颸諧鳳韶采苓道者每相過結巢仙人還可招涼隂六月不知暑坐看甘雨傾天瓢過龍泉山夾口青山四面來山重拱挹水縈廽千年勝地龍泉湧一日佳城鳯穴開佛子嶺頭雲擁樹仙人石迹雨生苔嶽靈應為長呵護五色光生𬗋翠堆華亭錢全慶餘先生奉别草餘年嘗辱垂問因寄謝之鄉里衣冠獨老成秖將清白度平生著書巳續雲間志賣藥寧逃世上名斗酒長歌心自適孤燈細字眼逾明愧余竊祿王門下千里何勤月旦評敬和書堂新成華構新成講席深河間禮樂重推尋南榮日晷三冬近東壁星光午夜臨黃卷聖賢常對語青燈兄弟久潛心金枝玉葉承家訓都在青年惜寸隂過皖城弔余忠宣公元戎百戰守孤城千里蚍蜉絶援兵堡鄣有方文且武簡編無愧死猶生神來遺廟乘雲氣鬼哭空江雜雨聲尚憶李侯並逹帥一時忠義屬科名逹兼善狀元為浙東元帥死干海李子威狀元為江州太守死于郡奉寄茅山道士求香茶茅山歲歲摘先春礞石霏霏磨作塵玄露十分和得細𬗋雲千片製來新頰車味載能消渴鼻觀香傳即咽津若得清風生兩腋便從羽節訪羣真伴讀周庠求題其師敘南遊克成先生雙溪草堂聞道雙溪似瀼西草堂小築足幽棲楊雄竒字知誰問杜甫新詩漫自題滿座荷風魚躍浪一簾花雨燕爭泥白頭無意蒲輪召只恐文光動壁奎題謝生草塘書舍芳草橫塘隱者居長年閉户只觀書門前水暖生科斗座上藝香辟蠹魚力學豈知清苦處夢吟多是黑甜餘宣城風致于今逺為愛雲仍玉不如閲耕軒乃鄉友陳景祺員外父傑翁軒名也瑤溪一曲繞田廬日對耕耘自讀書淳俗無虞那佩犢豐年有夢每占魚頃筐敬饁朝煙裏短杖徐行夕照餘最愛後昆勤播穫始知經訓在災畬荻港雨行昨朝楚岸喜秋晴今日吳船雨裏行人事天時何可測青山白水總關情久知􅉀與沙鷗冷那得身如野鶴輕怪底石尤風太惡空勞百丈進修程早朝和吳教授韻二首大廷禮樂遵周典盛代衣冠邁漢儀一統河山開景運九州民物樂清時遲遲化日行黃道郁郁卿雲藹赤墀蟣蝨小臣無以報萬年宗社祝鴻釐月轉西城禁漏遲千官隊隊入朝時班陪冠珮聮鵷序樂奏簫韶覩鳯儀雨露極知恩似海草茅深愧鬢如絲夔夔何敢忘君敬一寸丹心在緝熙評曰以治世之音討清朝之盛豈賈幼鄰之流亞歟次韻有懷周府奉祠宋季子故人為別動經年况𣸪祠官久不遷白髮交遊惟我舊清時文物尚君賢匆匆過蘿隨胡蝶的的歸心在杜鵑無限相思千里外暮雲春樹兩茫然送顧謹中赴蜀府紀善憶昔論交並黑頭那知一别歲如流暮雲春樹幾千里風北枝南二十秋宦海有時思往蘿醉鄊無處著間愁慰情書札煩頻寄老我年來倦倚樓送曹公啓金聲楚楚見雄詞玉質溫溫識令儀春水鵝羣當墨沼曉星雞語旁書帷忽驚滄海遺珠久始覺青雲薦剡遲今日鵬程應九萬別情不盡送行詩評曰黃文獻公語曰文章莫難于詩詩莫難于唐律今觀集中五七言律體製嚴整或間出新語亦𣸪清復豈非淂文獻所謂難者歟
