  text: 蚓竅集卷二
  hash: sha256:f7950c10201e16afe266df9b005003003b67c19fe24a264a596d58260538fe57
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0051_SBCK_002-1a}
body:
  text: 雲間管時敏撰西域丁鶴年評五言古詩白馬篇白馬行且嘶玉勒錦障泥揚鞭羽林郎宿衛通金閨一朝赴邊急轉戰玉關西長戈揮白日髙旌卷彩霓驅山填火井纍石起雲梯烽舉星芒亂弓開月影低分符降赤勒飛箭㝎吽黎㓛許韓彭並名與衛霍齊主恩諒可報國難詎難擠孰甘局鄉邑門巷閉蒿藜逺逰篇御風日萬里逍遙登逺逰竦身青冥表瞬息四顧周目力隘八極壯志局九州泰山小封垤滄海眇浮漚俯視澒洞間萬彚等蜉蝣浩歌挾洪崖長嘯訪浮丘回飊欵閶闔謁帝十二樓酌我𬗋霞觴遺我青鳯裘授以長生訣歷劫三千秋從兹謝流俗大塊同悠悠評曰飄飄然有輊舉之意少小從行伍二首少小從行伍而今作飲徒博錢尋劇孟買劔問風胡結伴軍中戲嗔人醉後扶黃金三萬鎰誓娶陸家姑少小從行伍千金辦武裝日騎官廄馬夜宿酒家娼知已寧論死臨危肻畏強蠻夷知姓字不敢犯封疆評曰任俠之狀儼在目前銅爵妓銅爵髙臺上西陵古墓邊君恩徒自重妾貌竟誰憐羞掩歌時扇愁登舞後筵惟餘漳浦月三五夜空圎二隱圖溪上放舟廽山中負薪暇一笑偶相逢於焉遂清話寧知有秦晉况復論王霸回首總忘機青山夕陽下評曰題二隱圖者多矣無若此詩如親與二隱接談者結句尤為脫灑星夕牛渚清且淺鵲橋西復東黃姑仙駕動天女錦機空别淚零清露離魂慘驚風如何一水隔一㑹一匆匆監生王廷采分教中都國學植槐于庭扁曰槐軒求題虛星孕良木植彼文苑中教雨既沾溉枝葉何青䓗常刑庶無犯守護克有終嵗久已云茂鬱然若雲從諸生儼成列弦誦怡清風伊人抱良材樹德匪爾同當知進修者亦由滋培功秋夜不寐耿長夜攬衣徒歔欷隂蟲吟近砌涼飊動踈幃素抱殊未釋清歡念多違豈惟南飛鵲兹夕無所依寫懷朝廽憩公館殘陽坐來暝踈雨過髙林華月出東嶺流光晨復晡朱顔豈吾永故園歸何時悠然發深省病後喜雨謝同寅紀善貝季翔見過夜月忽離畢今晨雨滂沱秋聲落庭樹水氣沒池荷豈云三伏中感此涼意多神清體自適頓然釋煩痾眀當謁公館仰謝數經過曉起直館曉晴初官清逺塵俗怡然對簡編庶矣忘榮辱遙峰擁歸雲髙城淡微旭落盡凍青花江南雨新足評曰秋夜至此四詩有選人風致聽松樓為國學林敬伯賦涼飈度中林長松發清響震蕩出巖巒蕭騷納天壤初疑繁絃作復訝驚濤上倐爾若崩奔悠然亦平廣大音本無聲至理奚有象復動陽始生姤靜隂已往逹人居髙眀㑹茲適真飬心靜聽轉聰慮屛神逾爽豈彼㕓市間啾啾局塵坱好招陶隱居山中一清賞和陸伴讀闓過梅根江行愜素懷遐覽匪逰冶開蓬望九華隱隱白雲下素波眀逺川青天入平野烟樹淡欲無風泉斷還㵼因知渼陂舟差勝習池馬斯逰樂未央我輩胡為者評曰辭嚴意新過蕪湖望天門山揚帆下蕪湖梁山在吾目大江從西來天門勢如束川日波上眀野樹烟中緑良朋有佳製每愧貂難續顧兹欲忘言何以慰心曲和吳教授晚泊大信阻風樓船遡流上髙帆阻長風大江浩無際一氣何鴻濛回望天門山峩峩相長雄洪濤走其下屹立西與東不有浮海歎豈無濟川㓛大鵬度寥廓斥鷃守卑叢物理固有定世事徒匆匆張燈啓華筵一笑杯酒中評曰辭氣雄渾襟懷曠逹上慈母磯危石立江中揚帆泝流上潮回慈母磯木落和尚港野闊風㬌眀秋净天宇廣西望淮山青持杯愜吾賞
