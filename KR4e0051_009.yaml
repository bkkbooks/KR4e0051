body:
  text: 雲間管時敏撰西域丁鶴年評六言絶句墨蘭青草三閭亭下蒼梧二女祠前欲采幽芳寄逺月明秋水娟娟楚畹光風曉泛湘臯泫露秋零我欲紉之為佩幽懷挹此芳馨題墨梅送友人黃鶴樓中玉笛看花吹徹春聲一别故人何處江南月落參橫應山道中櫟木千株葉落梅花一樹香來從騎休吹羌管山中野鶴驚猜
