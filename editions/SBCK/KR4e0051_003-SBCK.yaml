  text: 蚓竅集卷三
  hash: sha256:161e3795701e5f19bc0e0d198ace1aecbf30c1d3332fd682a42ef17f4d842e9b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0051_SBCK_003-1a}
body:
  text: 雲間管時敏撰西域丁鶴年評五言律詩逰寳林寺金碧絢樓臺禪關向此開水分雙澗出雲擁萬峰来古佛遺香火殘僧話刦􅁅黄塵吾老矣何幸一徘􅆦獨坐獨坐茅堂上長吟不下牀亂書堆几席踈􅀨過陂塘野燕衝簾入汀花度水香應須存晚計次第學畊桑荅友人􅀨中見􅀉􅀨聲連曉夕牢落閉幽扉屋漏頻移榻江寒更覔衣野烏飢自下水鳥濕還飛爾亦忘機者終同理釣磯過田家偶過呉家墅殘陽半掩扉逺汀低樹宻小徑􅇎花稀新酒浮篘釅鮮鱗墜釣肥年来任踈􅂴一醉即􅁯歸郊居二首移家雖偪側只此􅁕幽居茅屋三間小春田廿畝餘人来論稼穡自學杷犁鋤東舍催租急烹雞酌小胥春城俯平野草色静柴門魚蟹舟中市桑麻屋後村遣兒招社飲為客置盤飱老計䏻如此陶然付一尊評曰獨坐詩至此共五首以恬澹心造清淳語是䏻安其所遇無慕乎其外者欤贈洪山龍門海禪師侍者真浄祝􅄠名真浄􅀙今浄已真誦經當作佛持律定過人江月空中夜山花物外春龍門多寳蔵種種是竒珎送宗師還玉泉寺省師何處去古寺玉泉清山笠披雲過江船趂月行拈香叅祖塔乞食到王城此去傳心印應知道可成和季翔夣與海禪師看牡丹之作師時以事京栽松道者栽松去何因㸔牡丹相思春獨苦􅀌夣夜初殘子已空中見師應㝎裏觀歸時當記取饒舌問豐干其二太息東巖叟艱危命若絲當知成佛日還有受魔時短􅄠蕭蕭落􅀌心耿耿持可堪江樹晚千里動遐思夣逰洪山寺不到東巖閣重来又一年無縁􅀎離俗有夣只棲禪客坐茶香裏僧行竹影􅁁夕陽天未晚幽思滿歸韀從征古州蠻廻途紀驛二十三首晨􅀤渠陽郡歸心一惘然離家今五月為客巳中年暮雨行人裏春􅅺去馬前洪江眀日到沽酒上官船右􅀤靖州行行過若水古驛在江臯自是登舟險終無䇿馬勞山雲含宿􅀨灘石漏奔濤此地如􅀎􅀮塵煩或我􅏉右洪江夜過安江驛停舟不敢行􅅍山蔵月色暗石皷灘聲千里􅀙軍事中宵感客情不眠聊伏枕天白更􅀌征右安江早行今㡬里又􅀃次潼安古驛􅃄中入前山雨裏看江廽逢斷洑水落見危灘濁酒雖非􅄝聊持破暁寒右潼安江口何年驛過逢􅁒雨天居人張夜火使客換春船雲起崇山外江通溆浦前鸕鷀灘已過今夕解衣眠右江口歸舟春水疾舉棹即辰溪岸轉山疑動江分路􅁒迷乾坤千里客風雨五更雞自愧如萍跡飄飄未㝎棲右辰溪武􅁜溪上驛囙紀武􅁜名樹列千旗􅀔江喧萬鼓聲生苗今向化落草乆無兵好載桐艚酒㳂山看晚晴右武溪王程不敢緩四日下辰陽古木􅀅軍廟春波使者航城依山􅀔險江納􅀨聲長莫上觀瀾閣傷心在異郷右怡溶今日行兹驛如何是北溶雲濤千􅁆里􅃄樹萬餘重江黒留春棹林虚動夜舂驛官應被酒出迓甚踈慵右北溶天設非常險舟航豈易過大風掀逆浪暗石起盤渦行路難如此垂堂意若何榜人殊可恠不住唱蠻歌右清浪歷險過髙都都前景色殊江廽千石盡岸斷一山􅀌自昔無危道于今即坦途宵征􅀙此去舟子亦懽呼右髙都勝地古桃川尋真亦偶然今来江上客未遇洞中仙碧樹收新雨青山􅇈逺􅃄不知何處路迷却釣魚船右緑蘿大鎮開戎衛雄城雉堞連仙人曽鑄􅂦帝子復停船夜􅀨燒燈後春雷起蟄前邊隅今巳靖佇聽凱歌旋右府河江上龍陽縣遙遙百里程青山雲外小白鳥􅀨邊眀臘酒沽應熟春薑種已生驛人䏻雅致髙閣榜臨清右河池擾擾天涯客悠悠武口船年光雙􅁂裏春事百花前浮世身如􅀉還家夣屢牽眀朝過湖去風熟片帆懸右武口已遂南逰興歸帆過洞庭浪花風裏白汀草􅀨中青一􅀧麈無染千杯酒亦醒好􅀅江叟笛吹與老蛂聽右眀山洞庭八百里􅀔與兩湖通日月蒼茫際乾坤混沌中青山僧寺􅀨白浪客帆風浩蕩論胸次王師小戰㓛右城􅁜飬鴨人何在猶傳飬鴨䦨野􅃄青草晚江􅀨緑波寒表驛名因勝充庖味可餐兹禽應解語豈敢學彈丸右鴨䦨曺公兵敗處今識在嘉魚赤壁三分後烏林百戰餘橋浮春渡闊舟泊夜江虚千古英雄事悲􅈵太史書右石頭口桃花江上驛春水賣新魚滿尺銀堪比千鱗錦不如因歌悲客裏毎食感王餘評曰形容至此不惟出竒可謂一飯不忘君矣江海親朋少誰傳一紙書右魚山武昌歸已近今日過簰洲沙泊春廽鴈江喧晚浴鷗白芲梅欲盡青葉柳初柔鶴駕来天上新晴􅇺逺逰右簰洲衘命来金口郵籖報驛程好風行十日殘月上三更商舶停初稳漁燈照更眀同袍一尊酒珎重逺相迎右金口江驛行初盡今晨到武昌宦情如昨日春色是他郷烏鵲知人喜駑駘怯路長家童應念我戴月􅀱舟傍右夏口評曰􅀙征詩廿三首各因其山川險易風景明晦首首不同是得紀行之法緑蘿河池眀山三聮皆有聲之畫江行二首夜度繁昌夾雲帆萬斛船㟁燈踈樹裏江􅅇晚風前水急潮廽渚江空月在川年年来復往華髮漸􅄹顛行行㡬百里又過十三磯宿鴈逢沙落驚鳬帶水飛山寒花寂寞江晚樹依稀自􅀏無家客他郷亦當歸病足二首移榻西軒下翛然意自清焚香終日坐好鳥隔牕鳴文墨容踈􅂴賔朋失送迎自慙猶禄仕那得此身䡖老為身多累官因病暫閑春餘啼鳥裏興盡落花間莫遣詩排悶聊慿酒破顔開牕看晴色一片白雲還齋居直舘直舘齋居夜心無一慮縈茶􅃄籠燭暗花月進窓明老去頭雖白官閒夣亦清明朝當署祝早起􅀱宫城評曰敬謹之心不遑寧處送僧景怡住持黄梅四祖寺杖錫雙峰去登登向白雲焚香禮祖罷􅀃法與僧聞蘿幌清風入松門碧靄分若無行脚念終老逺塵氛丁丑仲春聞兄勉翁囙門後􅀙軍不知戌所有憂而作書劄望平安那知報急難宦途嗟我隔親塜念誰㸔􅃄瘴南州􅀬風沙北地寒鶺鴒原上淚雙䄂㡬時乾評曰友于之愛急難之憂流出肺腑贈僧龍翼雲形迹無拘礙飛行遍九垓騰空那假錫度海不湏杯花落千峰􅀨松喧萬壑雷老人應聽法一日㡬多廽評曰與諸僧詩用其本色語作我佳麗句是化乳酪為醍醐也雲谷為武昌奚瑄賦空谷幽人意閒雲静者心石圍芲下奕泉荅竹間琴鶴影蒼巖逺雞聲碧樹深雖云住城市何異在山林侍宴封内春祠罷宫中胙宴開席􅀙廊署設樂自殿庭来中使廵筵過千官被酒廽樂􅀖瞻盛事紀述愧無才次季翔韻送陳僉衛琰征大庸蠻􅀅軍名􅀅種承詔討南蠻虜命危如卯兵威重若山斬酋花石下焚寨柿溪間一月聞三捷長歌奏凱還題蔡用強石城山房絶境羣峰合幽居一徑分巖花和􅀨落林鳥隔雲聞門熟呼猿果書香辟蠧芸不因徴召起終是逺人群題脩江向自誠静樂軒深巷無車馬衡門盡日扃古苔迷曲砌春草滿閒庭雨笠嫌蘇戴風瓢厭許聴香消清晝永自閱太玄經觀孔雀朝竒鳥當晴午􅇛􅇛展羽衣翠分雙扇舉金擁一屛圍綵鳯宜偕舞文翬敢並飛東園非有召何􅄑覩恩輝過烏沙夾荅諸僚友二首暁過烏沙夾秋風萬斛舟青天雲際鴈白浪水中鷗兄弟皆良㑹江山􅁕勝逰行行紅日近佳氣靄皇州黄石磯頭酒烏沙夾口舟暮雲随逺鵠秋水泛輕鷗賦詠陪前軰經過念昔逰風㠶􅀎借便只尺是神州入都門下馬入都門熈熈㬌色温水朝滄海闊星拱􅂵宸尊麟鳳千官集熊羆百􅀅屯鴻臚早通籍稽首謝君㤙早朝宫城猶下漏禁鼓巳催班初日眀三殿清風肅九􅀜臚傳仙仗裏香裊御爐間幸際隆平日承恩拜聖顔出都門天上還家日沙邊解䌫時亂山含宿翠飛鳥戯晴絲野眺偏宜逺江行不厭遲正期逰汗漫何􅄑值雍熈􅀤新河次韻自忝王門禄頻年此地過秋風迴逺道暮雨宿新河白浪鷗邊小青山鴈外多客杯相􅇺藉一酌總恩波廻􅀙經陽邏陽邏行􅀅近淘金過淺灘草痕秋更碧江氣晚逾寒世情尤拙還家跡易安客愁雖似海未敵酒杯乾舟中寫示蕭雷二伴讀拜秩辭亰􅀦􅀭帆放使舟微茫􅃄外􅀣浩蕩􅀨中鷗詩美青山對杯空采石謀應􅀅柁樓興一望楚天秋過采石水急灘難上行行欲曙天人家多賣酒客路暫停船采石荒祠下黄山古塔邊經過人易老搔首一茫然曉發雷港月暗􅄬寒港天眀􅀤暁途鷺應尋宿侣鴈已誤更奴霞暎㳂汀􅖋霜枯􅀝㟁蘆彭郎磯尚逺􅀮􅀮一山􅀌小􅀌山一柱千尋直􅀌根萬丈深雲間盤翠䯻天外墮瑤簮東下潮聲㫁西来水􅀔臨古祠詩滿壁過者若為吟和呉教授夜飲二首短􅁂燈前白衰顔酒後紅光隂百年内談咲㡬迴同禮樂雍熈日衣冠揖譲風吾儕逢盛際何得在蒿蓬出水鱸魚白經霜柿實紅一杯今夕㑹四座故人同佳句多新意清談有古風勸酬須盡量不必問飄蓬曉發涇江月黒天難曙涇江曉發遲艫聲和􅀨合帆意待風吹小酌杯仍醉􅄀捜句頗竒黄花如有約開及到家時次陸伴讀風雨舟中客路三秋雨江帆萬里船驚鷗離急浪去鳥沒荒􅃄白日長歌裏青山薄醉前新詩雖寡和緩筆待重編次韻過􅄆花洲赤壁軍回處曽扵此􅄆芲跳魚驚過艣落鳥立行槎山逺雲連樹江清水見沙風帆今日便應送早還家送程彦眀歸􅀭州分韻得愁字離人江上發歸思滿芳洲客路􅃄中􅀣春帆􅀨外舟青山千里别白首十年逰應有璚花詠還􅀅􅇺逺愁題長史胡去華􅀞竹阿翁􅀎愛竹又與竹傳神萬户不湏等一枝尤可人渭川􅃄外晚湘水􅀨餘春終日宜相對應忘徑造頻寓菴身世寧非􅀉浮生任􅀁如心惟無滯礙跡故得安舒孔席何曽暖莊舟本自虚百年霄壤内豈異一􅕋廬
