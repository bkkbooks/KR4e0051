  text: 蚓竅集卷六
  hash: sha256:b8c533191636134dfd063a2240c5bf01b2851fb58941f65c3ebc155bf26fe785
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0051_SBCK_006-1a}
body:
  text: 雲間管時敏撰西域丁鶴年評七言律詩姚氏野春堂野外茅堂不掩扉堂前風日散晴霏梨花門巷清明近春水池塘燕子飛每約隣翁同社飲更􅀙田畯勸農歸眀朝我亦尋春去小試東風白苧衣宴徐氏樓高宴徐家池上樓座中賔客總風流東城美酒休辭醉南􅀦佳人自解愁晴日逰絲當户落暖風香􅂐近簾浮歸時不用山公馬短棹春波正滿洲荅呉髙士見􅀉青鞋布襪木綿裘合是山中􅀮者流舉世可無劉越石薦賢誰是吕婆樓秋風泖蟹年年上春水沙鷗日日浮好為携琴幷載酒三高祠下放扁舟和内兄金士㢘清明日荅張應辰見過􅀨晴江路少塵沙有客尋春到水涯風細㳺絲低著草日斜歸鳥􅅍穿花青山㡬處無新塜喬木何人是故家倩得盤逰春髻子東風日日好􅀅車小􅀨䡖風寒食後一春惟酒是生涯過江不用歌桃葉出郭先宜看杏花亂後此身猶是客醉中随處即為家白鷗信我忘機事擬買滄洲一釣車清眀感懐二首十年宦學楚江濵老㬌垂垂上此身挿柳忽逢三月節看花又過二分春青山風􅀨多新􅀑白􅄠江湖少故人東憶墓田千阜下可堪回首一霑巾客裏逢春百感生况聽風雨過清眀楊花總是離人恨桃葉都非􅃇妾情小引酒杯還易醉苦吟詩句却難成不知誰是窮途者哭似當時阮􅇍兵評曰使去􅀦懐郷者見之豈不蕭然有感于􅇆山水圖青山何處躡崚嶒我擬幽棲乆未􅀎深谷雨来雲正合大江風作水如崩林中短􅄚行相引渡口􅀌航喚欲譍今日未醒塵土夣披圖長嘯媿孫登山水便面宣和便面何􅀙得􅀞史當時属有才􅂵翠峰巒天上落青紅樓閣樹頭開羣賢似向蘭亭會一老疑􅀙栗里来評曰􅀞外之􅀞安得從容隨杖屨䡖舟日繫水雲隈人日偶興宦逰江漢十經春白􅄠東風鏡裏新千里此身長在客一年今日又逢人雨中柳色黄猶嫰氷後湖光緑更匀藩府官閒如化􅀦不知誰是􅁑天民評曰以人日為化日府僚属為􅁑天民可謂善變者矣禮部頒王府文官誥􅃙次審理王敬徳韻􅂵誥恭迎被寵光驛亭初日正蒼􅈵官坊錦織雲霞爛御榻文成􅀨露香九五飛龍當盛世太平鳴鳳在朝陽羣公拜舞天威近舉首紅雲是建章元日和季翔韻嘉節金門慶􅂂端無風無雨萬人歡通班新例行中使􅋚駕常儀忝􅀙官列仗􅅻廽燈影曙嚴兵未觧甲光寒宴䦨歸去恩榮甚醉挿宫花上錦鞍御賜西馬金門蹴踏五雲開七尺權竒信是騋近自天閑頒賜下逺􅀙西域貢􅀅来雄姿共擬千金價駿足争誇萬里材昨日錦鞍新鞴出殿前立仗總駑駘叅侍平靖州諸蠻次季翔韻親王承詔討南蠻三月星霜㦄險艱萬斛樓船上秋水千羣鐡􅀐蹴寒山孔明謾􅀃安夷俗馬援應慙入漢關十二妖酋今盡縛皇華又報捷書還軍屯十萬坪玉帳秋臨十萬坪石家銅鼓夜無聲千􅇛毒霧開山寨萬竈炊煙起野營自信丹心􅀎報􅀦誰知白首厭談兵中官催草征南捷龍燭生花剪更眀丙寅元日軍中次季翔韻羽仗森嚴午夜陳千官行殿慶新春四時佳節逢元日甲子豐年見上旬鵠立乆叨居侍史鹿鳴今喜宴嘉賔凱音歸及燒燈􅀱一路東風火樹新評曰徂征有苗古􅀁為難王師一出諸酋授首非長于廟略􅀎若是乎侍􅀙朝亰還􅀦舟中簡府僚諸王入覲試功初恩及吾君慶有餘聖語自天稱􅀦稳臣心何地愧才踈四夷率服英風逺九􅏾同仁化日舒􅄑遇太平全盛際不妨白首曳長裾欽賦大􅀅征囬聖念蒼生重拓􅁁王師奏捷凱歌琁千營列栅天籠野萬竈連山地湧泉軍渇遇泉魚海于今歸版籍狼荒􅀙此靖風􅃄華夷一統文眀日共祝吾皇億萬年觀射柳贈陳僉衛琰􅀅種傳家属妙齡端陽射柳在王庭馬㸔飛鞚如追電箭訝離弦若迸星度内等間知中白眼中端的肯撩青含風細􅁑君恩賜自咲吾儕字識丁評曰丁字甚有風刺軍中􅀉潭府紀善楊應庚奉使君初過武昌􅀙征我已上渠陽雞聲風雨同為客馬首雲山各異郷千里還家驚臘盡百年依世􅄑身強相思恐有平安字好􅀉南来鴈一行􅀉淞上友人憶昔都門把臂時殷勤索我送行詩客邊頼爾􅀎相慰別後令人有􅀁思芳草暮雲愁忽忽落花春雨􅁂絲絲東歸艇子如堪買㝎擬尋君泗水湄送兄勉翁自鳯陽廽淞把酒燈前醉復傾别離無限異郷情一身千里乆為客百􅀊㡬時長見兄春雨園廬青草遍暮雲丘隴紫芝生白頭遂我東轅日􅁆畝圭田淂耦畊題胡長史􅀁蔵風晴雨嫩墨竹四首記淂東林臘月栽虚懐今對畫圗􅄏碧雲何䖏忽飛到蒼雪無聲欲墮来尚覺暮寒生翠䄂不驚午萝斷瑶􅄗故園茅屋蕭蕭裏若箇家童掃石苔萬个琅玕遶舍栽拂檐金翠曙光開尋常每萝鸞笙下彷彿遥驂鶴駕来千尺洋州休製韈一竿嚴瀨獨登臺白頭天與歸欤便短策行吟石逕苔移得篔簹谷􅂻栽柴門蕭爽曉慵􅄏林慙我向當年國醮禮畢送張真人還山真人黄籙􅁱三日聖主丹􅂨息萬機白玉印封天表進􅂵霞衣惹御香歸􅀟龍直向雲中見群鶴遥臨日下飛大禮已成還􅃇􅀮􅂄山草木亦光輝于時龍見鶴来評曰全篇雄麗真是唐律贈僧白庵白庵道人􅁱白業一毫曽不染緇塵淨如片月真空性閒似􅀌雲㓜􅀉身馬為䭾經行較逺鵝因聴法飬偏馴東林縱有蓮花釀肯作攢眉入社人靈鷲僧勤無逸奉使日本回授官聞欲見舉􅀉之天宇寥寥一錫飛忽聞承詔赴􅊮闈山中書札三年别海上梯航萬里歸賈島文章終釋􅄄曹溪弟子孰􅀓衣白雲出岫無心䖏老我滄江理釣磯題王秉正雲林清􅀮青林白谷水雲郷􅀮者深居一草堂百道松泉當户落四時花􅀨入簾香門前車馬紅塵逺座上琴書白日長滿目故家風景在不須重畫輞川莊春暉堂江夏雷道夫典儀奉母之􅀁綵衣五色絢晴光鶴􅄠康強在北堂結子蟠桃千歳熟宜男諼草百憂忘孝奉慈親知愛曰忠承嚴訓要傾陽晨昏定省無違飬誰得居官不離郷竹鶴圖為醫士仵惠道題此君風致極蕭閑合與胎僊共一班千歳影迷蒼雪裏九臯聲在緑雲間平安莫謾􅀓書去徑造休教報客還掛向芝房無􅀧俗長年相對恱清顔贈别郷友孫汝逹故人契闊㡬經春千里停雲入夢頻下榻豈期今日㑹分金寜忘昔時貧乾坤白髪詩名在風雨青鐙酒量真别後音書煩見慰莫令目㫁楚江濵附録汝逹見荅交契驚踰四十春每䝉存恤意頻頻能將宦逹安醇厚不鄙迂踈䖏賤貧青眼緫知郷義重蒼顔尤見道心真從今相别希相遇秖自懐思谷水濵題陳士良棲霞軒泉山一室閟丹霞􅃇是希夷道者家曉曰綺窓生五色春風珠樹􅄍三花迎仙毎服青綃帔引夀時湌赤水砂莫效昔人成痼疾從容好為誦南華訪洪山海禪師用季翔韻今朝立春風物熈東巖閣前尋逺師􅃄霞丘壑􅃇逰處金碧樓臺新􅌟時東風官馬去何疾落日家童行欲疲我亦清齋不飲酒與爾結社同幽期送倉使楊宗􅂜廽􅃆陽鴈䳱行中見孤鳯采采五色之羽翰平生自是抱竒氣老大何曽辭小官新詩千首不起草生紙百畨􅀎寫蘭眀朝掛帆渡江去花落􅃆陽春􅀨寒送長史司吏呉永中役滿還廣東早春公舘柳條黄清暇題詩送􅁺郎白髮簿書官事了青山風雨客程􅋉船􅀙杜若芳洲發酒向桄榔小店甞歸及墓田寒食後碧雲東望思茫茫送瀘州判官孫彦搏新除貳守向瀘川西上長江萬里船行李莫辭為客逺判花政喜得君賢官塩歲汲千家井火米時收五月田緩帶􅀙容有佳興􅀉詩細寫薛濤牋送李雲仲之蓬莱丞蓬莱縣裏神仙宅今日之官獨爾清張鷟文章多中選李紳才業乆知名沙門風􅀨龍腥過海市樓臺蜃氣成報政重来應有約上林三月共聽鶯送僧溥天淵東歸千里孤雲一􅃬飛西来問法􅀱傳衣㡬聴絶壑猿聲過又踏空山虎跡歸離垢已應無黒業随縁只此是玄機半霄峰下棲禪處莫待巖花老石扉送寳曇應禪師逰峨嵋廻金􅁜峨嵋峰頂絶崚嶒不離塵凡不易登太古雪消丹壑裏普光天在白雲層神鐘日報齋堂飯聖火宵眀佛殿燈六載下山非苦行怕人云是再来僧師是義斷崖再来送廬山福上人東林卓錫㡬經春瀑布源頭自在身陶陸􅃇為方外友宗雷元是社中人過溪一咲千年事浮世重来㡬刼塵江上相逢又相别野花何處問通津和鶴年丁先生宿東巖韻兼呈洪山海禪師借榻東巖第㡬層山中主者佛圖澄浮榮過眼寧非夣清苦前身本是僧齋罷雲扃時聴講詩成雪屋夜懸燈虎溪有約仍三咲自媿爲官老未䏻評曰于􅀌苦中翻出一叚清致亦足少慰窮愁矣和季翔韻簡洪山海禪師還山八載歸来􅀃苦空禪心只與􅃇時同賣􅀅薪去誰家事種得松成㡬許工􅀨露無私霑帝澤山林有道振宗風半霄巖下行吟處秋色還歸杖屨中用季翔韻題胡長史􅀁蔵東坡墨竹剰水殘山雪後時韈材貌得嵗寒枝歸来内署曽持燭忘却南溪有賦詩岷谷秋隂雲冉冉湘江春碧􅀨差差展圖如在千竿裏六月􅈵飊灑􅁂絲謝賜虎肉饅頭彤弓親射東山虎細臠籠炊賜百官昨日雄威猶可畏今朝和氣已成􅇛庖丁尚慮風生机倀􅀑應驚雪在盤賸種官田千畝麥屯家犬豕夜平安題􅁱江王玠西山􅃇􅀮圖君家􅃇􅀮知何處遙隔􅁱江􅂵翠岑金碧􅀞圖聊􅇺藉􅃄霞丘壑待登臨水花凝露魚依渚山葉鳴風犬吠林布襪青鞋歸及早莫教猿鶴怨驚深觀音蓮不假淤􅅺一􅀧栽五銖衣似藕絲裁碧雲幢下分眀見白月輪中自在開根向旃檀新植得種疑鸚鵡􅃇衘来當知五十三叅外示現應須有善財􅀟竹立亭亭並出林不於千畝竸繁隂雲霄毎引鳯凰下風􅀨􅂉作蛟龍吟夷齊同􅀮髙節在皇英對泣遺恨深評曰形容逼真何當分箇漁竿去獨釣渭川􅃄水潯紙被萬杵霜藤練色勻卷舒一幅净無塵梨花夜暖雲迷夣柳絮春寒雪滿身未怪青綾䏻見妬也勝臼㲲尚欺貧五更聽徹金門漏得似山林晏起人木芙蓉渚宫仙子耐清寒􅀏􅀝西風臉渥丹絳節三朝瓊作珮霓裳一曲翠為盤夜霜漁屋燈前見秋水人家􅀞裏看可惜繁華易惆悵錦官城上夕陽踐月中桂上界誰􅀅此樹栽廣寒髙處古香来根􅀙天地分時種花在山河影裏開白兎守株依貝闕青鸞衘子下瑤臺不知斫盡呉剛斧天上浮雲變㡬廽燈花不假天工雨露栽銀缸火暖自然開兩莖朱草含􅃄秀一朶紅雲度水来春色半浮珠蓓蕾風情中結錦胚胎眀朝喜事殷勤報莫遣芳心一寸􅁅和左長史史秉賢詠炭大櫟山中斬不存青山白屋坐来温晴生五色雲霞氣春活千年鐡石根積雪深時神獨王繁星迸處􅀔如奔吾生違道難依世三斗逢人亦易吞松牕聽雨為西安楊公圭賦草堂千箇種長松好􅀨時来􅂵閣峰聲到風枝驚睡鶴􅀔廻雲壑起潛龍暮樵隣父歸應濕晨汲家僮出更慵且喜官閒清兩耳逢人莫􅀃大夫封白雲􅌪富春胡清之􅀮居蓆帽山甞名其室曰白雲􅌪既殁其子去華不忘其親乃繪為圖以寓羮􅉹之意故為賦詩以慰其孝思云蓆帽山人􅀮澗阿白雲深處有行􅌪忽驚仙化􅀙龍去猶想神逰與鶴過門外海濤翻白石屋頭山雨落青蘿太行千載如今日目斷􅀌飛淚更多寒食三月東風大放顛今年為客倍凄然杏花時節偏聴􅀨寒食人家不禁􅃄千里故郷愁共逺一春白日夣相牽天涯草色青青處秪憶千山墓下田次韻􅀉洪山海禪師二首杖錫西来住此山道塲新構未曽間寳鐘鯨吼神功在金刹翬飛佛運還大法固應超物外勝縁初不離人間千年香火今重見只在圎機一轉關􅂂跡經年不下山山中清事属僧閒日髙香積齋初􅄆雲滿松牀定未還佛法三乗天廣大禪心一月水中間㡬時撥芋􅁅邊坐細話無生第一關季翔弟惟學自嘉禾来武昌省毋及其還也賦詩為别乃翁清江先生有文集行扵世惟學婿于沈氏云􅃄波樓下上行艖小暑董風擬到家二陸弟兄尤俊偉三蘇父子總才華評曰用事的當得體親闈正舞衣多綵甥舘應占燭有花媿我蓼莪詩乆廢况堪頭白尚天涯對雪半年南􅀦不􅀨落一夕北風吹雪来城中米價政爾貴江上梅花空自開􅀐驢朝士曉未出射虎􅀅軍夜不廽寒齋獨坐更愁寂飢鳥下啄青莓苔呉善存侍父勤翁来府中教書復還郷迎毋逺侍而翁入講帷又迎阿母向􅄌闈江亭駐馬梨花發春水行舟燕子飛三接恩光新禮幣一門經術􅃇儒衣重来具慶髙堂上夀酒頻頻送夕暉大别山南紀名山壮楚關虎蹲龍伏大江灣登臨興在風雲外䟽鑿功存宇宙間二水合流通漢􅃆一峰特立控荆蠻澗毛清薦虚祠下惆悵何人繼克艱黄鶴樓黄鶴西飛去不廽青山髙棟自崔嵬當年賣酒人何在今日題詩客又来舟繫城邊官柳􅀤笛吹江上野梅開白雲只在闌干外安得乗之遍九埃北榭􅃇家行樂小亭臺珠箔青山罨􅀞開花月當時人已􅄆柳風今日燕還来舞鈿猶委宫􅉹草􅇍障曽過輦路苔一代繁華易銷歇白榆霜冷鴈聲衣吕仙亭道人高坐朗吟亭古蹟因知此地靈劔氣飛来湘水白笛聲吹入楚山青階前丹􅀥何年熟枕上黄梁㡬日醒快我登臨塵事隔摩挲蒼蘚讀碑銘石鏡亭武當祠下仙人鏡纎塵不染絶晶熒㸔来終夜似眀月知向何年曽隕星天上􅀌鸞還舞影山中百恠敢逃形偶因登覽坐良乆清光照人如夣醒􅉝未初度和季翔見夀日華初上萬年枝官滿雄藩未許辭初度今朝猶是客老来多累又添兒黄花醉我留連酒白雪驚人唱和詩珎重同袍交契在十年一日共襟期題史仲愚舍人終南山色圗長安壮觀是終南千里秦川盡蔚藍過􅀨丹青開絶壁浮空􅂵翠結層嵐八關地設東西險三谷天分混沌含待得錦衣歸去日看雲好鑿石為龕重賦胡清之白雲􅌪幽居逺在白雲隈絶逕縈紆長􅂵苔芝草齋房春雨閉松花牕户晚風開漫疑世外神仙侣誰識山中宰相材今日披圗重感嘅海天何處鶴飛来江夏劉名才及子陟皆以醫鳴于時鶴年丁先生徳其愈病索詩贈之大􅀮為醫在市㕓千金祕訣自家傳昔時曽起龍歸海今日還􅀅鶴引年􅃇煉丹爐留􅀫火新開藥圃灌春泉一門父子神仙似何必壷中别有天題醫士張孟安􅂴􅌪青年與世似迂踈一室全勝水竹居雲到榻前應共宿草生階下不教除任􅀙野老常争席無奈隣人􅁆借書賣藥飬親甘㫖備何曽頭過一旬梳哀鶴年先生女兄月娥死節月娥帥娣姒女婦共十人死于水􅁙蕪湖之黄池里父老題曰十女墓金華戴叔䏻先生為銘詩姊也􅀙容賊䧟城全家殉節萬人驚魚龍應護貞魂在犬豕難􅃜大義眀世上千年名不泯水中七日面如生至今合塜黄山麓霜月蕭蕭夜共清題審理正蔡原輔練林墓圗藩府同袍十二年練林那忍見新阡親闈夣逺風􅃄外旅櫬㤙深􅀨露邊表石雖無翁仲貴居廬已有子孫賢哀余東望千􅀅淚老去何時灑墓田哭鍾伯紀先生杖䇿来􅀙淛水東飄飄意氣欲淩空曽經捫蝨談天下㡬向聞雞起夜中魯酒也須佳客共商歌直與古人同􅀁知已逝音誰賞絃絶秋鴻􅂰上桐和謝鶴年先生見夀秋色南山曉共妍今朝初度㑹羣賢清尊談咲同為客白􅄠風流半是仙目覩鳯麟當盛世齒随犬馬待餘年過情佳句煩稱道自愧迂踈敢浪傳叅侍赴京廽􅀦聽漏曉辭丹鳯闕停舟晚傍白鷗沙雲歸林麓迷樵逕潮落江汀閣釣艖秋後青天無過鴈霜餘紅樹有啼鴉年年何􅄑叨陪從秪愧西風兩鬢華黄石磯阻風老我平生江海量此行不􅁴為銷魂黒風怒若千鼉吼白浪顛如萬馬奔行客㠶檣廽浦溆居人􅃄火失朝昏千金亦有垂堂戒况是餘生荷主恩題陸伴讀闓􅀁蔵范寛山水華原真蹟人間少不是故家無此圖百谷泉聲猶噴薄萬山雲氣欲模糊年深更􅁴精􅂕聚價重寧論性命俱退食􅀙容頻借㸔此身何必到蓬壷陸氏滄浪漁􅀮子是天随㡬葉孫家蔵釣具至今存秋風鱸美時供饌春水鷗閒日到門泛宅豈殊居甫里放舟莫擬入桃源濯纓濯足都休論且對青山倒一尊定齋爲張孟安賦知止應無俗事關焚香清坐對南山􅃇栽􅂕藥須頻採新註丹經不用刪芳草池塘春水滿落花簾幙午風閒此中半席䏻分我老去逍遙杖屨間送監生馬駿赴亰黄鶴磯頭上驛船柁樓撾鼓下晴川客行二月梨花後人别東風燕子前􅂵極龍飛居九五滄􅈚鵬擊起三千只今豋用俱才傑好著勲名及壮年題齊安董昇松雲軒幽居長松一百箇滿室白雲終日飄影連遙漢集龍氣音合清颸諧鳳韶采苓道者毎相過結巢仙人還可招􅈵隂六月不知暑坐看甘􅀨傾天瓢過龍泉山夾口青山四面来山重拱挹水縈廽千年勝地龍泉湧一日佳城鳯穴開佛子嶺頭雲擁樹仙人石跡􅀨生苔嶽靈應為長呵護五色光生􅂵翠堆華亭錢全慶餘先生奉别廿餘年甞辱垂問因􅀉謝之郷里衣冠獨老成秖􅀅清白度平生著書巳續雲間志賣藥寧逃世上名斗酒長歌心自適􅀌燈細字眼逾明愧余􅀼禄王門下千里何勤月旦評敬和書堂新成華構新成講席深河間禮樂重推尋南榮日晷三冬近東壁星光午夜臨黄卷聖賢常對語青燈兄弟乆潛心金枝玉葉承家訓都在青年惜寸隂過皖城弔余忠宣公元戎百戰守􅀌城千里蚍蜉絶援兵堡鄣有方文且武簡編無愧死猶生神来遺廟乗雲氣􅀑哭空江􅇎􅀨聲尚憶李侯幷逹帥一時忠義属科名逹兼善狀元為淛東元帥死干海李子威狀元為江州太守死于郡奉􅀉茅山道士求香茶茅山歲歲摘先春礞石霏霏磨作塵玄露十分和得細􅂵雲千片製来新頰車味載䏻消渇鼻觀香傳即嚥津若得清風生兩腋便􅀙羽節訪羣真伴讀周庠求題其師叙南游克成先生雙溪草堂聞道雙溪似瀼西草堂小築􅁕幽棲楊雄竒字知誰問杜甫新詩漫自題滿座荷風魚躍浪一簾花􅀨燕争泥白頭無意蒲輪召只恐文光動壁奎題謝生草塘書􅃕芳草横塘􅀮者居長年閉户只觀書門前水煖生科斗座上芸香辟蠹魚力學豈知清苦處夣吟多是黑甜餘宣城風致于今逺為愛雲仍玉不如閱耕軒乃郷友陳景祺員外父傑翁軒名也瑤溪一曲繞田廬日對耕耘自讀書淳俗無虞那佩犢豐年有夣每占魚頃筐敬饁朝􅃄裏短杖徐行夕照餘㝡愛後昆勤播穫始知經訓在菑畬荻港􅀨行昨朝楚㟁喜秋晴今日呉船􅀨裏行人事天時何可測青山白水總關情乆知􅉀與沙鷗冷那得身如野鶴輕怪底石尤風太惡空勞百丈進􅁱程早朝和呉教授韻二首大廷禮樂遵周典盛代衣冠邁漢儀一統河山開景運九州民物樂清時遲遲化日行黄道郁郁卿雲藹赤墀蟣蝨小臣無以報萬年宗社祝鴻􅁵月轉西城禁漏遲千官隊隊入朝時班陪冠珮聮鵷序樂奏簫韶覩鳯儀􅀨露極知㤙似海草茅深媿鬂如絲䕫䕫何敢忘君敬一寸丹心在緝􅄉評曰以治世之音討清朝之盛豈賈幼鄰之流亞欤次韵有懐周府奉祠宋季子故人為別動經年况􅂧祠官久不遷白􅄠交游惟我舊清時文物尚君賢怱怱過萝随胡蝶旳旳歸心在杜䳌無限相思千里外暮雲春樹兩茫然送頋謹中赴蜀府紀善憶昔論交並黒頭那知一别􅀊如流暮雲春樹㡬千里風北枝􅀯二十秋宦海有時思往萝醉鄊無䖏著閑愁慰情書剳煩頻􅀉老我年来倦􅀝樓送曹公啟金聲楚楚見雄詞玉質温温識令儀春水鵞羣當墨沼曉星雞語㫄書帷忽驚滄海遺珠久始覺青雲薦剡遅今日鵬程應九萬別情不盡送行詩評曰黄文獻公語曰文章莫難于詩詩莫難于唐律今觀集中五七言律軆製嚴整或間出新語亦􅂧清復豈非淂文獻􅀁謂難者欤
