body:
  text: 唐人有言文章實小技於道未為尊此非知言者也夫道之顯者謂之文故道以文而􅀓而文􅀁以為載道之噐也道不違乎人人之為文而違乎道豈􅁕以言文㢤况乎聲音之道與政通於其清濁髙下疾徐促緩而道之升降政之美惡俗之隆汚係焉盖審音􅁕以知政聞樂􅁕以知徳皇明受天命一海内光岳之氣渾融純全灝灝噩噩之文渢渢乎其音播之宇宙時則楚有􅃇學之臣曰雲間管公時敏輔翼庄賛開陳啓沃凡二十五年而賢王仁厚明恕寅畏㳟儉之徳聞於天下公自紀善超左長史属余来􅇱貟陪位得日聆其緒言餘論間出示􅀁自作詩一編古製近體通若干首舂容乎其意度鏗乎其節奏追􅅣乎其文章其言麗以則其思深以逺其義葩而正温柔敦厚不迫不切方諸古人亦未多讓顧自謙曰蚓竅集夫古之人􅁱於身者不必施於政事施於政矣無待見於言語然徳之􅀤於口者為言盖和順積中而英華發外自有不容已者公立身行事實踐其言故􅀤為文辭和平中正其可􅀓於来世也較然矣而公之􅀁可以垂不朽者則不在是也賢王侈公之徳欲夀其傅命刻諸板余不敏僣序其朔云永樂元年歳次癸未春三月望日奉議大夫楚府右長史山隂胡粹中序全菴記前浙江按察僉事安成周子冶譔中書舎人廣平程南雲􅂐中書舎人姚江柴蘭書記曰父母全而生之子全而歸之可謂孝矣至若全其􅀁受於天者以為徳焉固天民之秀出者歟奉政大夫楚府左長史致政管公命其菴居曰全者其有得於斯矣公字時敏松江華亭人㓜而頴異九歲􅀎詩父母􅀁鍾愛比壮儀觀偉然㝎省之暇即研精竹素授詩於敬思劉先生習其舉業學古文於㢘夫楊先生且作樓曰冝逺延納執友資其藻礪若􅀽景文鄭本初鍾伯紀倪元鎮錢思復錢慶餘皆其人也當元之季閉門講授其志固有存矣國朝洪武六年以六科取士郡守㢘潤以公應令至則以外艱免九年徴拜楚王府紀善出入禁邸者五年寅畏小心未始有過上有事郊廟太常輙承誓命俾􅀙豆􅇼之執十有四年􅀙主君之國恭謹􅆠力事不避難自紀述譔載以至出内命令必盡乃心寅入酉出雖祁寒暑雨未甞暫還私苐毎朝進見退食之餘坐直廬中綜覈一切倦即􅀝壁假􅄰少選復然二十餘年常若一日主君察而噐之三十一年㑹左長史缺奏以属公既陟元僚總理庶務益得展其素藴乃鞠躬盡瘁求􅀁以報恩竉而荅知遇者無或弗至盖知無弗言言必當理事無苟􅀙必由於義歸羙君上而未甞有自矜之色故主君亦推心聴納國以善治作式藩屏人寡過焉在職十年公亦年登七十乞致其事以歸田里主君閔其勞効居多不忍其去已親製詩一章以道其意命王世子特書忠勤良佐四大字以褒之命諸郡王咸賦詩以羙之命右長史中㑹稽胡公作忠勤良佐之傳合為臣軸以賜賚子無算且請命於上留置本國祿之終身􅀊中宴饗接以賔禮風晨月夕引見不時遣賜珎饌繼踵於庭公雖􅂄艾視聴不衰容色晬然不忘啓沃主君愈親重之退而􅀷惟曰吾待罪陪輔㡬四十年得全四體以􅀙先臣皆主君之賜吾沒世不䏻忘也乃十扵郡城之東不二舎而逺曰黄屯山者以為息焉之􅀁且築菴其側命之曰全而属子冶以記其篤於君臣之義而通夫晝夜之道者如此初公年及知命未有息子主君為之悒然及􅀙討蠻宼於銅鼓用公之畫悉破斬之諸􅀅以四鄕隣於宼壤欲殄其衆公進言曰是雖荒裔亦人􅀋也柰何草薙而禽獮之主君􅀷以為然咸得不死護衛指揮使蔡春退而嘆曰公以一言活數萬人之命其必有後矣越數年果􅀗懸弧之慶主君聞之大喜錫名延枝教育於宫中洎抵于成室以戚畹永樂十四年奏爲伴讀於是父子咸有祿食吉月而朝父先子後榮遇無比而克退讓以濟羙焉盖人之大倫有五克盡其道於一二者猶鮮今公恱親以信於友得君以達其道昆弟無故夫婦偕老而有令子以繼其志其徳於天而具已者厚矣皇極􅀁謂嚮用五福者公尚有焉惟公眠食加愛以保期頥使大夫國人皆有􅀁矜式固王君之至意亦士林之􅀁􅀷􅂅也子冶不佞内交於公也後而於令子有忘年之契庸拜手次其􅀁聞見者為之記若夫公􅀁自著曰蚓竅集秋香百詠還郷紀行者已並行於當世云
