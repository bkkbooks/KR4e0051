body:
  text: 雲間管時敏撰西域丁鶴年評七言絶句脩竹芙蓉水僊小隊自成雙裊裊霓旌引翠幢一夜湘君頭盡白西風離思滿秋江題玄真詩意圖千峰雲氣涌如泉逺樹微茫斷復連秪有大夫橋下路青山都属釣魚船􅀞扇南州六月暍欲死一見新圖眼遽眀何處長林雙樹下矮牀茅屋聽秋聲題秋江漁釣蒹葭霜落水無埃野艇維堤晚未開為愛青山不歸去橋頭􅃒莫大夫来題倪元鎮先生小㬌泖上相逢記昔年風姿曄曄似神仙如今看盡渾疑夣春樹雲林一惘然先生自號雲林生墨桃花武陵仙子絳綃裳愛向春風試艶粧一自别来顔色改可堪憔悴見劉郎墨竹喚取官奴秉燭人韈材休惜為傳神不知誰鼓湘靈瑟千里秋風别恨新題僧翠竹蘭若斗室秋隂不受塵箇中只許著閒人欲知一體俱無􅁚莫認青青是法身評曰語有悟入贈别草色青青漢水新異郷聽雨怕逢春客懐不是今年惡頻向東風送故人題中書舍人朱孟辯墨竹楚楚郎官玉雪温朝回緩􅇍出金門揮毫寫得縣崖竹都是中天雨露痕侍􅀙如亰道經廬州見桂花山路秋花若箇栽天香逺迓馬頭来中官折入君王手不􅀒西風一度開贈洪山霖蔵主上人典蔵東巖閣閱盡西来貝葉書秋水蓮花千百億一蓮花上一真如送聞侍者逰方習得僧儀巳絶群龍門宗㫖更多聞飄然一錫諸方去踏遍青山萬里雲侍者龍門髙弟叅侍征南道中一溪水清石可􅁆千峰雨来雲􅅍行馬蹄踏踏秋風裏無􅁆好詩吟未成竹寨驛前山水清官船夜泊近行營客程一月秋隂裏誤聴湍聲作雨聲秋行一月多逢雨路入南荒總是山􅃄火人家何處覔鷓鴣啼在石林間書松雪翁墨蹟後呉興翰墨人閒少白壁黄金價盡低今日鷗波亭下路王孫何處草萋萋詠菊八首花神百斛釀秋香滿注流霞九醖觴令節無如天上好願稱千夀慶重陽右􅂵霞觴黄金地上有名花開向千秋冨貴家不比夀安紅與􅂵紛紛只解競春華右黄牡丹越娘初試素羅裳愛向秋風學靚粧一夜不勝瓊珮冷晚香亭舘有新霜右白西施􅄹􅄹宫額半塗黄不減花前􅃇様粧􅀏殺阿嬌金屋貯香衾寒怯夜来霜右黄西施不逐春紅淺復深千枝小朶爛於金若教開作翻堦艶􅇳􅀒風霜百煉心右金芍藥秋水池頭㸔闘鵝霜毛零落粉香多不知滿地誰收拾剪作寒花照碧波右剪鵝毛一簇竒花上苑栽綵雲堆滿辟寒臺應􅀅重價論千餅買斷秋光二色開右􅂵金團花比宫袍一色黄上林開處占中央臨軒長荷君王賞帶得天家雨露香右御袍黄紀夣小宴初䦨罷玉笙東風庭院好春情流鶯啼過樓東去一樹梨花正晚晴過應山縣百里郵亭路更遙馬頭黄葉􅅍飄蕭兵餘何處尋遺跡千古清風渡蟻橋題米南宫􅀞碧樹􅄥􅄥􅀨氣含􅅍山重疊大江南短橋何處人家近多是當年海嶽庵題墨梅送弟同生廽淞兼憶兄勉翁汝初髫齓我離郷今日驚㸔過我長老去可堪為汝别楚雲呉􅀣鴈行行歸去看花似見兄碧雲紅葉暮山横東流黄鶴磯頭水不盡秋風送弟情大兄一别經三載昬眼裁書兩淚含為􅀃白頭千里外時時心在􅂵芝庵先隴也京中懐季翔百壷佳醖透隣香出水新魚滿尺長阿母微醺孫在抱芙蓉湖上好秋光官柳烏啼曙色催滿衣風露早朝廽歸期想在重陽後為報黄花緩緩開夣成大溪溪上清風屋小草幽花分外香白鶴一羣飛不定萬株松下讀書牀題郷友胡士文􅀁蔵小景十年不見故園春盡裏題詩半古人老去風流渾減盡東風花鳥易傷神郷友顧謹中以山水圗題詩見􅀉依韻荅之九􅀧呉山夣裏青逺烟踈樹晚􅁳􅁳何時買得螭頭舫秋水菱歌泖上聴牧牛圖四海熈熈大有年青山牛牧夕陽前誰知六􅀦黄金印不及秋風二頃田江夏奚翁自號竹􅀮既殁其子瑄寫竹􅀮圖以寓孝思因題二十八字以慰其意孝感坊中孟氏隣為親寫竹倍思親百年霜露凄其意不獨當時泣笋人瑄居孟于㳟孝感坊側評曰用事親切措辭淳雅諸絶句中此為第一詩江行人家近水磨茶香江影船頭古塔長縦有琵琶􅃇時月肯􅀅清淚落尋陽千里江行快雪晴白銀為海玉為城舵樓髙處看山興又比常時分外清催舟三日鼓鼕鼕千里江程百丈中兩岸青山看不盡此行未厭石尤風三江風起白鷗飛逺水征帆一片歸恠底黄塵涴吾足白頭未得上漁磯枕上卧病兼旬不下牀小庭花落燕飛􅋉禁中文墨如山積不道閒時日許長一簾飛絮晚悠悠春去光隂肯暫留可恠飛来􅀟燕子替人閑􅀃許多愁飬鴨一羣花鴨東湖上朝放春波晚自来添得癡兒書􅂴讀持竿一日看千廽季翔小疾在吿聞編􅀁作因􅀉一絶花竹林牕筆硯清初秋一􅀨便􅈵生錦囊平澹詩千首近日新編㡬􅃃成季翔有詩名平澹集題唐馬圖立仗􅂊廽脫錦韀奚官􅀐出飲清泉眀朝若􅀙長楊獵應試君王七寳鞭題寧波樂節婦卷其夫觀儺船溺死歲俗儺船渡未休孤燈白􅄠㡬多愁至今九浹江頭水不盡當年妾淚流出郭二月東風􅀨脚頻杏花消息未全真今朝出郭看晴景野色江光總是春和鶴年先生訪􅀘衲和尚詩半霄峰頂擁丹霞兩䇿登登豈憚賖老衲倒穿迎户外山禽啼上石楠花丁丑七月叅侍舟中水邊踈草度螢光天際微雲過鴈行坐待海風吹月上舵樓髙處不勝􅈵夜􅀨前山曉未開午潮􅀌渚晚初迴東風不住吹三日無􅁆江帆出夾来蘋末􅈵風起白波一生情事􅀒漁蓑老来偶得看山便日日江行不厭多􅀉陸伴讀闓朝廽不放寸隂閒十日工夫􅀞一山我有越箋光若練待渠清暇寫荆􅀜南軒瀟灑紙牕明曲几方牀事事清暇日相過不􅀐馬幅巾野服杖藜行題􅀞我家住在澱湖東風景依稀似􅀞中白首曵裾歸未得鷗波千頃属漁翁黄州􅀞史王炳文自號臨臯漁􅀮短棹煙波學釣徒秋風舉網得鮮鱸㡬時􅀃與吾郷味爲寫坡仙赤壁圖題寧波胡公鼎雪巢虚白巢中徹夜眀􅋁􅋁􅀌鶴夣難成竹爐火暖茶香裏人比梅花更自清江夏奚瑛以進士出􅈗武城其兄瑄作鵠山秋思圖􅀉之索題爲賦絶句一首每懐難弟有難兄貌得家荘􅀉武城千里鵠山秋色裏異郷多少故郷情荅僧南洲冩梅見􅀉廿年不見老花光寫得繁枝逺􅀉􅀅一自斷橋相别後暗香㡬度月昏黄龍門寺裏梅千樹開遍山南水北荘今日老禪頭巳白寫来無色更無香題呉教授􅀁蔵郭奉祠子虚墨梅郎官逺􅀉一枝春寫得冰花箇箇真黄鶴山房眀月夜暗香踈影屬詩人羅浮道士是前身愛冩江南雪裏春今日香魂招不得看花一度一傷神子虚巳殁􅀄為黄冠題陸二闓墨梅青禽枝上月如霜夣􅁴羅浮欲斷膓却憶故園池舘裏看花一月不燒香題銷寒梅圗日影􅂊􅀅一線加綵毫呵凍染冰葩直教消盡南枝雪却向春風看杏華題奚瑛鵠山書屋黄鵠山家城裏居一城金帛赱商車老夫獨數賢兄弟閉户韲鹽讀父書書山谷道人詩帖後詩因得法䏻追杜書自名時巳配蘇今日尚餘真蹟在月眀滄海見􅃢瑚雲林先生小景爲李至剛叅議題故家池舘錫山阿門逕寧容俗士過清閟閣空詩社􅄆蛛絲牕户落花多清閟閣先生蔵書盡之所落花蛛網先生詩會中題也呉農四時歌家有田廬泖水東門前九朶翠芙蓉隣翁報我田官至眀日花朝􅀱勸農浜北浜南雨一犁隂隂桑柘鵓鳩啼木龍閑掛茅簷下百畝新秧已挿齊種得紅芒與白秈五風十􅀨似堯年髙田無旱低無潦多辦今年賽社錢東隣社鼓接西隣酒滿槽頭稻滿囷官稅巳輸私債辦白頭甘作太平民題􅁑稚川移家圖逺從勾漏覔丹砂服食長年髩不華從此上昇當㧞宅何勞䟦渉又移家彈琴小景自曵長􅅂兩髩斑乆忘流水與高山而今重理絃中操天賜殘年半日閑題鄞江蔡胄松牕讀書圖門外黄塵隘客車林中白日静吾廬一牕松影清風裏讀盡家傳萬卷書嘗榴錦苞擘破萬星攅顆顆紅堆碼碯盤若得美人纎手送尊前一洗腐儒酸嘗柑牙盤滿貯洞庭霜入爪霏霏細霧黄老去風流渾忘却擘来三日手猶香題奚瑄雲山佳處羣峰競秀遶儂家流水當門石逕斜閉户不知春已去白雲滿地落松花所撰陸仲益㫁事墓銘其子闓求書于後平生忠義氣如雲諸子鵷鸞又出群喬木故家今絶少清風千載玉堂文森玉軒爲醫士徐璉賦武昌髙士􅀎醫俗萬箇琅玕繞舍栽一逕清風容直造掃門聽我珮聲来過池陽青山㦄㦄過池陽秋水蒹葭露巳霜文選臺荒千載後西風吹􅀨墨猶香錢家灣夜泊千里江程百丈中磯頭日日浪掀空客杯易醒愁難寐半夜推蓬􅁆問風夜泊鸌港去去歸程泝急流打頭風起又維舟不因采石千罌酒􅄼解青山萬古愁晚宿盤塘旅行今夜宿盤塘江路無如此驛長詩句到家吟未了載􅀅山色上歸航次韻青山夜泊滄江木落水多灣一月舟中飽㸔山明日到家牽世務閒情猶在白雲間辛巳中秋客邊歳月去如流夫婦他郷共白頭今夕一杯湏盡飲人生􅀎得㡬中秋棄瓢圖瓢棄後耳􅂊清寵辱人間總不驚今日箕山吊陳跡千岩風水自秋聲題畫柴門春盡動鷗波樹色山光􅀨後多老去無官䏻自在醉眠江閣聽漁歌三泖東頭浴鵠灣我家政住水雲間一從失脚黄塵裏不及蕭然此老閒畫雞蚤􅀊書窓共寂寥㡬聴風雨夜蕭蕭曵裾今向王門老猶頼司晨朔朢朝評曰五七言律至晩唐氣漸衰靡不可為法人所共知惟絶句詩至晚唐所作尤為精緻而知者極少宋人不得其門而入元人惟龍麟洲范清江虞青城得其三尺餘者􅂉日一至或月一至間得之而不純今觀集中諸絶句詩俱有法度豈非甞私淑扵三公者乎
