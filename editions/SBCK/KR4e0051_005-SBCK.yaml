front:
  text: 蚓竅集卷五
  hash: sha256:7113a4be782d953fb650f22806eee8f6e31c369dd6c8bb02545c319642ecd51f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0051_SBCK_005-1a}
body:
  text: 雲間管時敏撰西域丁鶴年評七言古詩墨牕為越人趙撝謙賦女媧立極斷鰲足羲畫之先無刻木始觀鳥跡製文字夜􅀑哭天天雨粟􅂐􅀠變化生八分行草復作何紛紛六書古制既茫眛載籍况遭秦火焚後之作者不可􅁆形聲寥寥􅆌千古更論得法神妙間自信臨池心獨苦君居於越文獻􅀖家蔵金石書滿牕磨穿青州老未巳萬斛巨鼎疇􅀎扛呉興宗人巳物故淛河東西誰獨􅇍君今有志繼絶學砥柱中流見孤注剡溪百畨冰雪光玄霞一斗松煤香滿堂賔客㸔揮灑風雨颯颯龍鸞翔我嗟􅂗鴉手如􅁄屢􅁒􅀙君問竒畫君還許我載酒来我捧千鍾勞君筆評曰意古辭工諸長篇中惟此為最尹母行雲間尹母年十七嫁夫三年夫病卒舅姑在堂兒在褓自分㷀㷀守空室家貧何以為生理紉縫得錢奉甘㫖門外春風自徃来寒心一寸如􅁅死評曰寫出尹母鐡石肝腸東家議􅊚張綺筵西隣通媒續㫁弦有山可移志不改冰霜凛凛心逾堅􅀌兒今年三十五教飬成人應門户舅姑百歳俱夀蔵華榜旌書照郷土九峰三泖清且竒栢舟泛泛淞之湄吾郷風俗有如此終古不愧尹母詩李哥行覇州李哥年十五出身本是娼家女誓死願作良人妻不願随群學歌舞白頭阿􅭊不見容籍我花名入官府李哥有志不得酬終夜號咷淚如􅀨兒今未免從毋命母也湏當聽兒語浄洗容顔不食葷一􅁫一裙只荆苧唱歌得錢贍阿􅭊此身不敢辭􅉝苦東城酒樓花滿􅃄五􅁜公子羅尊爼衆中一少忽相嘲李哥出門氣如虎益津縣􅁥䡖薄兒不惜黄金買同處阿􅭊貪金不顧兒暝地甘言宻相許縣監夜半排闥入李哥拒之閉其户大言痛詈汝􅁥邑汝何不知民父母手操白刄不容狎縣􅁥慙惶走無􅀁覇州太守聞且驚吾州此女深可取有子讀書舉秀才年逾弱冠未婚娶通媒六禮議成􅊚一州歡傳得貞婦後来賊兵犯覇州李哥與夫遭賊虜賊見李哥美顔色但言殺夫不殺汝李哥得言即誓死與夫同死河之滸烏乎李哥節義俱赫赫聲名振今古我今聞之多慨慷激烈悲風起林莾他年觀我李哥行賊子奸臣靣如土評曰李哥之行固有可取不遇士大夫爲之發揮亦與草木同腐巳至正之变忠臣節婦豈特此耳是所遇有幸不率也稼村贈郷人孫原璘我家三里汀前住茅堂政近桃花渚學經不眀欲歸耕佃得官田廿餘畝有書盡賣買農具甘作東屯種田父侯疆既足把犁鋤餉婦尤􅀎載筐筥田中蟊稗日自除􅉹下蠶桑春可取秋風禾􅁰既登塲冬日雞豚復􅄹圃全家衣食􅄑餘饒老稚那知有􅉝苦東隣擊鼓送農官西舍烹羊祀田祖且喜征科一事無况是豐年好官府縣吏催租不下郷半夜無人打門户官粮輸􅁕私債無一村帖然如按堵自信扵焉老此身豈謂年来繫簮組汨汨黄塵􅃿馬頭白水青山竟虚負羡君學稼如老農乆抱長材􅀮家墅奉親菽水喜平安教子書詩識今古我今不蠶亦不耕素餐厚禄知何􅀘㡬時上䟽乞東歸白頭相尋願爲侶與爾擊壤歌堯年五日一風十日􅀨春江捕魚圖玄真坊中老孫子老去今年不知㡬緑蓑短短僅􅃒身自小求魚足生理魚倉蟹舍小蓬門一帶編隣住江涘昨夜青山得􅀨多門前三尺桃花水大家漁具都上船水靣紛然若浮蟻小兒捩柁立船梢老婦供炊在蓬底大繩屬網絶中流東船􅂊下西船起須􅁷兩船相向開来徃風波疾如駛前船得魚先上城後船廽篙刺沙觜此賔此主尚杯盤樵青已卧蘆花裏醒者垂鈎醉者眠東去西来随􅀁止不欠官家魚稅錢榮辱從来不干已我家江南山水間􅃄樹叅差絶相似作客天涯未得歸一見此圖心獨喜俸錢㡬時當買山小築茅堂三泖尾白頭方是謝官時也學漁家􅀙此始題胡長史雪舟卷萬里漫漫凍雲黒六花飄飄朔風急富春江頭行依稀汀鳥沙禽飢不飛此時先生乘一舸擁鼻長吟蓬底坐白鶴氅衣寒半披東西㳂洄随􅀁之須􅁷雪深風轉大結䌫歸来且髙卧妻兒凍餓甘守貧升斗不思千故人東方日出徴書下縣官扣門来勸駕仝􅀅軍歌仝􅀅軍壮且武前年去年殺兩虎受賜黄金百兩歸釃酒椎牛宴同伍意氣驕矜不可當自謂千人何足􅁆今年􅅮虎東城下虎亦慿􅁜肆其怒一抉􅀅軍雙目睛可憐竟作荒郊土烏乎勇不可恃利不可取汝不侮渠渠敢侮汝不見東海之濵釣魚父白頭龍鍾八十五評曰語有規戒題蔡􅀅軍春擊毬圖中都五月炎光薄旭日曈朧射金閣無風無􅀨好端陽鼓聲鼕鼕動城郭諸王閱武出東華打毬又是常年約宫扇齊分五色雲天人坐擁青􅁝幙虎士嚴屯千衛兵毬塲千􅇍平如削綵門逺處放毬来萬夫馬上俱欣躍半輪缺月地中生一􅀧流星天際落衆皆努力向前趍苦心獨取仍難掠武昌􅀅軍稱絶竒膽氣􅀙容有經略等閑一擊過毬門四面騰聲總驚愕中官傳㫖催賜金一沠鐃歌半空作百萬人中奪綵廽人生獨有􅀙軍樂􅀙軍樂樂何如賢王豈事為懽娯太平武􅇱不可無乃知􅀅軍美丈夫雄才勇略應時須他年選􅀅防邊隅論功直與衛霍俱畫􅁚麒麟徴此圗評曰徤筆縦横有與蔡􅀅軍意氣争雄長患足行晚朝􅀐馬歸風雨忽蕭瑟中塗雖泥濘馬稳􅄑無失到家下馬燈火眀妻子見我懽相迎開筵舉酒飲未已刁斗城頭􅃻二更我因良馬􅀩君賜長恐官㚢踈餧飤寒槽芻粟夜頻㸔恩極那􅀎有全寐促燈下堂催上芻􅅺滑失脚嗔人扶倉黄不知骨巳折始信人間無坦途烏乎生死固有時禍福豈無命塞翁塞翁勿復論卧㸔楊花風不定桃花歌次韻荅季翔春来㸔花湏及早莫待韶光去如掃年年花發看應遲㡬多狼籍􅀍風吹今年無風亦無􅀨千樹桃花紅爛吐香塵繡轂動逰人流水瓊筵出歌女天氣艶陽三月時􅀝闌吹徹王叅差百壷送酒莫停飲秖恐落花辭故枝落花飄盡春無迹著意㽞春花可惜花開花落一畨春與君莫作傷春客㑹須日日醉花前不放閒愁到酒邊有花可㸔酒可飲但願以此終殘年敬賦天馬歌昔聞天馬不易得房星降精産西域雙蹄並截白玉光一身渾染玄雲色雄姿非駻亦非騋八尺乃是真龍媒天生權竒特神駿烏騅赤兎皆凡材風尾蕭蕭耳雙聳萬里騰驤塵不動畨臣重譯貢中華黄金論價如山重太僕飬之十二閒立仗暁聮鵷鷺班在廷􅀞史皆􅀦手乃為寫真傳世間當今聖主修文徳逺裔窮荒俱混一不用勞師圍太宛年年擬獻三千疋敬賦白鷹臣聞名鷹不易得衆中竒者色純白金眸星轉雪為翎玉􅀲風生觜如㦸天然逺自海東来論價可䡖􅀟白璧鷹師調飬水食勻臂擎不敢離朝夕十月平原百草枯野馬山牛俱辟易出籠一脫紅錦鞲随人指顧無虚擲嗟㢤此鷹殊可惜􅁬擊真如萬人敵吾王育之豈為事逰田要激猛士于疆􅂣評曰天焉白鷹結句皆磊落稱題哀鴈吟隣有貞婦痛夫以刑死日夜號泣誓不再天余嘉其志為賦哀鴈吟哀鴈復哀鴈雄雌不相違三春北去秋南歸年年稻梁充汝肥汝肥􅂚巳時安知矰繳不汝随一朝弋雄孤其雌雌孤殊可傷夜夜啼秋霜楚天空闊雲水長誓不更逐群侣翔花間滿春塘不媿鴛與鴦鷹鷄行白日中庭忽風過鷹攫鷄雛半空堕誰家失之無䖏尋家奴拾得如拳大毛血淋漓殊可傷性命幸脫飢鷹膓山妻叮嚀勤餧飤愛護真如􅀌鳯凰錦毛漸長雙􅃣聳可愛花隂闘時勇我雖老饞不爾烹留取年年作雛種射鹿行雲夣澤中冬信早十月清霜凋宿草此地猶存古獵塲周遭百里青山繞吾王一歳一遊田麝香名馬青連錢􅂵絲垂韁黄金勒紅錦裁鞍白玉鞭􅀐来獵塲世稀有馬首忽驚山鹿走老麋皷勇獨當前群䴠甡甡總随後􅊮弓滿引與月同白羽出挿生腥風廻身連發踣􅀟鹿左膘右髃毛血紅妙手穿楊古無比嘖嘖懽聲溢人耳林深伏虎莫敢行木末窮猿號不巳笳皷喧闐催解圍千萬人中得雋歸行庖吹香出翠釡從官縷割誇鮮肥大府分封鎮荆楚農􅂩年年須講武太平武俻不可無萬載千秋作藩輔
