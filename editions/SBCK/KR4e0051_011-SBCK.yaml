body:
  text: 跋右永樂中楚府刻本管時敏蚓竅集十卷半葉十行行二十字詩以古今體類次前後有土風精喜越谿艸堂文水道人諸印審是義門何氏故物卷六第六葉第二十葉義門據別本摹寫持以校四庫全書著錄本實遠岀庫本上如卷三從征古州蠻迴途紀驛二十三首此本大題後繫以小題如右發靖州右洪江右安江等皆小題也蓋刊時先詩後題故以右字識之庫本旣悉删右字而原詩序次仍而未改於是前首之題未有不誤爲後一首者此一事也卷十重九呈兄勉翁詩此本三首俱全庫本脫第二首又初度日復呈兄勉翁詩三首庫本全脫此外二本詩題亦時有岀入如卷五之患足行庫本改作折足行之類未易縷指此二事也提要稱丁鶴年與時敏皆爲楚王所禮重故幷其評語刻之又云時敏又有秋香百詠還鄕紀行見周子冶所作全菴記知所據本有評語又有全菴記與此本同然庫本無之者則館臣之過矣此三事也觀於此三事則此本之善不待煩言而解時敏初名訥後以字行華亭人與袁海叟交善俱以詩名洪武九年徵拜楚王府紀善進右長史丁鶴年是時亦客居武昌嘗有詩送時敏云楚王獨數蘇從諫齊士誰過管仲才見海巢集卷四其推重如此此集亦岀鶴年評隲彼二人之交􅁩可於此覘之矣海寧趙萬里
