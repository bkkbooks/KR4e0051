body:
  text: 五言律詩遊寳林寺金碧絢樓臺禪關向此開水分雙澗出雲擁萬峰來古佛遺香火殘僧話刦灰黄塵吾老矣何幸一徘徊獨坐獨坐茅堂上長吟不下牀亂書堆几席疎雨過陂塘野燕衝簾入汀花度水香應須存晚計次第學畊桑答友人雨中見寄雨聲連曉夕牢落閉幽扉屋漏頻移榻江寒更覔衣野烏飢自下水鳥濕還飛爾亦忘機者終同理釣磯過田家偶過吳家墅殘陽半掩扉逺汀低樹宻小徑襍花稀新酒浮篘釅鮮鱗墜釣肥年來任疎懶一醉即忘歸郊居二首移家雖偪側只此足幽居茅屋三間小春田廿畝餘人來論稼穡自學把犁鋤東舍催租急烹雞酌小胥春城俯平野草色静柴門魚蟹舟中市桑麻屋後村遣兒招社飲為客置盤飱老計能如此陶然付一尊贈洪山龍門海禪師侍者眞淨祝髪名眞淨從今淨已眞誦經當作佛持律定過人江月空中夜山花物外春龍門多寳藏種種是奇珍送宗師還玉泉寺省師何處去古寺玉泉清山笠披雲過江船趂月行拈香參祖塔乞食到王城此去傳心印應知道可成和季翔夢與海禪師看牡丹之作師時以事在京栽松道者栽松去何因看牡丹相思春獨苦孤夢夜初殘子已空中見師應定裏觀歸時當記取饒舌問豐干其二太息東巖叟艱危命若絲當知成佛日還有受魔時短髮蕭蕭落孤心耿耿持可堪江樹晚千里動遐思夢遊洪山寺不到東巖閣重來又一年無縁能離俗有夢只棲禪客坐茶香裏僧行竹影邊夕陽天未晚幽思滿歸韀從征古州蠻迴途紀驛二十三首晨發渠陽郡歸心一惘然離家今五月爲客已中年暮雨行人裏春泥去馬前洪江明日到沽酒上官船右發靖州行行過若水古驛在江臯自是登舟險終無䇿馬勞山雲含宿雨灘石漏奔濤此地如能隱塵煩或我逃右洪江夜過安江驛停舟不敢行亂山藏月色暗石鼓灘聲千里從軍事中宵感客情不眠聊伏枕天白更孤征右安江早行今幾里又説次潼安古驛烟中入前山雨裏看江迴逢斷洑水落見危灘濁酒雖非嗜聊持破曉寒右潼安江口何年驛過逢欲雨天居人張夜火使客喚春船雲起崇山外江通溆浦前鸕鷀灘已過今夕解衣眠右江口歸舟春水疾舉棹即辰溪岸轉山疑動江分路欲迷乾坤千里客風雨五更雞自愧如萍跡飄飄未定棲右辰溪武陵溪上驛因紀武陵名樹列千旗勢江喧萬鼓聲生苗今向化落草久無兵好載銅槽酒㳂山看晚晴右武溪王程不敢緩四日下辰陽古木將軍廟春波使者航城依山勢險江納雨聲長莫上觀瀾閣傷心在異鄉右怡溶今日行兹驛如何是北溶雲濤千數里烟樹萬餘重江黑留春棹林虚動夜舂驛官應被酒出迓甚疎慵右北溶天設非常險舟航豈易過大風掀逆浪暗石起盤渦行路難如此埀堂意若何榜人殊可恠不住唱蠻歌右清浪歴險過髙都都前景色殊江迴千石盡岸斷一山孤自昔無危道于今即坦途宵征從此去舟子亦懽呼右髙都勝地古桃川尋眞亦偶然今來江上客未遇洞中仙碧樹收新雨靑山羃逺烟不知何處路迷却釣魚船右緑蘿大鎮開戎衛雄城雉堞連仙人曾鑄鼎帝子復停船夜雨燒燈後春雷起蟄前邊隅今已靖佇聽凱歌旋右府河江上龍陽縣遙遙百里程靑山雲外小白鳥雨邊明臘酒沽應熟春薑種已生驛人能雅致髙閣榜臨淸右河池擾擾天涯客悠悠武口船年光雙鬢裡春事百花前浮世身如寄還家夢屢牽明朝過湖去風熟片帆懸右武口已遂南遊興歸帆過洞庭浪花風裏白汀草雨中靑一㸃塵無染千杯酒亦醒好將江叟笛吹與老蛟聽右明山洞庭八百里勢與兩湖通日月蒼茫際乾坤混沌中靑山僧寺雨白浪客帆風浩蕩論胸次王師小戰功右城陵養鴨人何在猶傳養鴨闌野烟青草晚江雨綠波寒表驛名因勝充庖味可餐兹禽應解語豈敢學彈丸右鴨䦨曹公兵敗處今識在嘉魚赤壁三分後烏林百戰餘橋浮春渡闊舟泊夜江虛千古英雄事悲凉太史書右石頭口桃花江上驛春水賣新魚滿尺銀堪此千鱗錦不如因歌悲客裏每食感王餘江海親朋少誰傳一紙書右魚山武昌歸已近今日過簰洲沙泊春迴鴈江喧晚浴鷗白花梅欲盡青葉柳初柔鶴駕來天上新晴􅇺逺遊右簰洲銜命來金口郵籖報驛程好風行十日殘月上三更商舶停初穩漁燈照更明同袍一尊酒珍重逺相迎右金口江驛行初盡今晨到武昌宦情如昨日春色是他鄉烏鵲知人喜駑駘怯路長家童應念我戴月候舟傍右夏口江行二首夜度繁昌夾雲帆萬斛船岸燈疎樹裏江笛晚風前水急潮迴渚江空月在川年年來復徃華髮漸盈顚行行幾百里又過十三磯宿鴈逢沙落驚鳬帶水飛山寒花寂寞江晚樹依稀自笑無家客他鄉亦當歸病足二首移榻西軒下翛然意自淸焚香終日坐好鳥隔牕鳴文墨容疎懶賔朋失送迎自慙猶禄仕那得此身輕老為身多累官因病暫閑春餘啼鳥裏興盡落花間莫遣詩排悶聊慿酒破顧開牕看晴色一片白雲還齋居直館直館齋居夜心無一慮縈茶烟籠燭暗花月進牕明老去頭雖白官閒夢亦淸明朝當署祝早起候宫城送僧景怡住持黄梅四祖寺杖錫雙峰去登登向白雲焚香禮祖罷説法與僧聞蘿幌淸風入松門碧靄分若無行脚念終老逺塵氛丁丑仲春聞兄勉翁因門役從軍不知戍所有憂而作書劄望平安那知報急難宦途嗟我隔親塚念誰看烟瘴南州熱風沙北地寒鶺鴒原上淚雙袖幾時乾贈僧龍翼雲形迹無拘礙飛行遍九垓騰空那假錫度海不須杯花落千峰雨松喧萬壑雷老人應聽法一日幾多迴雲谷爲武昌奚瑄賦空谷幽人意閒雲靜者心石圍花下奕泉荅竹間琴鶴影蒼巖逺雞聲碧樹深雖云住城市何異在山林侍宴封内春祠罷宫中胙宴開席從廊署設樂自殿庭來中使巡筵過千官被酒迴樂邦瞻盛事紀述愧無才次季翔韻送陳僉衛琰征大庸蠻將軍名將種承詔討南蠻虜命危如卵兵威重若山斬酋花石下焚寨柿溪間一月聞三捷長歌奏凱還題蔡用强石城山房絶境羣峰合幽居一徑分巖花和雨落林鳥隔雲聞門熟呼猿果書香辟蠧芸不因徴召起終是逺人羣題脩江向自誠靜樂軒深巷無車馬衡門盡日扃古苔迷曲砌春草滿閒庭雨笠嫌蘇戴風瓢厭許聽香消淸晝永自閲太𤣥經觀孔雀朝奇鳥當晴午團團展羽衣翠分雙扇舉金擁一屏圍綵鳳宜偕舞文翬敢並飛東園非有召何幸覩恩輝過烏沙夾答諸僚友二首曉過烏沙夾秋風萬斛舟靑天雲際鴈白浪水中鷗兄弟皆良㑹江山足勝遊行行紅日近佳氣藹皇州黄石磯頭酒烏沙夾口舟暮雲隨逺鵠秋水泛輕鷗賦詠陪前輩經過念昔遊風帆能借便咫尺是神州入都門下馬入都門熙熙景色温水朝滄海闊星拱紫宸尊麟鳳千官集熊羆百將屯鴻臚早通籍稽首謝君恩早朝宫城猶下漏禁鼓巳催班初日明三殿淸風肅九關臚傳仙仗裏香裊御爐間幸際隆平日承恩拜聖顔出都門天上還家日沙邊解纜時亂山含宿翠飛鳥戲晴絲野眺偏宜逺江行不厭遲正期遊汗漫何幸値雍熙發新河次韻自忝王門禄頻年此地過秋風迴逺道暮雨宿新河白浪鷗邊小青山鴈外多客杯相􅇺藉一酌總恩波迴從經陽邏陽邏行將近淘金過淺灘草痕秋更碧江氣晚逾寒處世情尤拙還家跡易安客愁雖似海未敵酒杯寛舟中冩示蕭雷二伴讀拜秩辭京國揚帆放使舟㣲茫烟外樹浩蕩雨中鷗詩美青山對杯空采石謀應將柁樓興一望楚天秋過采石水急灘難上行行欲曙天人家多賣酒客路暫停船采石荒祠下黄山古塔邊經過人易老搔首一茫然曉發雷港月暗投寒港天明發曉途鷺應尋宿侣鴈已誤更奴霞映㳂汀蓼霜枯倚岸蘆彭郎磯尚逺隱隱一山孤小孤山一柱千尋直孤根萬丈深雲間盤翠髻天外墮瑤簪東下潮聲斷西來水勢臨古祠詩滿壁過者若爲吟和吳教授夜飲二首短鬢燈前白衰顔酒後紅光隂百年内談笑幾迴同禮樂雍熙日衣冠揖讓風吾儕逢盛際何得在蒿蓬出水鱸魚白經霜柿實紅一杯今夕㑹四座故人同佳句多新意淸談有古風勸酬須盡量不必問飄蓬曉發涇江月黑天難曙涇江曉發遲艣聲和雨合帆意待風吹小酌杯仍醉𡨕搜句頗奇黄花如有約開及到家時次陸伴讀風雨舟中客路三秋雨江帆萬里船驚鷗離急浪去鳥没荒烟白日長歌裏青山薄醉前新詩雖寡和緩筆待重編次韻過散花洲赤壁軍迴處曾於此散花跳魚驚過艣落鳥立行槎山逺雲連樹江淸水見沙風帆今日便應送早還家送程彦明歸揚州分韻得愁字離人江上發歸思滿芳洲客路烟中樹春帆雨外舟靑山千里别白首十年遊應有璚花詠還將􅇺逺愁題長史胡去華畵竹阿翁能愛竹又與竹傳神萬戸不須等一枝猶可人渭川烟外晚湘水雨餘春終日宜相對應忘徑造頻寓菴身世寧非寄浮生任所如心惟無滯礙跡故得安舒孔席何曾暖莊舟本自虛百年霄壤内豈異一蘧廬蚓竅集巻三欽定四庫全書蚓竅集巻四明管時敏撰
