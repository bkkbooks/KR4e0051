body:
  text: 國醮禮畢送張真人還山真人黄籙修三日聖主丹𠂻息萬機白玉印封天表進紫霞衣惹御香歸雙龍直向雲中見羣鶴遥臨日下飛大禮己成還舊隠耆山草木亦光輝于時龍見鶴來贈僧白庵白庵道人修白業一毫曽不染緇塵净如片月真空性閒似孤雲幻寄身馬為䭾經行較逺鵝因聽法養偏馴東林縱有蓮花釀肯作攅眉入社人靈鷲僧勤無逸奉使日本回授官聞欲見舉寄之天宇寥寥一錫飛忽聞承詔赴彤闈山中書札三年别海上梯航萬里歸賈島文章終釋褐曹溪弟子孰傳衣白雲出岫無心處老我滄江理釣磯題王秉正雲林清隠青林白谷水雲鄉隠者深居一草堂百道松泉當戸落四時花雨入簾香門前車馬紅塵逺座上琴書白日長滿目故家風景在不須重畵輞川莊春暉堂江夏雷道夫典儀奉母之所綵衣五色絢晴光鶴髪康强在北堂結子蟠桃千嵗熟宜男諼草百憂忘孝奉慈親知愛日忠承嚴訓要傾陽晨昏定省無違養誰得居官不離鄉竹鶴圖為醫士仵思道題此君風致極蕭閑合與胎僊共一班千嵗影迷蒼雪裏九臯聲在緑雲間平安莫謾傳書去徑造休教報客還掛向芝房無㸃俗長年相對悦清顔贈别鄉友孫汝達故人契闊幾經春千里停雲入夢頻下榻豈期今日㑹分金寧忘昔時貧乾坤白髪詩名在風雨青鐙酒量真别後音書煩見慰莫令目斷楚江濱附録汝達見答交契驚踰四十春每蒙存恤意頻頻能將宦達安醇厚不鄙迂踈處賤貧青眼總知鄉義重蒼顔尤見道心真從今相别希相遇秪自懐思谷水濵題陳士良棲霞軒泉山一室閟丹霞舊是希夷道者家曉日綺牕生五色春風珠樹吐三花迎仙每服青綃帔引夀時飡赤水砂莫效昔人成痼疾從容好為誦南華訪洪山海禪師用季翔韻今朝立春風物熙東巖閣前尋逺師烟霞丘壑舊遊處金碧樓臺新構時東風官馬去何疾落日家童行欲疲我亦清齋不飲酒與爾結社同幽期送倉使楊宗彛回沔陽鴈鶩行中見孤鳳采采五色之羽翰平生自是抱竒氣老大何曽辭小官新詩千首不起草生紙百畨能寫蘭明朝掛帆渡江去花落沔陽春雨寒送長史司吏吳永中役滿還廣東早春公館柳條黄清暇題詩送掾郎白髪簿書官事了青山風雨客程忙船從杜若芳洲發酒向桄榔小店嘗歸及墓田寒食後碧雲東望思茫茫送瀘川判官孫彦博新除貳守向瀘川西上長江萬里船行李莫辭為客逺判花政喜得君賢官鹽嵗汲千家井火米時收五月田緩帶從容有佳興寄詩細寫薛濤牋送李雲仲之蓬萊丞蓬萊縣裏神仙宅今日之官獨爾清張鷟文章多中選李紳才業久知名沙門風雨龍腥過海市樓臺蜃氣成報政重來應有約上林三月共聽鶯送僧溥天淵東歸千里孤雲一錫飛西來問法候傳衣幾聽絶壑猿聲過又踏空山虎跡歸離垢己應無黒業隨縁只此是𤣥機半霄峯下棲禪處莫待巖花老石扉送寳曇應禪師遊峨嵋囬金陵峨嵋峯頂絶崚嶒不離塵凡不易登太古雪消丹壑裏普光天在白雲層神鐘日報齋堂飯聖火宵明佛殿燈六載下山非苦行怕人云是再來僧師是義斷崖再來送廬山福上人東林卓錫幾經春瀑布源頭自在身陶陸舊為方外友宗雷元是社中人過溪一笑千年事浮世重來幾刼塵江上相逢又相别野花何處問通津和鶴年丁先生宿東巖韻兼呈洪山海禪師借榻東巖第幾層山中主者佛圖澄浮榮過眼寧非夢清苦前身本是僧齋罷雲扄時聽講詩成雪屋夜懸燈虎溪有約仍三笑自媿為官老未能和季翔韻簡洪山海禪師還山八載歸來説苦空禪心只與舊時同賣將薪去誰家事種得松成幾許工雨露無私霑帝澤山林有道振宗風半霄巖下行吟處秋色還歸杖屨中用季翔韻題胡長史所藏東坡墨竹剩水殘山雪後時韈材貌得嵗寒枝歸來内署曽持燭忘却南溪有賦詩岷谷秋隂雲冉冉湘江春碧雨差差展圖如在千竿裏六月凉飊灑鬢絲謝賜虎肉饅頭彤弓親射東山虎細臠籠炊賜百官昨日雄威猶可畏今朝和氣已成團庖丁尚慮風生机倀鬼應驚雪在盤賸種官田千畝麥屯家犬豕夜平安題脩江王玠西山舊隠圖君家舊隠知何處遥隔脩江紫翠岑金碧畵圖聊慰藉烟霞丘壑待登臨水花凝露魚依渚山葉鳴風犬吠林布襪青鞋歸及早莫教猿鶴怨驚深觀音蓮不假淤泥一㸃栽五銖衣似藕絲裁碧雲幢下分明見白月輪中自在開根向旃檀新植得種疑鸚鵡舊䘖來當知五十三㕘外示現應須有善財雙竹玊立亭亭並出林不於千畝競繁隂雲霄每引鳳凰下風雨或作蛟龍吟夷齊同隠髙節在皇英對泣遺恨深何當分箇漁竿去獨釣渭川烟水潯紙被萬杵霜藤練色勻巻舒一幅净無塵梨花夜暖雲迷夢柳絮春寒雪滿身未恠青綾能見妬也勝白㲲尚欺貧五更聽徹金門漏得似山林晏起人木芙蓉渚宫仙子耐清寒笑倚西風臉渥丹絳節三朝瓊作珮霓裳一曲翠為盤夜霜漁屋燈前見秋水人家畵裏㸔可惜繁華易惆悵錦官城上夕陽殘月中桂上界誰將此樹栽廣寒髙處古香來根從天地分時種花在山河影裏開白兎守株依貝闕青鸞䘖子下瑶臺不知斫盡吳剛斧天上浮雲變幾回燈花不假天工雨露栽銀釭火暖自然開兩莖朱草含烟秀一朶紅雲度水來春色半浮珠蓓蕾風情中結錦胚胎明朝喜事殷勤報莫遣芳心一寸灰和左長史史秉賢詠炭大櫟山中斬不存青山白屋坐來温晴生五色雲霞氣春活千年鐵石根積雪深時神獨王繁星迸處勢如奔吾生違道難依世三斗逢人亦易吞松牕聽雨為西安楊公圭賦草堂千箇種長松好雨時來紫閣峯聲到風枝驚睡鶴勢廻雲壑起潛龍暮樵隣父歸應濕晨汲家僮出更慵且喜官閒清兩耳逢人莫説大夫封白雲窩富春胡清之隠居席帽山嘗名其室曰白雲窩既殁其子去華不忘其親乃繪為圖以寓羮墻之意故為賦詩以慰其孝思云席帽山人隠澗阿白雲深處有行窩忽驚仙化從龍去猶想神遊與鶴過門外海濤翻白石屋頭山雨落青蘿太行千載如今日目斷孤飛淚更多寒食三月東風大放顛今年為客倍凄然杏花時節偏聽雨寒食人家不禁烟千里故鄉愁共逺一春白日夢相牽天涯草色青青處秪憶千山墓下田次韻寄洪山海禪師二首杖錫西來住此山道塲新構未曽閒寳鐘鯨吼神功在金刹翬飛佛運還大法固應超物外勝緣初不離人間千年香火今重見只在圓機一轉闗履跡經年不下山山中清事屬僧閒日髙香積齋初散雲滿松牀定未還佛法三乗天廣大禪心一月水中間幾時撥芋灰邊坐細話無生第一闗季翔弟惟學自嘉禾來武昌省母及其還也賦詩為别乃翁清江先生有文集行於世惟學壻於沈氏云烟波樓下上行艖小暑薰風擬到家二陸弟兄尤俊偉三蘇父子總才華親闈正舞衣多綵甥館應占燭有花媿我蓼莪詩久廢况堪頭白尚天涯對雪半年南國不雨落一夕北風吹雪來城中米價政爾貴江上梅花空自開騎驢朝士曉未出射虎將軍夜不廻寒齋獨坐更愁寂饑鳥下啄青莓苔吳善存侍父勤翁來府中教書復還鄉迎母逺侍而翁入講帷又迎阿母向慈闈江亭駐馬梨花發春水行舟燕子飛三接恩光新禮幣一門經術舊儒衣重來具慶髙堂上夀酒頻頻送夕暉大别山南紀名山壯楚闗虎蹲龍伏大江灣登臨興在風雲外疏鑿功存宇宙間二水合流通漢沔一峯特立控荆蠻澗毛清薦虛祠下惆悵何人繼克艱黄鶴樓黄鶴西飛去不廻青山髙棟自崔嵬當年賣酒人何在今日題詩客未來舟繫城邊官柳發笛吹江上野梅開白雲只在䦨干外安得乗之遍九埃北榭舊家行樂小亭臺珠箔青山罨畵開花月當時人已散柳風今日燕還來舞鈿猶委宫墻草步障曽過輦路苔一代繁華易銷歇白榆霜冷鴈聲哀吕仙亭道人髙坐朗吟亭古蹟因知此地靈劍氣飛來湘水白笛聲吹入楚山青階前丹棗何年熟枕上黄粱幾日醒快我登臨塵事隔摩挲蒼蘚讀碑銘石鏡亭武當祠下仙人鏡纎塵不染絶晶熒㸔來終夜似明月知向何年曽隕星天上孤鸞還舞影山中百恠敢逃形偶因登覽坐良久清光照人如夢醒辛未初度和季翔見夀日華初上萬年枝官滿雄藩未許辭初度今朝猶是客老來多累又添兒黄花醉我留連酒白雪驚人唱和詩珍重同袍交契在十年一日共襟期題史仲愚舎人終南山色圖長安壯觀是終南千里秦川盡蔚藍過雨丹青開絶壁浮空紫翠結層嵐八闗地設東西險三谷天分混沌含待得錦衣歸去日㸔雲好鑿石為龕重賦胡清之白雲窩幽居逺在白雲隈絶逕縈紆長紫苔芝草齋房春雨閉松花牕戸晚風開漫疑世外神仙侣誰識山中宰相材今日披圖重感慨海天何處鶴飛來江夏劉名才及子陟皆以醫嗚於時鶴年丁先生徳其愈病索詩贈之大隠為醫在市㕓千金秘訣自家傳昔時曽起龍歸海今日還將鶴引年舊煉丹爐留宿火新開藥圃灌春泉一門父子神仙似何必壺中别有天題醫士張孟安懶窩青年與世似迂踈一室全勝水竹居雲到榻前應共宿草生階下不教除任從野老常争席無奈隣人數借書賣藥養親甘㫖備何曽頭過一旬梳哀鶴年先生女兄月娥死節月娥帥娣姒女婦共十人死於水𦵏蕪湖之黄池里父老題曰十女墓金華戴叔能先生為銘詩姊也從容賊陷城全家殉節萬人驚魚龍應護貞魂在犬豕難虧大義明世上千年名不泯水中七日面如生至今合塜黄山麓霜月蕭蕭夜共清題審理正蔡原輔練林墓圖藩府同袍十二年練林那忍見新阡親闈夢逺風烟外旅櫬恩深雨露邊表石雖無翁仲貴居廬己有子孫賢哀余東望千行淚老去何時灑墓田哭鍾伯紀先生杖策來從淛水東飄飄意氣欲凌空曽經捫虱談天下幾向聞雞起夜中魯酒也須佳客共商歌直與古人同所知已逝音誰賞絃絶秋鴻膝上桐和謝鶴年先生見夀秋色南山曉共妍今朝初度會羣賢清尊談笑同為客白髪風流半是仙目覩鳳麟當盛世齒隨犬馬待餘年過情佳句煩稱道自愧迂疎敢浪傳㕘侍赴京回國聽漏曉辭丹鳳闕停舟晚傍白鷗沙雲歸林麓迷樵逕潮落江汀閣釣艖秋後青天無過鴈霜餘紅樹有啼鴉年年何幸叨陪從秪愧西風兩鬢華黄石磯阻風老我平生江海量此行不覺為消魂黒風怒若千鼉吼白浪顛如萬馬奔行客帆檣廽浦溆居人烟火失朝昏千金亦有埀堂戒况是餘生荷主恩題陸伴讀闓所藏范寛山水華原真蹟人間少不是故家無此圖百谷泉聲猶噴薄萬山雲氣欲糢糊年深更覺精靈聚價重寧論性命俱退食從容頻借㸔此身何必到蓬壺陸氏滄浪漁隠子是天隨幾葉孫家藏釣具至今存秋風鱸美時供饌春水鷗閒日到門泛宅豈殊居甫里放舟莫擬入桃源濯纓濯足都休論且對青山倒一尊定齋為張孟安賦知止應無俗事闗焚香清坐對南山舊栽靈藥須頻採新註丹經不用刪芳草池塘春水滿落花簾幙午風閒此中半席能分我老去逍遥杖屨間送監生馬駿赴京黄鶴磯頭上驛船柁樓撾鼔下晴川客行二月梨花後人别東風燕子前紫極龍飛居九五滄溟鵬擊起三千只今登用俱才傑好著勲名及壯年題齊安董昇松雲軒幽居長松一百箇滿室白雲終日飄影連遥漢集龍氣音合清颸諧鳳韶采苓道者每相過結巢仙人還可招凉隂六月不知暑坐㸔甘雨傾天瓢過龍泉山夾口青山四面來山重拱挹水縈廽千年勝地龍泉湧一日佳城鳳穴開佛子嶺頭雲擁樹仙人石跡雨生苔嶽靈應為長呵䕶五色光生紫翠堆華亭錢全慶餘先生奉别廿餘年嘗辱埀問因寄謝之鄉里衣冠獨老成秪將清白度平生著書己續雲間志賣藥寜逃世上名斗酒長歌心自適孤燈細字眼逾明愧余竊祿王門下千里何勤月旦評敬和書堂新成華構新成講席深河間禮樂重推尋南榮日晷三冬近東壁星光午夜臨黄巻聖賢常對語青燈兄弟久潛心金枝玉葉承家訓都在青年惜寸隂過皖城弔余忠宣公元戎百戰守孤城千里蚍蜉絶援兵保障有方文且武簡編無愧死猶生神來遺廟乗雲氣鬼哭空江襍雨聲尚憶季侯并達帥一時忠義屬科名達兼善状元為淛東元帥死于海李子威状元為江州太守死于郡奉寄茅山道士求香茶茅山嵗嵗摘先春礞石霏霏磨作塵𤣥露十分和得細紫雲千片製來新頰車味載能消渴鼻觀香傳即嚥津若得清風生兩腋便從羽節訪羣真伴讀周庠求題其師叙南游克成先生雙溪草堂聞道雙溪似瀼西草堂小築足幽棲揚雄竒字知誰問杜甫新詩漫自題滿座荷風魚躍浪一簾花雨燕争泥白頭無意蒲輪召只恐文光動壁奎題謝生草塘書舎芳草横塘隠者居長年閉戸只觀書門前水煖生科斗座上芸香辟蠧魚力學豈知清苦處夢吟多是黒甜餘宣城風致於今逺為愛雲仍玉不如閱耕軒乃鄉友陳景祺員外父傑翁軒名也瑶溪一曲繞田廬日對耕耘自讀書淳俗無虞那佩犢豐年有夢每占魚傾筐敬饁朝烟裏短杖徐行夕照餘最愛後昆勤播穫始知經訓在菑畬荻港雨行昨朝楚㟁喜秋晴今日吳船雨裏行人事天時何可測青山白水總闗情久知盟與沙鷗冷那得身如野鶴輕恠底石尤風太惡空勞百丈進脩程早朝和吳教授韻二首大廷禮樂遵周典盛代衣冠邁漢儀一統河山開景運九州民物樂清時遲遲化日行黄道郁郁卿雲藹赤墀蟣虱小臣無以報萬年宗社祝鴻釐月轉西城禁漏遲千官隊隊入朝時班陪冠珮聮鵷序樂奏簫韶覩鳳儀雨露極知恩似海草茅深媿鬂如絲䕫䕫何敢忘君敬一片丹心在緝熙次韻有懐周府奉祠宋季子故人為别動經年况復祠官久不遷白髪交遊惟我舊清時文物尚君賢忽怱過夢隨蝴蝶的的歸心在杜鵑無限相思千里外暮雲春樹兩茫然送顧謹中赴蜀府紀善憶昔論交並黒頭那知一别嵗如流暮雲春樹幾千里風北枝南二十秋宦海有時思往夢醉鄉無處著閒愁慰情書劄煩頻寄老我年來倦倚樓送曹公啓金聲楚楚見雄詞玉質温温識令儀春水鵝羣當墨沼曉星雞語傍書帷忽驚滄海遺珠久始覺青雲薦剡遲今日鵬程應九萬别情不盡送行詩蚓竅集巻六欽定四庫全書蚓竅集巻七明管時敏撰
