body:
  text: 五言絶句畵菜白白霜根嫩青青雨甲鮮蒼生無此色四海正豐年重九呈兄勉翁三首異鄉重九日難得好懷開細把茱茰酒殷勤勸一杯千里同為客驚心節序催遥思故園菊今日為誰開白首難㑹面今日况重陽苐恨長稱壽年年在異鄉初度日復呈兄勉翁三首客裏逢初度艱難老弟兄一杯稱壽酒多少故鄉情勸酒重持杯杯深喜不辭願將今日意同保百年期黄花開未了緑酒驤来新頭白能歡聚吾鄉有㡬人送樂長蔣法宏母憂南還昨日鄉書至萱花悴北堂東風兩行泪逆水到清湘江行三首晚過三江口江空水急流船頭燈火起只尺是黄州野色含江薄沙痕帶水長東風無白浪容易下蘄陽雲樹㣲茫裏江流浩蕩間舵樓烟雨重不見九華山江霧著水飛輕雨隨風灑暗塵棹歌纔只尺不見棹歌人夜坐髙齋坐来久中宵月上時家僮初睡覺驚報早朝遲小景薄宧鬢成絲鄉山入夢思抱琴松下者政似在家時蚓竅集巻十
