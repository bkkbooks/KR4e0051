body:
  text: 七言長律審理正蔡原輔遣子還天台省親郎君烏帽越羅衫文采温温自不凡大父髙堂埀鶴髪阿翁上府署氷䘖閒情白日佳山水雅操清霜古檜杉公館揮毫知有暇客庖食蟹喜無監宦遊遍歴長途轍歸省俄揚極浦帆水暖船頭魚潑潑泥融江尾燕喃喃彩虹遙貫詩連軸紫氣髙騰劍在函行李異鄉過赤壁㸔花故道入黄巖國人共識張曽子隣叟争迎阮阿咸拜舞重闈通逺問平安須早寄魚緘題藍山簿天台陳仲素先隴圖孝子之官萬里途臨行貌得夀藏圖赤城親舎雲多少黄葉人家路有無雙石效竒華表立一峯拔秀錦屏紆地存牛跡曽眠處山擁龍形正向隅􅂱􅂱靈芝生百本森森喬木長千株青天忽下過門鶴白日仍飛累土烏有客束芻將適越無人掛劍更歸吳年登老圃收松子秋薦思亭採木奴入里上官知下馬卜隣故老候歸鳬榮知衣錦風雲遂恩及焚黄雨露殊且喜子孫供祭掃不愁翁仲没榛蕪哀余東望干將下寒食梨花酒一壺題典儀柳以臨九鸞白雲圖清郎今是楚儀官鴈蕩雲山畵裏觀山似青鸞來九箇雲非蒼狗變千端倚門斜日楓林晚拄笏髙秋草閣寒庭樹鷄鳴思問寢江庖魚美阻承歡桂因招隠烟叢老萱解忘憂露葉漙溪上樵歸風且便源頭童汲雨初乾烏犍耕後曽秋穫白鶴歸時及晚餐東里遷居逢孟母西隣醵社祀丁蘭天邊見鴈歸心切月下聞蛩旅夢殘紫誥定應來絢爛綵衣重得舞盤桓板輿前引行花徑竹杖旁隨過藥闌春酒髙堂介眉夀更圖家慶後人㸔九曲山房為寜波史孝子賦四明髙士好山房雲磴烟林隔𣺌茫小逕到門通窄窄流泉繞壁聽浪浪幽居宛似清風室别墅渾勝華子岡漁入誤迷源口路樵歸分坐石邊牀傷烏羣集慈親墓弔鶴雙臨孝子鄉芋栗早收防嵗歉蘋蘩預採備秋嘗故交天上青雲逺髙隠山中白日長秫米夜舂催釀酒松花曉折當焚香自知栗里多栽菊誰復成都别種桑念我故園三泖上幾回落月夢荒凉和韻過彭澤懷靖節先生官船晚泊潯陽郭把酒長懐靖節賢腰折竟辭彭澤米眉攢寜種逺公蓮歸來松菊開三逕老去柴桑受一㕓晉代衣冠誰避世劉家社稷自書年雖云富貴非吾願己有清髙獨爾傳千載令人弔遺跡好山青立縣門前射虎行鄂城之南山有虎為害其威暴甚獵者咸莫敢攖王聞之挽弓上馬一發斃之民皆稱慶禦災捍患古人所重臣職在紀述不敢不書時洪武丙子仲冬既望也黄草𤣥冬多虎踞青山白日少人行君王勃起英姿奮衞士前驅猛氣横弓挽蛇皮如月滿箭飛鵰羽若風生弦開應手神應助鏃貫當心鬼亦驚腥血濺時班尾折倀魂落處錦毛傾遊兵警衆銅龍吼歸隊催程鐵馬鳴一路塵埃天已㝠千營燈火夜初明從今境内無驚擾犬豕村村樂太平敬和畫碧桃詩韻風流畫史惜年光寫出宫桃異衆芳深淺舊紅渾改色輕盈新碧倍生香佳人金谷顔如雪阿母瑶池鬂己霜不與杏花争艶冶肯隨柳絮效顛狂靚粧姑射花鈿小緩歩飛瓊玉珮長勾引流鶯窺翠幙留連戱蝶繞華堂題詩細詠情何極呼酒相㸔醉不妨帶露一枝尤瑩潔絶勝湯餅試何郎蚓竅集卷七欽定四庫全書蚓竅集巻八明管時敏撰
