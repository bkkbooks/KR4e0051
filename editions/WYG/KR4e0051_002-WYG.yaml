body:
  text: 五言古詩白馬篇白馬行且嘶玉勒錦障泥揚鞭羽林郎宿衛通金閨一朝赴邉急轉戰玉關西長戈揮白日髙旌巻彩霓驅山塡火井累石起雲梯烽舉星芒亂弓開月影底分符降赤勒飛箭定渠黎功許韓彭並名與衛霍齊主恩諒可報國難詎難擠孰甘局鄉邑門巷閉蒿藜逺遊篇御風日萬里逍遙登逺遊竦身青冥表瞬息四顧周目力隘八極壯志局九州泰山小封垤滄海眇浮漚俯視澒洞間萬彚等蜉蝣浩歌挾洪崖長嘯訪浮邱迴飊欵閶闔謁帝十二樓酌我紫霞觴遺我靑鳯裘授以長生訣歴刼三千秋從兹謝流俗大塊同悠悠少小從行伍二首少小從行伍而今作飲徒博錢尋劇孟買劒問風胡結伴軍中戯嗔人醉後扶黄金三萬鎰誓娶陸家姑少小從行伍千金辦武裝日騎官廏馬夜宿酒家娼闕已寧論死臨危肯畏强蠻夷知姓字不敢犯封疆銅爵妓銅爵髙臺上西陵古墓邊君恩徒自重妾貌竟誰憐羞掩歌時扇愁登舞後筵惟餘漳浦月三五夜空圓二隱圖溪上放舟迴山中負薪暇一笑偶相逢於焉遂淸話寧知有秦晉况復論王霸回首總忘機靑山夕陽下星夕牛渚淸且淺鵲橋西復東黄姑仙駕動天女錦機空别淚零清露離魂􅆭驚風如何一水隔一㑹一匆匆監生王廷采分教中都國學植槐於庭扁曰槐軒求題虚星孕良木植彼文苑中教雨既沾溉枝葉何靑葱常刑庶無犯守護克有終歳久已云茂鬱然若雲從諸生儼成列弦誦怡清風伊人抱良材樹德匪爾同當知進修者亦由滋培功秋夜不寐耿長夜攬衣徒歔欷隂蟲吟近砌凉飊動疎幃素抱殊未釋淸懽念多違豈惟南飛鵲兹夕無所依寫懐朝迴憇公館殘陽坐來暝疎雨過髙林華月出東嶺流光晨復晡朱顔豈吾永故園歸何時悠然發深省病後喜雨謝同寅紀善貝季翔見過夜月忽離畢今晨雨滂沱秋聲落庭樹水氣没池荷豈云三伏中感此凉意多神淸體自適頓然釋煩痾明當謁公館仰謝數經過曉起直館曉晴初官淸逺塵俗怡然對簡編庶矣忘榮辱遙峰擁歸雲髙城澹微旭落盡凍靑花江南雨新足聽松樓為國學林敬伯賦凉飈度中林長松發淸響震蕩出巖巒蕭騷納天壤初疑繁絃作復訝驚濤上倐爾若崩奔悠然亦平廣大音本無聲至理奚有象復動陽始生姤靜隂已徃達人居髙明㑹兹適眞養心靜聽轉聰慮屏神逾爽豈彼廛市間啾啾局塵坱好招陶隱居山中一淸賞和陸伴讀闓過梅根江行惬素懐遐覽匪遊冶開篷望九華隱隱白雲下素波明逺川靑天入平野烟樹澹欲無風泉斷還瀉因知渼陂舟差勝習池馬斯遊樂未央我輩胡為者過蕪湖望天門山揚帆下蕪湖梁山在吾目大江從西來天門勢如束川日波上明野樹烟中綠良朋有佳製每媿貂難續顧兹欲忘言何以􅇺心曲和吳教授晚泊大信阻風樓船遡流上髙帆阻長風大江浩無際一氣何鴻濛囘望天門山峩峩相長雄洪濤走其下屹立西與東不有浮海歎豈無濟川功大鵬度寥廓斥鷃守卑樷物理固有定世事徒匆匆張燈啓華筵一笑杯酒中上慈母磯危石立江中揚帆泝流上潮迴慈母磯木落和尚港野闊風景明秋凈天宇廣西望淮山靑持杯惬吾賞蚓竅集巻二欽定四庫全書蚓竅集巻三明管時敏撰
