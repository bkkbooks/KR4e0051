body:
  text: 七言絶句脩竹芙蓉水僊小隊自成雙裊裊霓旌引翠幢一夜湘君頭盡白西風離思滿秋江題𤣥真詩意圖千峰雲氣涌如泉逺樹微茫斷復連祗有大夫橋下路青山都屬釣魚船􅀞扇南州六月暍欲死一見新圖眼遽明何處長林雙樹下矮牀茅屋聽秋聲題秋江漁釣蒹葭霜落水無埃野艇維堤晚未開為愛青山不歸去橋頭遮莫大夫来題倪元鎮先生小景泖上相逢記昔年風姿曄曄似神仙如今看畵渾疑夢春樹雲林一惘然先生自號雲林生墨桃花武陵仙子絳綃裳愛向春風試艷粧一自别来顔色改可堪憔悴見劉郎墨竹喚取官奴秉燭人韈材休惜為傳神不知誰鼓湘靈瑟千里秋風别恨新題僧翠竹蘭若斗室秋隂不受塵箇中只許著閒人欲知一體俱無象莫認青青是法身贈别草色青青漢水新異鄉聽雨怕逢春客懷不是今年惡頻向東風送故人題中書舎人朱孟辯墨竹楚楚郎官玉雪温朝囘緩步出金門揮毫寫得縣崖竹都是中天雨露痕侍從如京道經廬州見桂花山路秋花若箇栽天香逺迓馬頭来中官折入君王手不負西風一度開贈洪山霖藏主上人典藏東巖閣閲盡西来貝葉書秋水蓮花千百億一蓮花上一真如送聞侍者遊方習得僧儀已絶羣龍門宗㫖更多聞飄然一錫諸方去踏遍青山萬里雲侍者龍門髙弟叅侍征南道中一溪水清石可數千峰雨来雲亂行馬蹄踏踏秋風裏無數好詩吟未成竹寨驛前山水清官船夜泊近行營客程一月秋陰裏誤聽湍聲作雨聲秋行一月多逢雨路入南荒總是山烟火人家何處覔鷓鴣啼在石林間書松雪翁墨蹟後吴興翰墨人間少白璧黄金價盡低今日鷗波亭下路王孫何處草萋萋詠菊八首花神百斛釀秋香滿注流霞九醖觴令節無如天上好願稱千壽慶重陽上紫霞觴黄金地上有名花開向千秋富貴家不比壽安紅與紫紛紛只解競春華上黄牡丹越娘初試素羅裳愛向秋風學靚粧一夜不勝瓊珮冷晚香亭館有新霜上白西施盈盈宫額半塗黄不減花前舊様粧笑殺阿嬌金屋貯香衾寒怯夜来霜上黄西施不逐春紅淺復深千枝小朶爛於金若教開作翻堦艷辜負風霜百鍊心上金芍藥秋水池頭看鬬鵝霜毛零落粉香多不知滿地誰収拾剪作寒花照碧波上剪鵝毛一簇竒花上苑栽綵雲堆滿辟寒臺應將重價論千餅買斷秋光二色開上紫金團花比宫袍一色黄上林開處占中央臨軒長荷君王賞帶得天家雨露香上御袍黄紀夢小宴初闌罷玉笙東風庭院好春情流鶯啼過樓東去一樹梨花正晚晴過應山縣百里郵亭路更遥馬頭黄葉亂飄蕭兵餘何處尋遺跡千古清風渡蟻橋題米南宫畫碧樹濛濛雨氣含亂山重疊大江南短橋何處人家近多是當年海嶽庵題墨梅送弟同生回淞兼憶兄勉翁汝初髫齓我離鄉今日驚看過我長老去可堪為汝别楚雲吴樹鴈行行歸去看花似見兄碧雲紅葉暮山横東流黄鶴磯頭水不盡秋風送弟情大兄一别經三載昬眼裁書兩涙含為說白頭千里外時時心在紫芝庵先隴也京中懷季翔百壺佳醖透隣香出水新魚滿尺長阿母微醺孫在抱芙蓉湖上好秋光官栁烏啼曙色催滿衣風露早朝廻歸期想在重陽後為報黄花緩緩開夢成大溪溪上清風屋小草幽花分外香白鶴一羣飛不定萬株樹下讀書牀題鄉友胡士文所藏小景十年不見故園春畫裏題詩半古人老去風流渾減盡東風花鳥易傷神鄉友顧謹中以山水圖題詩見寄依韻答之九㸃吴山夢裏青逺烟疎樹晚𡨕𡨕何時買得螭頭舫秋水菱歌泖上聽牧牛圖四海熈熈大有年青山牛牧夕陽前誰知六國黄金印不及秋風二頃田江夏奚翁自號竹隠既殁其子瑄寫竹隠圖以寓孝思因題二十八字以慰其意孝感坊中孟氏鄰為親寫竹倍思親百年霜露凄其意不獨當時泣笋人瑄居孟子恭孝感坊側江行人家近水磨茶香江影船頭古塔長縱有琵琶舊時月肯將清涙落潯陽千里江行快雪晴白銀為海玉為城舵樓髙處看山興又比常時分外清催舟三日鼓鼕鼕千里江程百丈中兩岸青山看不盡此行未厭石尤風三江風起白鷗飛逺水征帆一片歸怪底黄塵涴吾足白頭未得上漁磯枕上卧病兼旬不下牀小庭花落燕飛忙禁中文墨如山積不道閒時日許長一簾飛絮晚悠悠春去光隂肯暫留可恠飛来雙燕子替人閑說許多愁養鴨一羣花鴨東湖上朝放春波晚自来添得癡兒書懶讀持竿一日看千廻季翔小疾在告聞編所作因寄一絶花竹林牕筆硯清初秋一雨便凉生錦囊平澹詩千首近日新編㡬巻成季翔有詩名平澹集題唐馬圖立仗纔廻脱錦韀奚官騎出飲清泉眀朝若從長楊獵應試君王七寶鞭題寧波樂節婦巻其夫觀儺船溺死嵗俗儺船渡未休孤燈白髪㡬多愁至今九派江頭水不盡當年妾涙流出郭二月東風雨脚頻杏花消息未全真今朝出郭看晴景野色江光總是春和鶴年先生訪補衲和尚詩半霄峰頂擁丹霞兩䇿登登豈憚賒老衲倒穿迎户外山禽啼上石楠花丁丑七月叅侍舟中水邊疎草度螢光天際微雲過鴈行坐待海風吹月上舵樓髙處不勝凉夜雨前山曉未開午潮孤渚晚初廻東風不住吹三日無數江帆出夾来蘋末凉風起白波一生情事負漁蓑老来偶得看山便日日江行不厭多寄陸伴讀闓朝回不放寸隂閒十日工夫畫一山我有越箋光若練待渠清暇寫荆闗南軒瀟灑紙窓眀曲几方牀事事清暇日相過不騎馬幅巾野服杖藜行題畵我家住在澱湖東風景依稀似畫中白首曵裾歸未得鷗波千頃屬漁翁黄州畵史王炳文自號臨臯漁隠短棹煙波學釣徒秋風舉網得鮮鱸幾時說與吾鄉味為寫坡仙赤壁圖題寧波胡公鼎雪巢虛白巢中徹夜明寥寥孤鶴夢難成竹爐火暖茶香裏人比梅花更自清江夏奚瑛以進士出宰武城其兄瑄作鵠山秋思圖寄之索題為賦絶句一首毎懷難弟有難兄貌得家莊寄武城千里鵠山秋色裏異鄉多少故鄉情答僧南洲寫梅見寄廿年不見老花光寫得繁枝逺寄將一自斷橋相别後暗香㡬度月昏黄龍門寺裏梅千樹開遍山南水北莊今日老禪頭已白寫来無色更無香題吴教授所藏郭奉祠子虛墨梅郎官逺寄一枝春寫得冰花箇箇真黄鶴山房明月夜暗香疎影屬詩人羅浮道士是前身愛寫江南雪裏春今日香魂招不得看花一度一傷神子虛已殁初為黄冠題陸二闓墨梅青禽枝上月如霜夢覺羅浮欲斷腸却憶故園池舘裏看花一月不燒香題銷寒梅圖日影纔將一線加綵毫呵凍染冰葩直教消盡南枝雪却向春風看杏花題奚瑛鵠山書屋黄鵠山家城裏居一城金帛走商車老夫獨數賢兄弟閉戸韲鹽讀父書書山谷道人詩帖後詩因得法能追杜書自名時已配蘇今日尚餘真蹟在月明滄海見珊瑚雲林先生小景為李至剛叅議題故家池舘錫山阿門逕寧容俗士過清閟閣空詩社散蛛絲牕戸落花多清閟閣先生藏書畵之所落花蛛網先生詩會中題也吴農四時歌家有田廬泖水東門前九朶翠芙蓉隣翁報我田官至明日花朝候勸農浜北浜南雨一犁隂隂桑柘鵓鳩啼木龍閑掛茅簷下百畝新秧已插齊種得紅芒與白秈五風十雨似堯年髙田無旱低無潦多辦今年賽社錢東隣社鼔接西隣酒滿槽頭稻滿囷官稅己輸私債辦白頭甘作太平民題葛稚川移家圖逺從勾漏覔丹砂服食長年髩不華從此上昇當拔宅何勞跋涉又移家彈琴小景自曵長裾兩髩斑久忘流水與髙山而今重理絃中操天賜殘年半日閑題鄞江蔡胄松牕讀書圖門外黄塵隘客車林中白日静吾廬一牕松影清風裏讀盡家傳萬巻書嘗榴錦苞擘破萬星攢顆顆紅堆碼碯盤若得美人纎手送尊前一洗腐儒酸嘗柑牙盤滿貯洞庭霜入爪霏霏細霧黄老去風流渾忘却擘來三日手猶香題奚瑄雲山佳處羣峰競秀遶儂家流水當門石逕斜閉戸不知春已去白雲滿地落松花缺題平生忠義氣如雲諸子鵷鸞又出羣喬木故家今絶少清風千載玉堂文森玉軒為醫士徐璉賦武昌髙士能醫俗萬箇琅玕繞舎栽一逕清風容直造掃門聽我珮聲來過池陽青山歴歴過池陽秋水蒹葭露己霜文選臺荒千載後西風吹雨墨猶香錢家灣夜泊千里江程百丈中磯頭日日浪掀空客杯易醒愁難寐半夜推篷數問風夜泊鸌港去去歸程泝急流打頭風起又維舟不因采石千罌酒􅄼解青山萬古愁晚宿盤塘旅行今夜宿盤塘江路無如此驛長詩句到家吟未了載將山色上歸航次韻青山夜泊滄江木落水多灣一月舟中飽㸔山明日到家牽世務閒情猶在白雲間辛巳中秋客邊嵗月去如流夫婦他鄉共白頭今夕一杯須盡飲人生能得幾中秋棄瓢圖掛瓢棄後耳纔清寵辱人間總不驚今日箕山弔陳跡千岩風木自秋聲題畵柴門春盡動鷗波樹色山光雨後多老去無官能自在醉眠江閣聽漁歌三泖東頭浴鵠灣我家政住水雲間一從失脚黄塵裏不及蕭然此老閒畵鷄蚤嵗書牕共寂寥幾聽風雨夜蕭蕭曵裾今向王門先猶頼司晨朔望朝蚓竅集巻八欽定四庫全書蚓竅集巻九明管時敏撰
