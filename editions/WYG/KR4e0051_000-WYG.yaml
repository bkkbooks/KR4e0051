front:
  text: 蚓竅集原序唐人有言文章實小技於道未為尊此非知言者也夫道之顯者謂之文故道以文而傳而文所以為載道之器也道不違乎人人之為文而違乎道豈足以言文哉况乎聲音之道與政通於其淸濁髙下疾徐促緩而道之升降政之美惡俗之隆汚係焉蓋審音足以知政聞樂足以知德皇明受天命一海内光岳之氣渾融純全灝灝噩噩之文渢渢乎其音播之宇宙時則楚有舊學之臣曰雲間管公時敏輔翼匡賛開陳啓沃凡二十五年而賢王仁厚明恕寅畏恭儉之德聞於天下公自紀善超左長史屬余來備員陪位得日聆其緒言餘論間出示所自作詩一編古製近體通若干首舂容乎其意度鏗鍧乎其節奏追琢乎其文章其言麗以則其思深以逺其義葩而正温柔敦厚不迫不切方諸古人亦未多讓顧自謙曰蚓竅集夫古之人修於身者不必施於政事施於政矣無待見於言語然德之發於口者為言蓋和順積中而英華發外自有不容已者公立身行事實踐其言故發爲文辭和平中正其可傳於來世也較然矣而公之所可以埀不朽者則不在是也賢王侈公之德欲夀其傳命刻諸板余不敏僣序其朔云永樂元年歳次癸未春三月望日奉議大夫楚府右長史山隂胡粹中序欽定四庫全書
