body:
  text: 五言長律洪武丙子三月三日千秋節芳年臨上已令節慶千春厯紀天開子杓迴月建辰四城佳氣合三殿曙光新禁鑰通關早宫壺轉漏頻駕從星戸入樂向露臺陳中使催班急西駒立仗馴燭樓晴吐日香几暖霏塵柳色籠雕輦蘭薰襲繡茵虎貔雄武弁鵷鷺肅朝紳王室分封盛宗藩展禮親南山齊獻夀四境共稱仁勝事宜修述才疎愧小臣分題得三槐亭送鳳陽知府李文爲弟極刑還鄉鳳翥羣山秀龍飛此地靈昔人曾種樹今日尚名亭宻葉生仍細疎花落更馨音聲來靜夜精魄孕虛星雨入霏琴薦雲屯黯硯屛秋隂連古市凉吹進空囹舊應三公兆今看五馬停麟符榮不忝燕寢夢俄醒郡事非螻蟻原情在鶺鴒從容辭組綬蕭散向林扃縹軸詩成什銀酒滿經歸裝勤去僕離曲厭歌伶戀闕心應赤還家鬢尚青民今思召政誰復犯齊刑郡乘歌宜載朝紳議可聽老夫將直筆爲著去思銘送武昌太守王德芳入覲今代論多士如公復幾人風姿珠樹皎文采鳳毛新禮樂名家子衣冠上國賔撫綏民若子發擿吏如神案牘從今簡閭閻復古淳儒宫儲萬巻市肆集千緡黍稌村村雨桑麻處處春賢聲清有跡善政美無倫客願依劉表人思借冦恂歌謠登郡乗論議動朝紳逺過龍河上終歸鳳沼濵天顔恒眷顧國政每諮詢何幸遭逢盛應知屬望頻行當調鼎鼐特爲展經綸題右長史富春胡去華乃父清之處士墓誌銘後處士爲里人誣訴于京而卒賜金還鄉以葬傷哉胡處士西淛舊知名卓行超前輩髙風起後生白雲營别墅華表卜佳城剩有林泉樂渾無寵辱驚野情聊自適世累忽相嬰地迥風烟暗天髙日月明雖興埋玉歎終荷賜金榮旅櫬他鄉發哀歌故里迎猿啼桐水夕鶴唳黙山晴子富春秋學人題月旦評焚黄時可待衣錦晝堪行銘碣祠前立圭田墓下耕束芻吾欲致酹酒若爲傾囘首松楸路凄然一愴情送進士萬嵩㑹試聖治開文運賔興屬俊才考官千里至多士四方來鶚薦逢三載麟經占一魁荆人無抱璞郢匠足掄材喜及簪花宴榮從擢桂迴擬登龍虎榜又上鳳凰臺志氣凌層漢文光近上台青山迎去斾綠水滌行杯良驥終騰足神魚豈暴腮好風當側耳佇聽禹門雷七夕飲謝氏偪側軒偪側軒中飲彬彬列儁髦上庖行盛饌大甕出新醪香靄雕盤霧茶鳴石鼎濤主人能倒屣我輩復同袍詩險才應捷杯長興愈豪良時偏易邁嘉㑹豈頻遭有幸陪淸賞無慚賦老饕厭厭歸已夜河鼓在林臯送進士奚瑛服闋赴京一日登科第三年讀禮書治裝辭邑里抱藝謁宸居慈母偏憐若難兄更戀渠花香留别席草色映行裾帆掛春波外樓凭夕照餘老懐雖悵望有喜聽嘉除哭先師樗隱先生先生姓劉名儼字敬思以樗隱自號世業儒爲錢塘人元世不仕隱居西湖之上天朝代元徴入京修禮樂書方輿續編既而授廣東市舶司令而疾卒敬賦長律以哭之痛哭劉夫子如今隔九泉感恩惟我在卓行許誰宣漢向猶今系梁紆復後賢家聲俱溢耳才望孰齊肩百氏遭漁獵羣經費討研大鏞知在序巨筆信如椽美玉雖居璞明珠必媚川薦章何懇懇束帛竟戔戔東壁星辰表西清雨露邊班陪黄閣老名厠玉堂仙禮樂皆新制方輿有續編宣麻應内命行李忽南遷漢節衝蠻雨黎歌入瘴烟客庖魚米賤商舶象犀聮省檄官將調郵書訃遽傳龍蛇雖起起鸞鶴定翩翩有客書銘碣何人給墓田禺山雲若慘谷水月空圓雨泣悲鸚鵡風魂託杜䳌哲人其逝矣小子獨凄然膏馥多沾丐愚䝉賴勉旃斯文因汨没吾道亦迍邅踵接才雖劣心喪禮自專每傷釃酹爵况忍讀哀篇感激千愁外號呼百拜前不知雙眼淚何日斷潺湲髹几髹几承恩賜書堂便老臣始知離廕室終得近華茵簡牘從多積尊彜可間陳色侵書葉冷光映墨花新坐次移來穩吟邊倚處頻芸香㣲隱霧梅影暗横春赤舄應難儗烏皮詎可倫量心知並潔鑑貌信能眞獨對懐殊遇相依媿此身賦成青玉案欲報諒何因行馬行馬非行馬如何作馬稱門闌知警蹕道路失驍騰外侮威能禦前驅任莫勝足分如鼎峙骨立更鋒稜洞戸金星映雲衢紫電凝圖形那是獸附尾諒無蠅曹植驕矜减楊彪貴顯增陪臣日趨謁有賴一懐兢送僧智益遊淛鐵佛千年寺髙僧始得名褁香叅祖塔洗鉢出王城水向三江渡山投兩淛行馬嘶天竺去虎過石橋迎問法心應切遊方道可成歸來當結社細與話無生丙子秋八月偶書今夏既無雨兹秋復亢陽雖云流大火未覺應清商午近風偏熱宵分露不凉四郊禾未秀一圃菜全荒雲起天光赤塵飛野色黄井深添汲綆江淺駐歸航解渴思茶椀銷愁仗酒觴蹉跎厭城市蕭散慕林塘頭白憐鄉逺心丹願主康老懐無以遣捉筆偶成章題伴讀董時貢所藏山水公館多清暇林泉惬所探人家如谷口風景似江南斷徑荒深蘚崩崖老巨楠鯨波通海去鳥道與雲參江艇維晨渚巖扉掩暮嵐雨田收赤黍霜圃摘黄柑未築清風屋先尋白石庵醉來休荷鍤老去願投簪許我閒身在從渠俗慮躭偶然忘世累聊復謝林慚和陸伴讀涇江曉行歸舟浪花白行旅鬢毛蒼天上君恩厚江邊客思長鷗迎迴渚集鴈逐斷雲翔山黑猶含霧林紅已被霜雨懐辭白下風憶過青陽酒盡懽寧極詩新興未央兹行須紀勝後㑹莫相忘和吳教授過潯陽三旬辭幕府千里歴星霜水鸛和鳴艣風烏逐去檣還家趨鄂渚歸路過潯陽山立雙峰峭江分九泒長雲泉髙噴薄烟樹逺㣲茫箬葉寒仍緑蓀花晚自芳守臣甘徇國遷客重離鄉簡冊遺風節琵琶斷淚行濕嵐郵傳外冷月戍樓傍老境頻過此懐賢易感傷白居易尚書左遷江州司馬李子威狀元出守江州盡節九月廿五日値余初度諸友以詩酒見夀於舟中賦五言長律一首以謝云老去逢初度􅄼知在客邊清歡當此日嘉㑹勝常年古鼎名香爇髙臺絳燭然仙庖能具饌官舫盛張筵新果登槃美佳肴入筯鮮慶行承綵帕夀祝荷華篇北斗長生外南山爛醉前交情何鄭重禮貌極周旋一府官僚盛千秋國主賢願同金石志永以保貞堅永嘉裴季和家有竹居典簿中都國學種竹數竿想像故園之意客舍仍栽竹殷勤憶故園亂枝交窄逕輕篠拂卑垣曙色烟凝几秋聲月在門殺青編汗簡浮碧注山尊斸筍供春祀行庖具夕飱髙人頻駐屐俗士竟迴轅雖與山林逺終無市井喧晉賢名未泯唐逸興猶存彷彿龜山路依稀鴈蕩村南歸遂幽息投老更何論蚓竅集巻四欽定四庫全書蚓竅集巻五明管時敏撰
