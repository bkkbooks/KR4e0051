body:
  text: 管時敏撰四言古詩素堂湘水之涘衡山之陽有美一人於焉構堂維榱維桷匪雕匪斲不尚其華爰復其朴堂之翼翼人之諄諄匪謀自適爰以養親于時興止于時甘㫖朝夕弗違惟親之喜委順在天窮達是宜居易而行心毋外馳奢則蠱情儉以養德用戒後昆服之無斁來德堂為中都國學分教林敬伯賦木之有本其􅆬乃强水之有源其流乃長吉士好脩德日以茂德為本源克昌厥後猗歟林氏奕奕名門維祖維禰曰子曰孫匪德之來曷裕其昆斯堂翼翼以示將來保而勿射維德是積我言爾銘于堂之壁毘陵薛泓自號淵泉求銘其室五行在天惟一生水水之有本源原于始瀦之斯止孰曰匪淵道之斯達孰曰匪泉盈科後進弗停一息維靜維深厥本乃立弗澄則濁罔覩山嶽弗撓則淸毫髪乃明撓之澄之淸濁辨焉匪水若兹惟人亦然心而弗澄百欲是興身而弗撓一私靡擾昔在聖賢觀厥川海以近取譬道無不在允爾泓父逝者若斯我告爾銘永言服之蚓竅集巻一欽定四庫全書蚓竅集巻二明管時敏撰
