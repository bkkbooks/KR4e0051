body:
  text: 七言古詩墨牕爲越人趙撝謙賦女媧立極斷鼇足羲畫之先無刻木始觀鳥跡製文字夜鬼哭天天雨粟篆𨽻變化生八分行草復作何紛紛六書古制既茫昧載籍况遭秦火焚後之作者不可數形聲寥寥眇千古更論得法神妙間自信臨池心獨苦君居於越文獻邦家藏金石書滿牕磨穿青州老未已萬斛巨鼎疇能扛吳興宗人已物故淛河東西誰獨步君今有志繼絶學砥柱中流見孤注剡溪百畨冰雪光𤣥霞一斗松煤香滿堂賔客看揮灑風雨颯颯龍鸞翔我嗟塗鴉手如棘屢欲從君問奇畫君還許我載酒來我捧千鍾勞君筆尹母行雲間尹母年十七嫁夫三年夫病卒舅姑在堂兒在褓自分㷀㷀守空室家貧何以爲生理紉縫得錢奉甘㫖門外春風自往來寒心一寸如灰死東家議姻張綺筵西鄰通媒續斷弦有山可移志不改冰霜凜凜心逾堅孤兒今年三十五教養成人應門戸舅姑百歳俱夀臧華榜旌書照鄉土九峰三泖清且奇柏舟泛泛淞之􅎠吾鄉風俗有如此終古不愧尹母詩李哥行霸州李哥年十五出身本是娼家女誓死願作良人妻不願隨時學歌舞白頭阿㜷不見容籍我花名入官府季哥有志不得酬終夜號咷淚如雨兒今未免從母命母也須當聽兒語淨洗容顔不食葷一釵一裙只荆苧唱歌得錢贍阿㜷此身不敢辭辛苦東城酒樓花滿烟五陵公子羅尊俎衆中一少忽相嘲李哥出門氣如虎益津縣監輕薄兒不惜黄金買同處阿㜷貪金不顧兒暝地甘言宻相許縣監夜半排闥入李哥拒之閉其戸大言痛詈汝監邑汝何不知民父母手操白刃不容狎縣監慙惶走無所霸州太守聞且驚吾州此女深可取有子讀書舉秀才年逾弱冠未婚娶通媒六禮議成姻一州歡傳得貞婦後來賊兵犯霸州李哥與夫遭賊虜賊見李哥好顔色但言殺夫不殺汝李哥得言即誓死與夫同死河之滸烏乎李哥節義俱赫赫聲名振今古我今聞之多慨慷激烈悲風起林莽他年觀我李哥行賊子奸臣面如土稼村贈鄉人孫原璘我家三里汀前住茅堂政近桃花渚學經不明欲歸耕佃得官田廿餘畝有書盡賣買農具甘作東屯種田父侯疆既足把犁鋤餉婦尤能載筐筥田中蟊稗日自除墻下蠶桑春可取秋風禾黍既登塲冬日雞豚復盈圃全家衣食幸餘饒老稚那知有辛苦東鄰擊鼔送農官西舍烹羊祀田祖且喜征科一事無况是豐年好官府縣吏催租不下鄉半夜無人打門戸官粮輸足私債無一村帖然如按堵自信於焉老此身豈謂年來繫簪組汨汨黄塵没馬頭白水青山竟虛負羨君學稼如老農久抱長材隱家墅奉親菽水喜平安教子書詩識今古我今不蠶亦不耕素餐厚禄知何補幾時上疏乞東歸白頭相尋願爲侣與爾擊壤歌堯年五日一風十日雨春江捕魚圖𤣥眞坊中老孫子老去今年不知幾綠蓑短短僅遮身自小求魚足生理魚倉蟹舍小蓬門一帶編鄰住江涘昨夜青山得雨多門前三尺桃花水大家漁具都上船水面紛然若浮蟻小兒捩柁立船梢老婦供炊在篷底大繩屬網絶中流東船纔下西船起須臾兩船相向開來徃風波疾如駛前船得魚先上城後船􅂞篙刺沙觜此賔此主尚杯盤樵青已臥蘆花裏醒者埀鈎醉者眠東去西來隨所止不欠官家魚税錢榮辱從來不干己我家江南山水間烟樹參差絶相似作客天涯未得歸一見此圖心獨喜俸錢幾時當買山小築茅堂三泖尾白頭方是謝官時也學漁家從此始題胡長史雪舟巻萬里漫漫凍雲黒六花飄飄朔風急富春江頭行旅稀汀鳥沙禽飢不飛此時先生乗一舸擁鼻長吟篷底坐白鶴氅衣寒半披東西㳂洄隨所之須臾雪深風轉大結纜歸來且髙卧妻兒凍餓甘守貧升斗不思干故人東方日出徴書下縣官扣門來勸駕仝將軍歌仝將軍壯且武前年去年殺兩虎受賜黄金百兩歸釃酒椎牛宴同伍意氣驕矜不可當自謂千人何足數今年搏虎東城下虎亦慿陵肆其怒一抉將軍雙目睛可憐竟作荒郊土烏乎勇不可恃利不可取汝不侮渠渠敢侮汝不見東海之濵釣魚父白頭龍鍾八十五題蔡將軍春擊毬圖中都五月炎光薄旭日曈曨射金閣無風無雨好端陽鼓聲鼕鼕動城郭諸王閲武出東華打毬又是常年約宫扇齊分五色雲天人坐擁青絲幙虎士嚴屯十衛兵毬塲千步平如削綵門逺處放毬來萬夫馬上俱欣躍半輪缺月地中生一㸃流星天際落衆皆努力向前趨苦心獨取仍難掠武昌將軍稱絶竒膽氣從容有經略等閒一擊過毬門四面騰聲總驚愕中官傳㫖催賜金一𣲖鐃歌半空作百萬人中奪綵迴人生獨有從軍樂從軍樂樂何如賢王豈事爲歡娛太平武脩不可無乃知將軍美丈夫雄才勇略應時須他年選將防邊隅論功直與衛霍俱畫象麒麟徴此圖患足行晚朝騎馬歸風雨忽蕭瑟中塗雖泥濘馬穩幸無失到家下馬燈火明妻子見我懽相迎開筵舉酒飲未已刁斗城頭敲二更我因良馬䝉君賜長恐官奴疎餧飤寒槽芻粟夜頻㸔恩極那能有全寐促燈下堂催上芻泥滑失脚嗔人扶蒼黄不知骨已折始信人間無坦途烏乎生死固有時禍福豈無命塞翁塞翁勿復論卧㸔楊花風不定桃花歌次韻荅季翔春來看花須及早莫待韶光去如掃年年花發看應遲幾多狼籍被風吹今年無風亦無雨千樹桃花紅爛吐香塵繡轂動遊人流水瓊筵出歌女天氣艷陽三月時倚闌吹徹玉參差百壺送酒莫停飲秪恐落花辭故枝落花飄盡春無迹著意留春花可惜花開花落一畨春與君莫作傷春客㑹須日日醉花前不放閒愁到酒邊有花可看酒可飲但願以此終殘年敬賦天馬歌臣聞天馬不易得房星降精産西域雙蹄並截白玊光一身渾染𤣥雲色雄姿非駻亦非騋八尺乃是眞龍媒天生權奇特神駿烏騅赤兎皆凡材風尾蕭蕭耳雙聳萬里騰驤塵不動畨臣重譯貢中華黄金論價如山重太僕養之十二閑立仗曉聨鵷鷺班在廷畵史皆國手乃爲寫眞傳世間當今聖主修文德逺裔窮荒俱混一不用勞師圍大宛年年擬獻三千匹敬賦白鷹臣聞名鷹不易得衆中奇者色純白金眸星轉雪爲翎玉爪風生觜如㦸天然逺自海東來論價可輕雙白璧鷹師調養水食勻臂擎不敢離朝夕十月平原百草枯野馬山牛俱辟易出籠一脱紅錦鞲隨人指顧無虛擲嗟哉此鷹殊可惜奮擊眞如萬人敵吾王育之豈爲事遊田要激猛士于疆埸哀鴈吟鄰有貞婦痛夫以刑死日夜號泣誓不再天余嘉其志爲賦哀鴈吟哀鴈復哀鴈雄雌不相違三春北去秋南歸年年稻粱充汝肥汝肥曷己時安知矰繳不汝隨一朝弋雄孤其雌雌孤殊可傷夜夜啼秋霜楚天空闊雲水長誓不更逐羣侣翔花開春滿塘不媿鴛與鴦鷹雞行白日中庭忽風過鷹攫雞雛半空墮誰家失之無處尋家奴拾得如拳大毛血淋漓殊可傷性命幸脱飢鷹腸山妻丁寧勤餧飤愛䕶眞如孤鳳凰錦毛漸長雙冠聳可愛花隂闘時勇我雖老饞不爾烹留取年年作雛種射鹿行雲夢澤中冬信早十月清霜凋宿草此地猶存古獵場周遭百里青山繞吾王一歳一遊田麝香名馬青連錢紫絲埀韁黄金勒紅錦裁鞍白玉鞭騎來獵場世稀有馬首忽驚山鹿走老麋鼓勇獨當前羣䴠甡甡總隨後彤弓滿引與月同白羽出挿生腥風迴身連發踣雙鹿左膘右髃毛血紅妙手穿楊古無比嘖嘖懽聲溢人耳林深伏虎莫敢行木末窮猿號不已笳鼓喧闐催解圍千萬人中得雋歸行庖吹香出翠釜從官縷割誇鮮肥大府分封鎭荆楚農隙年年須講武太平武偹不可無萬載千秋作藩輔蚓竅集巻五欽定四庫全書蚓竅集卷六明管時敏撰七言律詩姚氏野春堂野外茅堂不掩扉堂前風日散晴霏梨花門巷清明近春水池塘燕子飛每約隣翁同社飲更從田畯勸農歸明朝我亦尋春去小試東風白苧衣宴徐氏樓髙宴徐家池上樓座中賓客總風流東城美酒休辭醉南國佳人自解愁晴日遊絲當戸落暖風香篆近簾浮歸時不用三公馬短棹春波正滿洲答吳髙士見寄青鞋布襪木綿裘合是山中隠者流舉世可無劉越石薦賢誰是吕婆樓秋風泖蟹年年上春水沙鷗日日浮好為攜琴并載酒三髙祠下放扁舟和内兄金士㢘清明日答張應辰見過雨晴江路少塵沙有客尋春到水涯風細遊絲低著草日斜歸鳥亂穿花青山幾處無新塜喬木何人是故家倩得盤遊春髻子東風日日好將車小雨輕風寒食後一春惟酒是生涯過江不用歌桃葉出郭先宜㸔杏花亂後此身猶是客醉中隨處即為家白鷗信我忘機事擬買滄洲一釣車清明感懐二首十年宦學楚江濱老景埀埀上此身插柳忽逢三月節㸔花又過二分春青山風雨多新鬼白髪江湖少故人東憶墓田千阜下可堪回首一霑巾客裏逢春百感生况聽風雨過清明楊花總是離人恨桃葉都非舊妾情小引酒杯還易醉苦吟詩句却難成不知誰是窮途者哭似當時阮歩兵山水圖青山何處躡崚嶒我擬幽棲久未能深谷雨來雲正合大江風作水如崩林中短屐行相引渡口孤航喚欲譍今日未醒塵土夢披圖長嘯媿孫登山水便面宣和便面何從得畫史當時屬有才紫翠峰巒天上落青紅樓閣樹頭開羣賢似向蘭亭㑹一老疑從栗里來安得從容隨杖屨輕舟日繫水雲隈人日偶興宦遊江漢十經春白髪東風鏡裏新千里此身長在客一年今日又逢人雨中柳色黄猶嫩冰後湖光緑更勻藩府官閒如化國不知誰是葛天民禮部頒王府文官誥勑次審理王敬徳韻紫誥恭迎被寵光驛亭初日正蒼凉官坊錦織雲霞爛御榻文成雨露香九五飛龍當盛世太平鳴鳳在朝陽羣公拜舞天威近舉首紅雲是建章元日和季翔韻嘉節金門慶履端無風無雨萬人歡通班新例行中使導駕常儀忝從官列仗纔廻燈影曙嚴兵未解甲光寒宴闌歸去恩榮甚醉插宫花上錦鞍御賜西馬金門蹴踏五雲開七尺權竒信是騋近自天閑頒賜下逺從西域貢將來雄姿共擬千金價駿足争誇萬里材昨日錦鞍新鞴出殿前立仗總駑駘㕘侍平靖州諸蠻次季翔韻親王承詔討南蠻三月星霜歴險艱萬斛樓船上秋水千羣鐵騎蹴寒山孔明謾説安夷俗馬援應慙入漢闗十二妖酋今盡縛皇華又報㨗書還軍屯十萬坪玉帳秋臨十萬坪石家銅鼓夜無聲千團毒霧開山寨萬竈炊烟起野營自信丹心能報國誰知白首厭談兵中官催草征南㨗龍燭生花剪更明丙寅元日軍中次季翔韻羽仗森嚴午夜陳千官行殿慶新春四時佳節逢元日甲子豐年見上旬鵠立久叨居侍史鹿鳴今喜宴嘉賓凱音歸及燒燈候一路東風火樹新侍從朝京還國舟中簡府僚諸王入覲試功初恩及吾君慶有餘聖語自天稱國穏臣心何地愧才踈四夷率服英風逺九域同仁化日舒幸遇太平全盛際不妨白首曵長裾欽賦大將征回聖念蒼生重拓邊王師奏㨗凱歌旋千營列柵天籠野萬竈連山地湧泉魚海於今歸版籍狼荒從此靖風烟華夷一統文明日共祝吾皇億萬年觀射柳贈陳僉衞琰將種傳家屬妙齡端陽射柳在王庭馬㸔飛鞚如追電箭訝離弦若迸星度内等閒知中白眼中端的肯撩青含風細葛君恩賜自笑吾儕字識丁軍中寄潭府紀善楊應庚奉使君初過武昌從征我已上渠陽雞聲風雨同為客馬首雲山各異鄉千里還家驚臘盡百年依世幸身强相思恐有平安字好寄南來鴈一行寄淞上友人憶昔都門把臂時殷勤索我送行詩客邊頼爾能相慰别後令人有所思芳草暮雲愁忽忽落花春雨鬢絲絲東歸艇子如堪買定擬尋君泗水湄送兄勉翁自鳳陽廻淞把酒燈前醉復傾别離無限異鄉情一身千里久為客百嵗幾時長見兄春雨園廬青草遍暮雲丘隴紫芝生白頭遂我東轅日數畝圭田得耦耕題胡長史所藏風晴雨嫩墨竹四首記得東林臘月栽虛懐今對畵圖開碧雲何處忽飛到蒼雪無聲欲墮來尚覺暮寒生翠袖不驚午夢斷瑶臺故園茅屋蕭蕭裏若箇家僮掃石苔萬箇琅玕繞舎栽拂簷金翠曙光開尋常每夢鸞笙下彷彿遥驂鶴駕來千尺洋州休製韈一竿嚴瀬獨登臺白頭天與歸歟便短策行吟石逕苔移得篔簹谷裡栽柴門蕭爽曉慵開林慙我向當年隠逕造人從此日來六月微凉生枕簟半天空翠落亭臺公家池館平安在遥憶清隂遍緑苔舊本曽於醉日栽新梢今己拂雲開蕭蕭籜向風前落細細香從雨後來漸有微隂侵墨沼且無虛籟過琴臺明年二月春雷起秪恐䙀兒破紫苔過洞庭湖上東風水似天渚花紅白共春妍蒼梧二女墳前路青草三閭廟下船鮫室綃機聲札札龍宫珠珮影姢姢官閒更遂南遊興借榻君山寺裏眠
