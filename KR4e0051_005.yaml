  text: 蚓竅集卷五
  hash: sha256:7113a4be782d953fb650f22806eee8f6e31c369dd6c8bb02545c319642ecd51f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0051_SBCK_005-1a}
body:
  text: 雲間管時敏撰西域丁鶴年評七言古詩墨窗為越人趙撝謙賦女媧立極斷鰲足羲畫之先無刻木始觀鳥迹製文字夜鬼哭天天雨粟篆隸變化生八分行草復作何紛紛六書古制既茫眛載籍况遭秦火焚後之作者不可數形聲寥寥眇千古更論得法神妙間自信臨池心獨苦君居於越文獻邦家藏金石書滿窗磨穿青州老未巳萬斛巨鼎疇能扛吳興宗人巳物故浙河東西誰獨步君今有志繼絶學砥柱中流見孤注剡溪百畨冰雪光玄霞一斗松煤香滿堂賔客看揮灑風雨颯颯龍鸞翔我嗟塗鴉手如棘屢𣣔從君問竒畫君還許我載酒來我捧千鍾勞君筆評曰意古辭工諸長篇中惟此為最尹母行雲間尹母年十七嫁夫三年夫病卒舅姑在堂兒在褓自分煢煢守空室家貧何以為生理紉縫得錢奉甘旨門外春風自往來寒心一寸如灰死評曰寫出尹母鐡石肝腸東家議􅊚張綺筵西鄰通媒續斷弦有山可移志不改冰霜凛凛心逾堅孤兒今年三十五教飬成人應門户舅姑百歲俱夀藏華榜旌書照鄉土九峰三泖清且竒柏舟泛泛淞之湄吾鄉風俗有如此終古不愧尹母詩李哥行霸州李哥年十五出身本是娼家女誓死願作良人妻不願隨群學歌舞白頭阿􅭊不見容籍我花名入官府李哥有志不得酬終夜號咷淚如雨兒今未免從毋命母也須當聽兒語淨洗容顔不食葷一叉一裙只荆苧唱歌得錢贍阿􅭊此身不敢辭􅉝苦東城酒樓花滿煙五陵公子羅尊爼衆中一少忽相嘲李哥出門氣如虎益津縣監輕薄兒不惜黃金買同處阿􅭊貪金不顧兒暝地甘言密相許縣監夜半排闥入李哥拒之閉其户大言痛詈汝監邑汝何不知民父母手操白刃不容狎縣監慙惶走無所霸州太守聞且驚吾州此女深可取有子讀書舉秀才年逾弱冠未婚娶通媒六禮議成􅊚一州歡傳得貞婦後來賊兵犯霸州李哥與夫遭賊虜賊見李哥美顔色但言殺夫不殺汝李哥得言即誓死與夫同死河之滸烏乎李哥節義俱赫赫聲名振今古我今聞之多慨慷激烈悲風起林莾他年觀我李哥行賊子姦臣靣如土評曰李哥之行固有可取不遇士大夫為之發揮亦與草木同腐巳至正之變忠臣節婦豈特此耳是所遇有幸不率也稼村贈鄉人孫原璘我家三里汀前住茅堂政近桃花渚學經不眀欲歸耕佃得官田草餘畝有書盡賣買農具甘作東屯種田父侯疆既足把犁鋤餉婦尤能載筐筥田中蟊稗日自除牆下蠶桑春可取秋風禾黍既登場冬日雞豚復盈圃全家衣食幸餘饒老稚那知有􅉝苦東鄰擊鼓送農官西舍烹羊祀田祖且喜征科一事無况是豐年好官府縣吏催租不下鄉半夜無人打門户官糧輸足私債無一村帖然如按堵自信于焉老此身豈謂年來繫簮組汨汨黃塵沒馬頭白水青山竟虛負羡君學稼如老農久抱長材隱家墅奉親菽水喜平安教子書詩識今古我今不蠶亦不耕素餐厚祿知何輔幾時上疏乞東歸白頭相尋願為侶與爾擊壤歌堯年五日一風十日雨春江捕魚圖玄真坊中老孫子老去今年不知幾緑蓑短短僅遮身自小求魚足生理魚倉蟹舍小蓬門一帶編鄰住江涘昨夜青山得雨多門前三尺桃花水大家漁具都上船水靣紛然若浮蟻小兒捩柁立船梢老婦供炊在蓬底大繩屬網絶中流東船才下西船起須臾兩船相向開來往風波疾如駛前船得魚先上城後船廽篙刺沙觜此賔此主尚杯盤樵青已卧蘆花裏醒者垂鈎醉者眠東去西來隨所止不欠官家魚稅錢榮辱從來不干已我家江南山水間煙樹參差絶相似作客天涯未得歸一見此圖心獨喜俸錢幾時當買山小築茅堂三泖尾白頭方是謝官時也學漁家從此始題胡長史雪舟卷萬里漫漫凍雲黑六花飄飄朔風急富春江頭行依稀汀鳥沙禽飢不飛此時先生乘一舸擁鼻長吟蓬底坐白鶴氅衣寒半披東西沿洄隨所之須臾雪深風轉大結纜歸來且髙卧妻兒凍餓甘守貧升斗不思千故人東方日出徴書下縣官扣門來勸駕同將軍歌同將軍壯且武前年去年殺兩虎受賜黃金百兩歸釃酒椎牛宴同伍意氣驕矜不可當自謂千人何足數今年搏虎東城下虎亦慿陵肆其怒一抉將軍雙目睛可憐竟作荒郊土烏乎勇不可恃利不可取汝不侮渠渠敢侮汝不見東海之濵釣魚父白頭龍鍾八十五評曰語有規戒題蔡將軍春擊毬圖中都五月炎光薄旭日曈朧射金閣無風無雨好端陽鼓聲鼕鼕動城郭諸王閲武出東華打毬又是常年約宫扇齊分五色雲天人坐擁青絲幕虎士嚴屯千衛兵毬場千步平如削綵門逺處放毬來萬夫馬上俱欣躍半輪缺月地中生一點流星天際落衆皆努力向前趍苦心獨取仍難掠武昌將軍稱絶竒膽氣從容有經略等間一擊過毬門四面騰聲總驚愕中官傳旨催賜金一沠鐃歌半空作百萬人中奪綵廽人生獨有從軍樂從軍樂樂何如賢王豈事為歡娛太平武備不可無乃知將軍美丈夫雄才勇略應時須他年選將防邊隅論功直與衛霍俱畫象麒麟徴此圗評曰健筆縱橫有與蔡將軍意氣爭雄長患足行晚朝騎馬歸風雨忽蕭瑟中塗雖泥濘馬穩幸無失到家下馬燈火眀妻子見我歡相迎開筵舉酒飲未已刁斗城頭𫾣二更我因良馬蒙君賜長恐官㚢踈餧飼寒槽芻粟夜頻看恩極那能有全寐促燈下堂催上芻泥滑失腳嗔人扶倉黃不知骨巳折始信人間無坦途烏乎生死固有時禍福豈無命塞翁塞翁勿復論卧看楊花風不定桃花歌次韻答季翔春來看花須及早莫待韶光去如掃年年花發看應遲幾多狼籍𬒳風吹今年無風亦無雨千樹桃花紅爛吐香塵繡轂動逰人流水瓊筵出歌女天氣艷陽三月時倚闌吹徹王參差百壷送酒莫停飲秖恐落花辭故枝落花飄盡春無迹著意留春花可惜花開花落一畨春與君莫作傷春客會須日日醉花前不放間愁到酒邊有花可看酒可飲但願以此終殘年敬賦天馬歌昔聞天馬不易得房星降精産西域雙蹄並截白玉光一身渾染玄雲色雄姿非駻亦非騋八尺乃是真龍媒天生權竒特神駿烏騅赤兔皆凡材風尾蕭蕭耳雙聳萬里騰驤塵不動畨臣重譯貢中華黃金論價如山重太僕飬之十二間立仗曉聮鵷鷺班在廷畫史皆國手乃為寫真傳世間當今聖主修文德逺裔窮荒俱混一不用勞師圍太宛年年擬獻三千匹敬賦白鷹臣聞名鷹不易得衆中竒者色純白金眸星轉雪為翎玉瓜風生觜如戟天然逺自海東來論價可輕雙白璧鷹師調飬水食勻臂擎不敢離朝夕十月平原百草枯野馬山牛俱辟易出籠一脫紅錦鞲隨人指顧無虛擲嗟哉此鷹殊可惜奮擊真如萬人敵吾王育之豈為事逰田要激猛士于疆埸評曰天焉白鷹結句皆磊落稱題哀鴈吟鄰有貞婦痛夫以刑死日夜號泣誓不再天余嘉其志為賦哀鴈吟哀鴈復哀鴈雄雌不相違三春北去秋南歸年年稻梁充汝肥汝肥曷巳時安知矰繳不汝隨一朝弋雄孤其雌雌孤殊可傷夜夜啼秋霜楚天空闊雲水長誓不更逐群侣翔花間滿春塘不愧鴛與鴦鷹雞行白日中庭忽風過鷹攫雞雛半空墮誰家失之無處尋家奴拾得如拳大毛血淋漓殊可傷性命幸脫飢鷹腸山妻叮嚀勤餧飼愛護真如孤鳯凰錦毛漸長雙冠聳可愛花隂鬪時勇我雖老饞不爾烹留取年年作雛種射鹿行雲夢澤中冬信早十月清霜凋宿草此地猶存古獵場周遭百里青山繞吾王一歲一遊田麝香名馬青連錢𬗋絲垂韁黃金勒紅錦裁鞍白玉鞭騎來獵場世稀有馬首忽驚山鹿走老麋鼓勇獨當前群䴠甡甡總隨後􅊮弓滿引與月同白羽出插生腥風回身連發踣雙鹿左膘右髃毛血紅妙手穿楊古無比嘖嘖歡聲溢人耳林深伏虎莫敢行木末窮猿號不巳笳鼓喧闐催解圍千萬人中得雋歸行庖吹香出翠釡從官縷割誇鮮肥大府分封鎮荆楚農隙年年須講武太平武備不可無萬載千秋作藩輔
