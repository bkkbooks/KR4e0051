front:
  text: 蚓竅集卷七
  hash: sha256:5ef8180a06090d7c15f25a6aebf64da88e8dfa330efc0e40af0c50aa75172550
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0051_SBCK_007-1a}
body:
  text: 雲間管時敏撰西域丁鶴年評七言長律審理正蔡原輔遣子還天台省親郎君烏帽越羅衫文采温温自不凡大父髙堂垂鶴髮阿翁上府署氷衘閒情白日佳山水雅操清霜古檜杉公舘揮毫知有暇客庖食蟹喜無監宦逰遍歷長途轍歸省俄揚極浦㠶水暖船頭魚潑潑泥融江尾燕喃喃彩虹遙貫詩連軸𬗋氣髙騰劔在函行李異郷過赤壁㸔花故道入黄巖國人共識張曽子隣叟争迎阮阿咸拜舞重闈通逺問平安須早寄魚緘題藍山簿天台陳仲素先隴圗孝子之官萬里途臨行貌得夀蔵圖赤城親舍雲多少黃葉人家路有無雙石效竒華表立一峰㧞秀錦屛紆地存牛跡曽眠處山擁龍形正向隅燁燁靈芝生百本森森喬木長千株青天忽下過門鶴白日仍飛累土烏有客束芻将適越無人掛劒更歸呉年登老圃收松子秋薦思亭採木奴入里上官知下馬卜隣故老候歸鳬榮知衣錦風雲遂恩及焚黄雨露殊且喜子孫供祭掃不愁翁仲沒榛蕪哀余東望干将下寒食梨花酒一壺題典儀柳以臨九鸞白雲圗清郎今是楚儀官鴈蕩雲山畫裏觀山似青鸞来九箇雲非蒼狗變千端倚門斜日楓林晚拄笏髙烛草閣寒庭樹鷄鳴思問寝江庖魚美阻承歡桂因招隱烟叢老萱解忘憂露葉溥溪上樵歸風且便源頭童汲雨初乾烏犍耕後曽秋穫白鶴歸時及晚餐東里遷居逢孟毋西隣醵社祀丁蘭天邊見鴈歸心切月下聞蛩旅夣殘𬗋誥㝎應来絢爛綵衣重得舞盤桓板輿前引行花徑竹杖旁随過藥䦨春酒髙堂介眉夀更圗家慶後人看九曲山房為寧波史孝子賦四眀髙士好山房雲磴烟林隔渺茫小逕到門通窄窄流泉繞壁聴浪浪幽居宛似清風屋别墅渾勝華子岡漁入誤迷源口路樵歸分坐石邊牀傷烏群集慈親墓吊鶴雙臨孝子郷芋栗早收防歲歉蘋蘩預採備秋甞故交天上青雲逺髙隱山中白日長秫米夜舂催釀酒松花曉折常焚香自知栗里多栽菊誰復成都别種桑念我故園三泖上㡬囬落月夣荒涼和韻過彭澤懐靖節先生官船晚泊潯陽郭把酒長懐靖節賢腰折竟辭彭澤米眉攅寧種逺公蓮歸来松菊開三逕老去柴桑受一㕓晉代衣冠誰避世劉家社稷自書年雖云富貴非吾願已有清髙獨爾傳千載令人弔遺跡好山青立縣門前射虎行鄂城之南山有虎為害其威暴甚獵者咸莫敢攖王聞之挽弓上馬一發斃之民皆稱慶禦災捍患古人所重臣職在紀述不敢不書時洪武丙子仲冬既望也黄草玄冬多虎踞青山白日少人行君王勃起英姿奮衞士前驅猛氣横弓挽蛇皮如月滿箭飛鵰羽若風生弦開應手神應助鏃貫當心鬼亦驚腥血濺時班尾折倀魂落䖏錦毛傾逰兵警衆銅龍吼歸隊催程鐡馬鳴一路塵埃天已冥千營燈火夜初明從今境内無驚擾犬豕村村樂太平評曰除害衞生寫出仁者之勇可見筆鋒與矢鏃爭銳矣敬和畫碧桃詩韻風流畫史惜年光寫出宫桃異衆芳深淺舊紅渾改色䡖盈新碧倍生香佳人金谷顔如雪阿母瑶池鬂已霜不與杏花爭艷冶肯随栁絮効顛狂靚粧姑射花鈿小緩歩飛瓊玉珮長勾引流鶯窺翠幙留連戯蝶繞華堂題詩細詠情何極呼酒相㸔醉不妨帶露一枝尤瑩㓗絶勝湯餅試何郎評曰詠物詩形容精緻至此非自家筆頭上有五色花者不䏻也
