front:
  text: 蚓竅集卷三
  hash: sha256:161e3795701e5f19bc0e0d198ace1aecbf30c1d3332fd682a42ef17f4d842e9b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0051_SBCK_003-1a}
body:
  text: 雲間管時敏撰西域丁鶴年評五言律詩逰寶林寺金碧絢樓臺禪關向此開水分雙澗出雲擁萬峰來古佛遺香火殘僧話劫灰黃塵吾老矣何幸一徘徊獨坐獨坐茅堂上長吟不下牀亂書堆几席踈雨過陂塘野燕衝簾入汀花度水香應須存晚計次第學耕桑答友人雨中見寄雨聲連曉夕牢落閉幽扉屋漏頻移榻江寒更覔衣野烏飢自下水鳥濕還飛爾亦忘機者終同理釣磯過田家偶過吳家墅殘陽半掩扉逺汀低樹密小徑雜花稀新酒浮篘釅鮮鱗墜釣肥年來任踈懶一醉即忘歸郊居二首移家雖逼側只此足幽居茅屋三間小春田草畝餘人來論稼穡自學杷犁鋤東舍催租急烹雞酌小胥春城俯平野草色靜柴門魚蟹舟中市桑麻屋後村遣兒招社飲為客置盤飱老計䏻如此陶然付一尊評曰獨坐詩至此共五首以恬淡心造清淳語是䏻安其所遇無慕乎其外者歟贈洪山龍門海禪師侍者真淨祝髮名真淨從今淨已真誦經當作佛持律定過人江月空中夜山花物外春龍門多寶藏種種是竒珍送宗師還玉泉寺省師何處去古寺玉泉清山笠披雲過江船趂月行拈香參祖塔乞食到王城此去傳心印應知道可成和季翔夢與海禪師看牡丹之作師時以事京栽松道者栽松去何因看牡丹相思春獨苦孤夢夜初殘子已空中見師應㝎裏觀歸時當記取饒舌問豐干其二太息東巖叟艱危命若絲當知成佛日還有受魔時短髮蕭蕭落孤心耿耿持可堪江樹晚千里動遐思夢逰洪山寺不到東巖閣重來又一年無緣能離俗有夢只棲禪客坐茶香裏僧行竹影邊夕陽天未晚幽思滿歸韀從征古州蠻回途紀驛二十三首晨發渠陽郡歸心一惘然離家今五月為客巳中年暮雨行人裏春泥去馬前洪江眀日到沽酒上官船右發靖州行行過若水古驛在江臯自是登舟險終無䇿馬勞山雲含宿雨灘石漏奔濤此地如能隱塵煩或我逃右洪江夜過安江驛停舟不敢行亂山藏月色暗石鼓灘聲千里從軍事中宵感客情不眠聊伏枕天白更孤征右安江早行今幾里又說次潼安古驛烟中入前山雨裏看江廽逢斷洑水落見危灘濁酒雖非嗜聊持破曉寒右潼安江口何年驛過逢𣣔雨天居人張夜火使客換春船雲起崇山外江通溆浦前鸕鷀灘已過今夕解衣眠右江口歸舟春水疾舉棹即辰溪岸轉山疑動江分路𣣔迷乾坤千里客風雨五更雞自愧如萍跡飄飄未㝎棲右辰溪武陵溪上驛因紀武陵名樹列千旗勢江喧萬鼓聲生苗今向化落草久無兵好載桐艚酒㳂山看晚晴右武溪王程不敢緩四日下辰陽古木將軍廟春波使者航城依山勢險江納雨聲長莫上觀瀾閣傷心在異鄉右怡溶今日行兹驛如何是北溶雲濤千數里烟樹萬餘重江黑留春棹林虛動夜舂驛官應被酒出迓甚踈慵右北溶天設非常險舟航豈易過大風掀逆浪暗石起盤渦行路難如此垂堂意若何榜人殊可怪不住唱蠻歌右清浪歷險過髙都都前景色殊江廽千石盡岸斷一山孤自昔無危道于今即坦途宵征從此去舟子亦歡呼右髙都勝地古桃川尋真亦偶然今來江上客未遇洞中仙碧樹收新雨青山羃逺烟不知何處路迷却釣魚船右緑蘿大鎮開戎衛雄城雉堞連仙人曽鑄鼎帝子復停船夜雨燒燈後春雷起蟄前邊隅今巳靖佇聽凱歌旋右府河江上龍陽縣遙遙百里程青山雲外小白鳥雨邊眀臘酒沽應熟春薑種已生驛人䏻雅致髙閣榜臨清右河池擾擾天涯客悠悠武口船年光雙鬢裏春事百花前浮世身如寄還家夢屢牽眀朝過湖去風熟片帆懸右武口已遂南逰興歸帆過洞庭浪花風裏白汀草雨中青一點麈無染千杯酒亦醒好將江叟笛吹與老蛂聽右眀山洞庭八百里勢與兩湖通日月蒼茫際乾坤混沌中青山僧寺雨白浪客帆風浩蕩論胸次王師小戰㓛右城陵飬鴨人何在猶傳飬鴨䦨野烟青草晚江雨緑波寒表驛名因勝充庖味可餐兹禽應解語豈敢學彈丸右鴨䦨曺公兵敗處今識在嘉魚赤壁三分後烏林百戰餘橋浮春渡闊舟泊夜江虛千古英雄事悲涼太史書右石頭口桃花江上驛春水賣新魚滿尺銀堪比千鱗錦不如因歌悲客裏每食感王餘評曰形容至此不惟出竒可謂一飯不忘君矣江海親朋少誰傳一紙書右魚山武昌歸已近今日過簰洲沙泊春廽鴈江喧晚浴鷗白花梅欲盡青葉柳初柔鶴駕來天上新晴慰逺逰右簰洲銜命來金口郵籖報驛程好風行十日殘月上三更商舶停初穩漁燈照更眀同袍一尊酒珍重逺相迎右金口江驛行初盡今晨到武昌宦情如昨日春色是他鄉烏鵲知人喜駑駘怯路長家童應念我戴月候舟傍右夏口評曰從征詩草三首各因其山川險易風景明晦首首不同是得紀行之法緑蘿河池眀山三聮皆有聲之畫江行二首夜度繁昌夾雲帆萬斛船岸燈踈樹裏江笛晚風前水急潮廽渚江空月在川年年來復往華髮漸盈顛行行幾百里又過十三磯宿鴈逢沙落驚鳬帶水飛山寒花寂寞江晚樹依稀自笑無家客他鄉亦當歸病足二首移榻西軒下翛然意自清焚香終日坐好鳥隔窗鳴文墨容踈懶賔朋失送迎自慙猶祿仕那得此身䡖老為身多纍官因病暫間春餘啼鳥裏興盡落花間莫遣詩排悶聊慿酒破顔開窗看晴色一片白雲還齊居直館直館齊居夜心無一慮縈茶烟籠燭暗花月進窗明老去頭雖白官閒夢亦清明朝當署祝早起候宫城評曰敬謹之心不遑寧處送僧景怡住持黃梅四祖寺杖錫雙峰去登登向白雲焚香禮祖罷說法與僧聞蘿幌清風入松門碧靄分若無行腳念終老逺塵氛丁丑仲春聞兄勉翁因門後從軍不知戌所有憂而作書劄望平安那知報急難宦途嗟我隔親塜念誰看烟瘴南州熱風沙北地寒鶺鴒原上淚雙䄂幾時乾評曰友于之愛急難之憂流出肺腑贈僧龍翼雲形迹無拘礙飛行遍九垓騰空那假錫度海不須杯花落千峰雨松喧萬壑雷老人應聽法一日幾多廽評曰與諸僧詩用其本色語作我佳麗句是化乳酪為醍醐也雲谷為武昌奚瑄賦空谷幽人意閒雲靜者心石圍花下奕泉答竹間琴鶴影蒼巖逺雞聲碧樹深雖云住城市何異在山林侍宴封內春祠罷宫中胙宴開席從廊署設樂自殿庭來中使巡筵過千官被酒廽樂邦瞻盛事紀述愧無才次季翔韻送陳僉衛琰征大庸蠻將軍名將種承詔討南蠻虜命危如卯兵威重若山斬酋花石下焚寨柿溪間一月聞三捷長歌奏凱還題蔡用強石城山房絶境羣峰合幽居一徑分巖花和雨落林鳥隔雲聞門熟呼猿果書香辟蠧藝不因徴召起終是逺人群題修江向自誠靜樂軒深巷無車馬衡門盡日扃古苔迷曲砌春草滿閒庭雨笠嫌蘇戴風瓢厭許聽香消清晝永自閲太玄經觀孔雀朝竒鳥當晴午團團展羽衣翠分雙扇舉金擁一屛圍綵鳯宜偕舞文翬敢並飛東園非有召何幸覩恩輝過烏沙夾答諸僚友二首曉過烏沙夾秋風萬斛舟青天雲際鴈白浪水中鷗兄弟皆良㑹江山足勝逰行行紅日近佳氣靄皇州黃石磯頭酒烏沙夾口舟暮雲隨逺鵠秋水泛輕鷗賦詠陪前輩經過念昔逰風帆能借便只尺是神州入都門下馬入都門熙熙㬌色溫水朝滄海闊星拱𬗋宸尊麟鳳千官集熊羆百將屯鴻臚早通籍稽首謝君恩早朝宫城猶下漏禁鼓巳催班初日眀三殿清風肅九關臚傳仙仗裏香裊御爐間幸際隆平日承恩拜聖顔出都門天上還家日沙邊解纜時亂山含宿翠飛鳥戲晴絲野眺偏宜逺江行不厭遲正期逰汗漫何幸值雍熙發新河次韻自忝王門祿頻年此地過秋風回逺道暮雨宿新河白浪鷗邊小青山鴈外多客杯相慰藉一酌總恩波回從經陽邏陽邏行將近淘金過淺灘草痕秋更碧江氣晚逾寒世情尤拙還家跡易安客愁雖似海未敵酒杯乾舟中寫示蕭雷二伴讀拜秩辭亰國揚帆放使舟微茫烟外樹浩蕩雨中鷗詩美青山對杯空采石謀應將柁樓興一望楚天秋過采石水急灘難上行行欲曙天人家多賣酒客路暫停船采石荒祠下黃山古塔邊經過人易老搔首一茫然曉發雷港月暗投寒港天眀發曉途鷺應尋宿侣鴈已誤更奴霞映㳂汀􅖋霜枯倚岸蘆彭郎磯尚逺隱隱一山孤小孤山一柱千尋直孤根萬丈深雲間盤翠髻天外墮瑤簮東下潮聲斷西來水勢臨古祠詩滿壁過者若為吟和吳教授夜飲二首短鬢燈前白衰顔酒後紅光隂百年內談笑幾回同禮樂雍熙日衣冠揖讓風吾儕逢盛際何得在蒿蓬出水鱸魚白經霜柿實紅一杯今夕㑹四座故人同佳句多新意清談有古風勸酬須盡量不必問飄蓬曉發涇江月黑天難曙涇江曉發遲艫聲和雨合帆意待風吹小酌杯仍醉冥搜句頗竒黃花如有約開及到家時次陸伴讀風雨舟中客路三秋雨江帆萬里船驚鷗離急浪去鳥沒荒烟白日長歌裏青山薄醉前新詩雖寡和緩筆待重編次韻過𣪚花洲赤壁軍回處曽于此𣪚花跳魚驚過櫓落鳥立行槎山逺雲連樹江清水見沙風帆今日便應送早還家送程彥眀歸揚州分韻得愁字離人江上發歸思滿芳洲客路烟中樹春帆雨外舟青山千里别白首十年逰應有璚花詠還將慰逺愁題長史胡去華畫竹阿翁能愛竹又與竹傳神萬户不須等一枝尤可人渭川烟外晚湘水雨餘春終日宜相對應忘徑造頻寓菴身世寧非寄浮生任所如心惟無滯礙跡故得安舒孔席何曽暖莊舟本自虛百年霄壤內豈異一􅕋廬
