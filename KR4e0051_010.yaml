  text: 蚓竅集卷十
  hash: sha256:fd70d9cf18c2cee91404026cf7ae3c39ffbda23b489d06c0674e7fb5e55499a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0051_SBCK_010-1a}
body:
  text: 雲間管時敏撰西域丁鶴年評五言絶句畫菜白白霜根嫩青青雨甲鮮蒼生無此色四海正豐年重九呈兄勉翁三首異鄉重九日難得好懷開細把茱茰酒殷勤勸一杯千里同為客驚心節序催遙思故園菊今日為誰開白頭難會面今日况重陽第恨長稱夀年年在異鄉初度日復呈兄勉翁三首客裏逢初度艱難老弟兄一杯稱夀酒多少故鄉情勸酒重持杯杯深喜不辭願將今日意同保百年期黃花開未了緑酒釀來新頭白能歡聚吾鄉有幾人送樂長蔣法宏母憂南還昨日鄉書至萱花悴北堂東風兩行泪逆水到清湘江行三首晚過三江口江空水急流船頭燈火起只尺是黃州野色含江薄沙痕帶水長東風無白浪容易下蘄陽樹微茫裏江流浩蕩間舵樓煙雨重不見九華山江霧著水飛輕雨隨風灑暗麈棹歌才只尺不見棹歌人夜坐髙齋坐來久中宵月上時家僮初睡覺驚報早朝遲小景薄宦鬢成絲鄉山入夢思抱琴松下者政似在家時蚓竅集卷十終
  hash: sha256:0c263ef8b29977053620b595fc70e7213b6467e5a8549717eaeedbafb08db13d
