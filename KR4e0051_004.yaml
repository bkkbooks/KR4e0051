front:
  text: 蚓竅集卷四
  hash: sha256:ed0a2f093cdd2249bc2a482a7e46a1adb4aaade1ab420541f21a43c8d84f23b7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0051_SBCK_004-1a}
body:
  text: 雲間管時敏撰西域丁鶴年評五言長律洪武丙子三月三日千秋節芳年臨上已令節慶千春曆紀天開子杓廽月建辰四城佳氣合三殿曙光新禁鑰通關早宫壷轉漏頻駕從星户入樂向露臺陳中使催班急西駒立仗馴燭樓晴吐日香几暖霏塵柳色籠雕輦蘭薰􅊞繡茵虎貔雄武弁鵷鷺肅朝紳王室分封盛宗藩展禮親南山齊獻夀四境共稱仁勝事宜修述才踈愧小臣分題得三槐亭送鳯陽知府李文為弟極刑還郷鳯翥群山秀龍飛此地靈昔人曽種樹今日尚名亭宻葉生仍細踈花落更馨音聲来静夜精魄孕虚星雨入霏琴薦雲屯黯硯屛秋隂連古市凉吹進空囹舊應三公兆今㸔五馬停麟符榮不忝燕寢夣俄醒郡事非螻蟻原情在鶺鴒從容辭組綬蕭𣪚向林扃縹軸詩成什銀􅎆酒滿經歸装勤去僕離曲厭歌伶戀闕心應赤還家鬢尚青民今思召政誰復犯齊刑郡乗歌宜載朝紳議可聽老夫将直筆為著去思銘送武昌太守王徳芳入覲今代論多士如公復㡬人風姿珠樹皎文采鳯毛新禮樂名家子衣冠上國賔撫綏民若子發擿吏如神桉牘從今簡閭閻復古淳儒宫儲萬卷市肆集千緡黍稌村村雨桑麻處處春賢聲清有跡善政美無倫客願依劉表人思借㓂恂歌謡登郡乗論議動朝紳逺過龍河上終歸鳯沼濵天顔恒眷顧國政毎諮詢何幸遭逢盛應知属望頻行當調鼎鼐特為展經綸題右長史富春胡去華乃父清之處士墓誌銘後處士為里人誣訴于賜金還郷以葬折京而卒傷哉胡處士西淛舊知名卓行超前輩髙風起後生白雲營别墅華表卜佳城剰有林泉樂渾無寵辱驚野情聊自適世累忽相嬰地逈風烟暗天高日月眀雖興埋玉歎終荷賜金榮旅櫬他郷發哀歌故里迎猿啼桐水夕鶴唳黙山晴子富春秋學人題月旦評焚黄時可待衣錦晝堪行銘碣祠前立圭田墓下耕束芻吾欲致酹酒若為傾回首松楸路凄然一愴情送進士萬嵩㑹試聖治開文運賔興屬俊材考官千里至多士四方来鶚薦逢三載麟經占一魁荆人無抱璞郢匠足掄材喜及簮花宴榮從擢桂迴擬登龍虎榜又上鳯凰臺志氣凌層漢文光近上台青山迎去斾緑水滌行杯良驥終騰足神魚豈暴腮好風當側耳佇聴禹門雷七夕飲謝氏偪側軒偪側軒中飲彬彬列儁髦上庖行盛饌大甕出新醪香靄雕盤霧茶鳴石鼎濤主人䏻倒屣我輩復同𫀆詩險才應捷杯長興愈豪良時偏易邁嘉㑹豈頻遭有幸陪清賞無慚賦老饕厭厭歸已夜河鼓在林臯送進士奚瑛服闋赴亰一日豋科第三年讀禮書治装辭邑里抱藝謁宸居慈母偏憐若難兄更戀渠花香㽞别席草色暎行𥚑帆掛春波外樓凭夕照餘老懐雖悵望有喜聴嘉除哭先師樗隱先生先生姓劉名儼字敬思以樗隱自號世業儒為錢塘人元世不仕隱居西湖之上天朝代元徴入亰修禮樂書方輿續編既而授廣東市舶司令而疾卒敬賦長律以哭之痛哭劉夫子如今隔九泉感恩惟我在卓行許誰宣漢向猶今系梁紆復後賢家聲俱溢耳才望孰齊肩百氏遭漁獵羣經費討研大鏞知在序巨筆信如椽美玉雖居璞眀珠必媚川薦章何懇懇束帛竟戔戔東壁星辰表西清雨露邊班陪黄閣老各厠玉堂仙禮樂皆新制方輿有續編宣麻應内命行李忽南遷漢節衝蠻雨黎歌入瘴烟客庖魚米賤啇舶象犀聮省檄官将調郵書訃遽傳龍蛇雖起起鸞鶴㝎翩翩有客書銘碣何人給墓田禺山雲若慘谷水月空圎雨泣悲鸚鵡風魂託杜䳌哲人其逝矣小子獨凄然膏馥多沾丐愚蒙頼勉􅏧斯文因泪沒吾道亦迍邅踵接才雖劣心䘮禮自專毎傷釃酹爵况忍讀哀篇感激千愁外號呼百拜前不知雙眼淚何日㫁潺湲評曰如一之義之䘮之哀白首不忘豈泛泛師友之言㢤髹几髹几承㤙賜書堂便老臣始知離廕室終得近華茵簡牘從多積尊彛可間陳色侵書葉冷光暎墨花新坐次移来稳吟邊倚處頻芸香微隱霧梅影暗横春赤舄應難儗烏皮詎可倫量心知並㓗鑑貌信能真獨對懷殊遇相依媿此身賦成青玉案欲報諒何因行馬行馬非行馬如何作馬稱門䦨知警蹕道路失蹺騰外侮威能禦前驅任莫勝足分如鼎峙骨立更鋒􅏢洞户金星暎雲衢𬗋電凝圖形那是獸附尾諒無蠅曺植驕矜减楊彪貴顯増陪臣日趍謁有頼一懐兢送僧智益逰淛鐡佛千年寺髙僧始得名褁香叅祖塔洗鉢出王城水向三江渡山投兩淛行馬嘶天竺去虎過石橋迎問法心應切逰方道可成歸来當結社細與話無生丙子秋八月偶書今夏既無雨兹秋復亢陽雖云流大火未覺應清商午近風偏熱宵分露不涼四郊禾未秀一圃菜全荒雲起江光赤塵飛野色黄井深添汲綆江淺駐歸航解渇思茶椀銷愁仗酒觴蹉跎厭城市蕭散慕林塘頭白憐郷逺心丹願國康老懐無以遣捉筆偶成章題伴讀董時貢所蔵山水公舘多清暇林泉愜所探人家如谷口風景似江南㫁逕荒深蘚崩崖老巨楠鯨波通海去鳥道與雲叅江艇維晨渚巖扉掩暮嵐雨田收赤黍霜圃摘黄柑未築清風屋先尋白石庵醉来休荷鍤老去願投簮許我閒身在從渠俗慮躭偶然忘世累聊復謝林慚和陸伴讀涇江曉行歸舟浪花白行旅鬢毛蒼天上君㤙􅌋江邊客思長鷗迎廻渚集鴈逐㫁雲翔山黒猶含霧林紅已被霜雨懐辭白下風憶過青陽酒盡懽寧極詩新興未央茲行須紀勝後㑹莫相忘和呉教授過潯陽三旬辭幕府千里歷星霜水鸛和鳴艣風烏逐去檣還家趍鄂渚歸路過潯陽山立雙峰峭江分九派長雲泉髙噴薄烟樹逺微茫若葉寒仍緑蓀花晚自芳守臣甘徇國遷客重離郷簡冊遺風節琵琶㫁淚行濕嵐郵傳外冷月戌樓傍老境頻過此懐賢易感傷白居易尚書左遷江州司馬李子威狀元出守江州盡節九月廿五日值余初度諸友以詩酒見夀扵舟中賦五言長律一首以謝云老去逢初度那知在客邊清歡當此日嘉㑹勝常年古鼎名香爇髙臺絳燭然仙庖能具饌官舫盛張筵新果豋槃美佳肴入筯鮮慶行承綵帕夀祝荷華篇北斗長生外南山爛醉前交情何鄭重禮貌極周旋一府官僚盛千秋國主賢願同金石志永以保貞堅永嘉裴季和家有竹居典簿中都國學種竹數竿想像故園之意客舍仍栽竹殷勤憶故園亂枝交窄逕輕篠拂卑垣曙色烟凝几秋聲月在門殺青編汗簡浮碧注山尊斸筍供春祀行庖夕飱髙人頻駐屐俗士竟廻轅雖與山林逺終無市井喧晉賢名未泯唐逸興猶存彷彿龜山路依稀鴈蕩村南歸遂幽息投老更何論
