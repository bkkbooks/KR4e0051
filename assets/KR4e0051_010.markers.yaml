  - {type: variant, offset: 6, length: 335, content: 西域丁鶴年評五言絶句畫菜白白霜根嫰青青雨甲鮮蒼生無此色四海正豐年重九呈兄勉翁三首異郷重九日難得好懐開細把茱茰酒殷勤勸一杯千里同為客驚心節序催遙思故園菊今日為誰開白頭難會面今日况重陽第恨長稱夀年年在異郷初度日復呈兄勉翁三首客裏逢初度艱難老弟兄一杯稱夀酒多少故郷情勸酒重持杯杯深喜不辭願将今日意同保百年期黄花開未了緑酒釀来新頭白䏻歡聚吾郷有幾人送樂長蔣法宏母憂南還昨日郷書至萱花悴北堂東風兩行泪逆水到清湘江行三首晚過三江口江空水急流船頭燈火起只尺是黄州野色含江薄沙痕帶水長東風無白浪容易下蘄陽樹微茫裏江流浩蕩間舵樓烟雨重不見九華山江霧著水飛䡖雨随風灑暗麈棹歌纔只尺不見棹歌人夜坐髙齋坐来乆中宵月上時家僮初睡覺驚報早朝遲小景薄宦鬢成絲郷山入夢思抱琴松下者政似在家時蚓竅集卷十終, WYG: ''}
