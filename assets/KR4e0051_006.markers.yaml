  - {type: line-break, offset: 0, content: '', id: KR4e0051_SBCK_006-1a01}
  - {type: variant, offset: 0, length: 1631, content: 蚓竅集卷六雲間管時敏撰西域丁鶴年評七言律詩姚氏野春堂野外茅堂不掩扉堂前風日散晴霏梨花門巷清明近春水池塘燕子飛每約隣翁同社飲更從田畯勸農歸眀朝我亦尋春去小試東風白苧衣宴徐氏樓高宴徐家池上樓座中賔客總風流東城美酒休辭醉南國佳人自解愁晴日逰絲當户落暖風香篆近簾浮歸時不用山公馬短棹春波正滿洲荅呉髙士見寄青鞋布襪木綿裘合是山中隱者流舉世可無劉越石薦賢誰是吕婆樓秋風泖蟹年年上春水沙鷗日日浮好為携琴幷載酒三高祠下放扁舟和内兄金士㢘清明日荅張應辰見過雨晴江路少塵沙有客尋春到水涯風細㳺絲低著草日斜歸鳥亂穿花青山㡬處無新塜喬木何人是故家倩得盤逰春髻子東風日日好将車小雨䡖風寒食後一春惟酒是生涯過江不用歌桃葉出郭先宜看杏花亂後此身猶是客醉中随處即為家白鷗信我忘機事擬買滄洲一釣車清眀感懐二首十年宦學楚江濵老㬌垂垂上此身挿柳忽逢三月節看花又過二分春青山風雨多新鬼白髮江湖少故人東憶墓田千阜下可堪回首一霑巾客裏逢春百感生况聽風雨過清眀楊花總是離人恨桃葉都非舊妾情小引酒杯還易醉苦吟詩句却難成不知誰是窮途者哭似當時阮步兵評曰使去國懐郷者見之豈不蕭然有感于衷山水圖青山何處躡崚嶒我擬幽棲乆未能深谷雨来雲正合大江風作水如崩林中短屐行相引渡口孤航喚欲譍今日未醒塵土夣披圖長嘯媿孫登山水便面宣和便面何從得畫史當時属有才𬗋翠峰巒天上落青紅樓閣樹頭開羣賢似向蘭亭會一老疑從栗里来評曰畫外之畫安得從容隨杖屨䡖舟日繫水雲隈人日偶興宦逰江漢十經春白髮東風鏡裏新千里此身長在客一年今日又逢人雨中柳色黄猶嫰氷後湖光緑更匀藩府官閒如化國不知誰是葛天民評曰以人日為化日府僚属為葛天民可謂善變者矣禮部頒王府文官誥敕次審理王敬徳韻𬗋誥恭迎被寵光驛亭初日正蒼涼官坊錦織雲霞爛御榻文成雨露香九五飛龍當盛世太平鳴鳳在朝陽羣公拜舞天威近舉首紅雲是建章元日和季翔韻嘉節金門慶履端無風無雨萬人歡通班新例行中使導駕常儀忝從官列仗纔廽燈影曙嚴兵未觧甲光寒宴䦨歸去恩榮甚醉挿宫花上錦鞍御賜西馬金門蹴踏五雲開七尺權竒信是騋近自天閑頒賜下逺從西域貢将来雄姿共擬千金價駿足争誇萬里材昨日錦鞍新鞴出殿前立仗總駑駘叅侍平靖州諸蠻次季翔韻親王承詔討南蠻三月星霜㦄險艱萬斛樓船上秋水千羣鐡騎蹴寒山孔明謾說安夷俗馬援應慙入漢關十二妖酋今盡縛皇華又報捷書還軍屯十萬坪玉帳秋臨十萬坪石家銅鼓夜無聲千團毒霧開山寨萬竈炊煙起野營自信丹心能報國誰知白首厭談兵中官催草征南捷龍燭生花剪更眀丙寅元日軍中次季翔韻羽仗森嚴午夜陳千官行殿慶新春四時佳節逢元日甲子豐年見上旬鵠立乆叨居侍史鹿鳴今喜宴嘉賔凱音歸及燒燈候一路東風火樹新評曰徂征有苗古所為難王師一出諸酋授首非長于廟略能若是乎侍從朝亰還國舟中簡府僚諸王入覲試功初恩及吾君慶有餘聖語自天稱國稳臣心何地愧才踈四夷率服英風逺九域同仁化日舒幸遇太平全盛際不妨白首曳長裾欽賦大将征囬聖念蒼生重拓邊王師奏捷凱歌琁千營列栅天籠野萬竈連山地湧泉軍渇遇泉魚海于今歸版籍狼荒從此靖風烟華夷一統文眀日共祝吾皇億萬年觀射柳贈陳僉衛琰将種傳家属妙齡端陽射柳在王庭馬㸔飛鞚如追電箭訝離弦若迸星度内等間知中白眼中端的肯撩青含風細葛君恩賜自咲吾儕字識丁評曰丁字甚有風刺軍中寄潭府紀善楊應庚奉使君初過武昌從征我已上渠陽雞聲風雨同為客馬首雲山各異郷千里還家驚臘盡百年依世幸身強相思恐有平安字好寄南来鴈一行寄淞上友人憶昔都門把臂時殷勤索我送行詩客邊頼爾能相慰別後令人有所思芳草暮雲愁忽忽落花春雨鬢絲絲東歸艇子如堪買㝎擬尋君泗水湄送兄勉翁自鳯陽廽淞把酒燈前醉復傾别離無限異郷情一身千里乆為客百歲㡬時長見兄春雨園廬青草遍暮雲丘隴紫芝生白頭遂我東轅日數畝圭田淂耦畊題胡長史所蔵風晴雨嫩墨竹四首記淂東林臘月栽虚懐今對畫圗𨳩碧雲何䖏忽飛到蒼雪無聲欲墮来尚覺暮寒生翠䄂不驚午萝斷瑶臺故園茅屋蕭蕭裏若箇家童掃石苔萬个琅玕遶舍栽拂檐金翠曙光開尋常每萝鸞笙下彷彿遥驂鶴駕来千尺洋州休製韈一竿嚴瀨獨登臺白頭天與歸欤便短策行吟石逕苔移得篔簹谷裡栽柴門蕭爽曉慵𨳩林慙我向當年, WYG: ''}
