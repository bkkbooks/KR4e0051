  - {type: variant, offset: 211, length: 11, content: 庫本全脫此外二本詩題亦, WYG: 客裏逢初度艱難老弟兄一杯稱壽酒多少故鄉情勸酒重持杯杯深喜不辭願將今日意同保百年期黄花開未了緑酒驤来新頭白能歡聚吾鄉有㡬人送樂長蔣法宏母憂南還昨日鄉書至萱花悴北堂東風兩行泪逆水到清湘江行三首晚過三江口江空水急流船頭燈火起只尺是黄州野色含江薄沙痕帶水長東風無白浪容易下蘄陽雲樹㣲茫裏江流浩蕩間舵樓烟雨重不見九華山江霧著水飛輕雨隨風灑暗塵棹歌纔只尺不見棹歌人夜坐髙齋坐来久中宵月上}
