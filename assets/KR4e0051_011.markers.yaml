  - {type: variant, offset: 258, length: 157, content: 敏皆爲楚王所禮重故幷其評語刻之又云時敏又有秋香百詠還鄕紀行見周子冶所作全菴記知所據本有評語又有全菴記與此本同然庫本無之者則館臣之過矣此三事也觀於此三事則此本之善不待煩言而解時敏初名訥後以字行華亭人與袁海叟交善俱以詩名洪武九年徵拜楚王府紀善進右長史丁鶴年是時亦客居武昌嘗有詩送時敏云楚王獨數蘇從諫齊士誰過管仲才見海巢, WYG: 蚓竅}
