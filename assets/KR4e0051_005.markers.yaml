  - {type: variant, offset: 2662, length: 0, content: '', WYG: 蚓竅集巻五欽定四庫全書蚓竅集卷六明管時敏撰七言律詩姚氏野春堂野外茅堂不掩扉堂前風日散晴霏梨花門巷清明近春水池塘燕子飛每約隣翁同社飲更從田畯勸農歸明朝我亦尋春去小試東風白苧衣宴徐氏樓髙宴徐家池上樓座中賓客總風流東城美酒休辭醉南國佳人自解愁晴日遊絲當戸落暖風香篆近簾浮歸時不用三公馬短棹春波正滿洲答吳髙士見寄青鞋布襪木綿裘合是山中隠者流舉世可無劉越石薦賢誰是吕婆樓秋風泖蟹年年上春水沙鷗日日浮好為攜琴并載酒三髙祠下放扁舟和内兄金士㢘清明日答張應辰見過雨晴江路少塵沙有客尋春到水涯風細遊絲低著草日斜歸鳥亂穿花青山幾處無新塜喬木何人是故家倩得盤遊春髻子東風日日好將車小雨輕風寒食後一春惟酒是生涯過江不用歌桃葉出郭先宜㸔杏花亂後此身猶是客醉中隨處即為家白鷗信我忘機事擬買滄洲一釣車清明感懐二首十年宦學楚江濱老景埀埀上此身插柳忽逢三月節㸔花又過二分春青山風雨多新鬼白髪江湖少故人東憶墓田千阜下可堪回首一霑巾客裏逢春百感生况聽風雨過清明楊花總是離人恨桃葉都非舊妾情小引酒杯還易醉苦吟詩句却難成不知誰是窮途者哭似當時阮歩兵山水圖青山何處躡崚嶒我擬幽棲久未能深谷雨來雲正合大江風作水如崩林中短屐行相引渡口孤航喚欲譍今日未醒塵土夢披圖長嘯媿孫登山水便面宣和便面何從得畫史當時屬有才紫翠峰巒天上落青紅樓閣樹頭開羣賢似向蘭亭㑹一老疑從栗里來安得從容隨杖屨輕舟日繫水雲隈人日偶興宦遊江漢十經春白髪東風鏡裏新千里此身長在客一年今日又逢人雨中柳色黄猶嫩冰後湖光緑更勻藩府官閒如化國不知誰是葛天民禮部頒王府文官誥勑次審理王敬徳韻紫誥恭迎被寵光驛亭初日正蒼凉官坊錦織雲霞爛御榻文成雨露香九五飛龍當盛世太平鳴鳳在朝陽羣公拜舞天威近舉首紅雲是建章元日和季翔韻嘉節金門慶履端無風無雨萬人歡通班新例行中使導駕常儀忝從官列仗纔廻燈影曙嚴兵未解甲光寒宴闌歸去恩榮甚醉插宫花上錦鞍御賜西馬金門蹴踏五雲開七尺權竒信是騋近自天閑頒賜下逺從西域貢將來雄姿共擬千金價駿足争誇萬里材昨日錦鞍新鞴出殿前立仗總駑駘㕘侍平靖州諸蠻次季翔韻親王承詔討南蠻三月星霜歴險艱萬斛樓船上秋水千羣鐵騎蹴寒山孔明謾説安夷俗馬援應慙入漢闗十二妖酋今盡縛皇華又報㨗書還軍屯十萬坪玉帳秋臨十萬坪石家銅鼓夜無聲千團毒霧開山寨萬竈炊烟起野營自信丹心能報國誰知白首厭談兵中官催草征南㨗龍燭生花剪更明丙寅元日軍中次季翔韻羽仗森嚴午夜陳千官行殿慶新春四時佳節逢元日甲子豐年見上旬鵠立久叨居侍史鹿鳴今喜宴嘉賓凱音歸及燒燈候一路東風火樹新侍從朝京還國舟中簡府僚諸王入覲試功初恩及吾君慶有餘聖語自天稱國穏臣心何地愧才踈四夷率服英風逺九域同仁化日舒幸遇太平全盛際不妨白首曵長裾欽賦大將征回聖念蒼生重拓邊王師奏㨗凱歌旋千營列柵天籠野萬竈連山地湧泉魚海於今歸版籍狼荒從此靖風烟華夷一統文明日共祝吾皇億萬年觀射柳贈陳僉衞琰將種傳家屬妙齡端陽射柳在王庭馬㸔飛鞚如追電箭訝離弦若迸星度内等閒知中白眼中端的肯撩青含風細葛君恩賜自笑吾儕字識丁軍中寄潭府紀善楊應庚奉使君初過武昌從征我已上渠陽雞聲風雨同為客馬首雲山各異鄉千里還家驚臘盡百年依世幸身强相思恐有平安字好寄南來鴈一行寄淞上友人憶昔都門把臂時殷勤索我送行詩客邊頼爾能相慰别後令人有所思芳草暮雲愁忽忽落花春雨鬢絲絲東歸艇子如堪買定擬尋君泗水湄送兄勉翁自鳳陽廻淞把酒燈前醉復傾别離無限異鄉情一身千里久為客百嵗幾時長見兄春雨園廬青草遍暮雲丘隴紫芝生白頭遂我東轅日數畝圭田得耦耕題胡長史所藏風晴雨嫩墨竹四首記得東林臘月栽虛懐今對畵圖開碧雲何處忽飛到蒼雪無聲欲墮來尚覺暮寒生翠袖不驚午夢斷瑶臺故園茅屋蕭蕭裏若箇家僮掃石苔萬箇琅玕繞舎栽拂簷金翠曙光開尋常每夢鸞笙下彷彿遥驂鶴駕來千尺洋州休製韈一竿嚴瀬獨登臺白頭天與歸歟便短策行吟石逕苔移得篔簹谷裡栽柴門蕭爽曉慵開林慙我向當年隠逕造人從此日來六月微凉生枕簟半天空翠落亭臺公家池館平安在遥憶清隂遍緑苔舊本曽於醉日栽新梢今己拂雲開蕭蕭籜向風前落細細香從雨後來漸有微隂侵墨沼且無虛籟過琴臺明年二月春雷起秪恐䙀兒破紫苔過洞庭湖上東風水似天渚花紅白共春妍蒼梧二女墳前路青草三閭廟下船鮫室綃機聲札札龍宫珠珮影姢姢官閒更遂南遊興借榻君山寺裏眠}
