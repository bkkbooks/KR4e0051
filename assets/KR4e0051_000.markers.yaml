  - {type: variant, offset: 441, length: 991, content: 舎人廣平程南雲篆中書舎人姚江柴蘭書記曰父母全而生之子全而歸之可謂孝矣至若全其所受於天者以為徳焉固天民之秀出者歟奉政大夫楚府左長史致政管公命其菴居曰全者其有得於斯矣公字時敏松江華亭人㓜而頴異九歲能詩父母所鍾愛比壮儀觀偉然㝎省之暇即研精竹素授詩於敬思劉先生習其舉業學古文於㢘夫楊先生且作樓曰冝逺延納執友資其藻礪若袁景文鄭本初鍾伯紀倪元鎮錢思復錢慶餘皆其人也當元之季閉門講授其志固有存矣國朝洪武六年以六科取士郡守㢘潤以公應令至則以外艱免九年徴拜楚王府紀善出入禁邸者五年寅畏小心未始有過上有事郊廟太常輙承誓命俾從豆籩之執十有四年從主君之國恭謹疆力事不避難自紀述譔載以至出内命令必盡乃心寅入酉出雖祁寒暑雨未甞暫還私苐毎朝進見退食之餘坐直廬中綜覈一切倦即倚壁假寐少選復然二十餘年常若一日主君察而噐之三十一年㑹左長史缺奏以属公既陟元僚總理庶務益得展其素藴乃鞠躬盡瘁求所以報恩竉而荅知遇者無或弗至盖知無弗言言必當理事無苟從必由於義歸羙君上而未甞有自矜之色故主君亦推心聴納國以善治作式藩屏人寡過焉在職十年公亦年登七十乞致其事以歸田里主君閔其勞効居多不忍其去已親製詩一章以道其意命王世子特書忠勤良佐四大字以褒之命諸郡王咸賦詩以羙之命右長史中㑹稽胡公作忠勤良佐之傳合為臣軸以賜賚子無算且請命於上留置本國祿之終身歲中宴饗接以賔禮風晨月夕引見不時遣賜珎饌繼踵於庭公雖耆艾視聴不衰容色晬然不忘啓沃主君愈親重之退而深惟曰吾待罪陪輔㡬四十年得全四體以從先臣皆主君之賜吾沒世不䏻忘也乃十扵郡城之東不二舎而逺曰黄屯山者以為息焉之所且築菴其側命之曰全而属子冶以記其篤於君臣之義而通夫晝夜之道者如此初公年及知命未有息子主君為之悒然及從討蠻宼於銅鼓用公之畫悉破斬之諸将以四鄕隣於宼壤欲殄其衆公進言曰是雖荒裔亦人類也柰何草薙而禽獮之主君深以為然咸得不死護衛指揮使蔡春退而嘆曰公以一言活數萬人之命其必有後矣越數年果獲懸弧之慶主君聞之大喜錫名延枝教育於宫中洎抵于成室以戚畹永樂十四年奏爲伴讀於是父子咸有祿食吉月而朝父先子後榮遇無比而克退讓以濟羙焉盖人之大倫有五克盡其道於一二者猶鮮今公恱親以信於友得君以達其道昆弟無故夫婦偕老而有令子以繼其志其徳於天而具已者厚矣皇極所謂嚮用五福者公尚有焉惟公眠食加愛以保期頥使大夫國人皆有所矜式固王君之至意亦士林之所深碩也子冶不佞内交於公也後而於令子有忘年之契庸拜手次其所聞見者為之記若夫公所自著曰, WYG: ''}
